<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>پروفایل من | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <link rel="stylesheet" href="/style.css">
    <style>
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1050;
            background: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .sidebar {
                position: fixed;
                right: -280px;
                width: 280px;
                z-index: 1040;
                transition: right 0.3s;
                height: 100%;
                top: 0;
            }

            .sidebar.show {
                right: 0;
            }

            .main-content {
                width: 100%;
                margin-right: 0;
                padding: 80px 15px 25px 15px;
            }

            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                z-index: 1030;
                display: none;
            }

            .overlay.show {
                display: block;
            }
        }
    </style>
</head>

<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">
                <div class="text-center py-4">
                    <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-2"
                        style="width:70px;height:70px;background:linear-gradient(135deg,#10b981,#059669)">
                        <i class="fa-solid fa-graduation-cap fs-1 text-white"></i>
                    </div>
                    <h5 class="text-white mb-0">پنل شاگرد</h5>
                    <small class="text-muted" id="studentNameSidebar">نام شاگرد</small>
                </div>
                <nav class="nav flex-column mt-2">
                    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> پیشخوان</a>
                    <a href="attendance.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> حاضری</a>
                    <a href="grades.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> نمرات</a>
                    <a href="fees.html" class="nav-link"><i class="fa-solid fa-money-bill-wave"></i> فیس</a>
                    <a href="complaints.html" class="nav-link"><i class="fa-solid fa-message"></i> شکایات</a>
                    <a href="profile.html" class="nav-link active"><i class="fa-solid fa-user-circle"></i> پروفایل</a>
                    <hr class="text-secondary mx-3 my-2">
                    <a href="#" class="nav-link" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i>
                        خروج</a>
                </nav>
            </div>

            <div class="col-md-9 col-lg-10 main-content">
                <h3 class="section-title"><i class="fa-solid fa-user-circle text-success me-2"></i> پروفایل من</h3>

                <div class="row">
                    <div class="col-md-5 text-center">
                        <div class="card p-3">
                            <div id="profileQr" class="d-flex justify-content-center"></div>
                            <p class="text-muted mt-2"><i class="fa-solid fa-qrcode"></i> اسکن QR برای ورود سریع</p>
                            <hr>
                            <p><i class="fa-solid fa-id-card text-primary me-2"></i> آیدی کارت: <strong
                                    id="studentCardId">-</strong></p>
                            <p><i class="fa-solid fa-user text-info me-2"></i> نام: <span id="profileName">-</span></p>
                            <p><i class="fa-solid fa-user-friends text-success me-2"></i> نام پدر: <span
                                    id="profileFather">-</span></p>
                            <p><i class="fa-solid fa-table-cells-large text-warning me-2"></i> صنف: <span
                                    id="profileClass">-</span></p>
                            <div class="mt-3"><button class="btn btn-primary btn-sm" onclick="showStudentCard()"><i
                                        class="fa-solid fa-qrcode"></i> کارت شناسایی</button></div>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="card p-3">
                            <form id="profileForm" enctype="multipart/form-data">
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="form-label"><i class="fa-solid fa-user"></i> نام
                                            کامل</label><input type="text" class="form-control" id="fullName" required>
                                    </div>
                                    <div class="col-md-6"><label class="form-label"><i class="fa-solid fa-user"></i> نام
                                            پدر</label><input type="text" class="form-control" id="fatherName"></div>
                                    <div class="col-md-6"><label class="form-label"><i class="fa-solid fa-phone"></i>
                                            شماره تماس</label><input type="text" class="form-control" id="phoneNumber">
                                    </div>
                                    <div class="col-md-6"><label class="form-label"><i
                                                class="fa-solid fa-venus-mars"></i> نام مادر</label><input type="text"
                                            class="form-control" id="motherName"></div>
                                    <div class="col-12"><label class="form-label"><i
                                                class="fa-solid fa-location-dot"></i> آدرس</label><textarea
                                            class="form-control" rows="2" id="address"></textarea></div>
                                    <div class="col-12"><label class="form-label"><i class="fa-solid fa-camera"></i> عکس
                                            پروفایل</label><input type="file" class="form-control" id="profilePhoto"
                                            accept="image/*"></div>
                                    <div class="col-12"><label class="form-label"><i class="fa-solid fa-key"></i> رمز
                                            عبور جدید</label><input type="password" class="form-control"
                                            id="newPassword" placeholder="در صورت تمایل"></div>
                                    <button type="submit" class="btn btn-primary w-100"><i class="fa-solid fa-save"></i>
                                        ذخیره تغییرات</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let studentId = localStorage.getItem('studentId') || localStorage.getItem('userId');
        let qrCodeInstance = null;

        function setupSidebar() {
            const toggleBtn = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (!toggleBtn) return;
            function closeSidebar() { if (sidebar) sidebar.classList.remove('show'); if (overlay) overlay.classList.remove('show'); }
            function openSidebar() { if (sidebar) sidebar.classList.add('show'); if (overlay) overlay.classList.add('show'); }
            toggleBtn.addEventListener('click', openSidebar);
            if (overlay) overlay.addEventListener('click', closeSidebar);
            window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });
        }

        async function loadProfile() {
            const res = await fetch(`/api/student/info/${studentId}`);
            const data = await res.json();
            document.getElementById('studentCardId').innerText = data.student_card_id || '-';
            document.getElementById('fullName').value = data.name || '';
            document.getElementById('fatherName').value = data.father_name || '';
            document.getElementById('motherName').value = data.mother_name || '';
            document.getElementById('phoneNumber').value = data.phone || '';
            document.getElementById('address').value = data.address || '';
            document.getElementById('profileName').innerText = data.name || '-';
            document.getElementById('profileFather').innerText = data.father_name || '-';
            document.getElementById('profileClass').innerText = data.class_name || '-';
            if (data.qr_token && document.getElementById('profileQr')) {
                if (qrCodeInstance) document.getElementById('profileQr').innerHTML = '';
                qrCodeInstance = new QRCode(document.getElementById('profileQr'), { text: `${window.location.origin}/index.html?qr=${data.qr_token}`, width: 130, height: 130, colorDark: "#10b981", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H });
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('fullName').value);
            formData.append('father_name', document.getElementById('fatherName').value);
            formData.append('mother_name', document.getElementById('motherName').value);
            formData.append('phone', document.getElementById('phoneNumber').value);
            formData.append('address', document.getElementById('address').value);
            const newPass = document.getElementById('newPassword').value;
            if (newPass) formData.append('password', newPass);
            const photo = document.getElementById('profilePhoto').files[0];
            if (photo) formData.append('photo', photo);
            const res = await fetch(`/api/student/update-profile/${studentId}`, { method: 'PUT', body: formData });
            if (res.ok) { alert('پروفایل با موفقیت به روز شد'); loadProfile(); document.getElementById('newPassword').value = ''; }
            else alert('خطا');
        });

        function showStudentCard() { window.open(`/student-card.html?id=${studentId}`, '_blank'); }

        setupSidebar();
        loadProfile();
    </script>
</body>

</html>
