<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>پروفایل من</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">...</div>
            <div class="col-md-9 col-lg-10 main-content">
                <h3 class="section-title"><i class="bi bi-person-circle text-primary me-2"></i> پروفایل من</h3>

                <div class="row">
                    <div class="col-md-5 text-center">
                        <div class="card p-3">
                            <div id="profileQr" class="d-flex justify-content-center"></div>
                            <p class="text-muted mt-2"><i class="bi bi-qr-code"></i> اسکن QR برای ورود سریع</p>
                            <hr>
                            <p><i class="bi bi-person-badge text-primary me-2"></i> آیدی کارت: <strong
                                    id="studentCardId">-</strong></p>
                            <p><i class="bi bi-person-fill text-info me-2"></i> نام: <span id="profileName">-</span></p>
                            <p><i class="bi bi-people-fill text-success me-2"></i> نام پدر: <span
                                    id="profileFather">-</span></p>
                            <p><i class="bi bi-grid-3x3-gap-fill text-warning me-2"></i> صنف: <span
                                    id="profileClass">-</span></p>
                            <div class="mt-3"><button class="btn btn-primary btn-sm" onclick="showStudentCard()"><i
                                        class="bi bi-qr-code"></i> کارت شناسایی</button></div>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="card p-3">
                            <form id="profileForm" enctype="multipart/form-data">
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="form-label">نام کامل</label><input type="text"
                                            class="form-control" id="fullName" required></div>
                                    <div class="col-md-6"><label class="form-label">نام پدر</label><input type="text"
                                            class="form-control" id="fatherName"></div>
                                    <div class="col-md-6"><label class="form-label">نام مادر</label><input type="text"
                                            class="form-control" id="motherName"></div>
                                    <div class="col-md-6"><label class="form-label">شماره تماس</label><input type="text"
                                            class="form-control" id="phoneNumber"></div>
                                    <div class="col-12"><label class="form-label">آدرس</label><textarea
                                            class="form-control" rows="2" id="address"></textarea></div>
                                    <div class="col-12"><label class="form-label">عکس پروفایل</label><input type="file"
                                            class="form-control" id="profilePhoto" accept="image/*"></div>
                                    <div class="col-12"><label class="form-label">رمز عبور جدید</label><input
                                            type="password" class="form-control" id="newPassword"
                                            placeholder="در صورت تمایل"></div>
                                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-save"></i> ذخیره
                                        تغییرات</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let studentId = localStorage.getItem('studentId') || localStorage.getItem('userId');
        let qrCodeInstance = null;

        async function loadProfile() {
            const res = await fetch(`/api/student/info/${studentId}`);
            const data = await res.json();
            document.getElementById('studentCardId').innerText = data.student_card_id || '-';
            document.getElementById('fullName').value = data.name || '';
            document.getElementById('fatherName').value = data.father_name || '';
            document.getElementById('motherName').value = data.mother_name || '';
            document.getElementById('phoneNumber').value = data.phone || '';
            document.getElementById('address').value = data.address || '';
            document.getElementById('profileName').innerText = data.name || '-';
            document.getElementById('profileFather').innerText = data.father_name || '-';
            document.getElementById('profileClass').innerText = data.class_name || '-';

            if (data.qr_token && document.getElementById('profileQr')) {
                if (qrCodeInstance) document.getElementById('profileQr').innerHTML = '';
                qrCodeInstance = new QRCode(document.getElementById('profileQr'), {
                    text: `${window.location.origin}/login.html?qr=${data.qr_token}`,
                    width: 130, height: 130, colorDark: "#667eea", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H
                });
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('fullName').value);
            formData.append('father_name', document.getElementById('fatherName').value);
            formData.append('mother_name', document.getElementById('motherName').value);
            formData.append('phone', document.getElementById('phoneNumber').value);
            formData.append('address', document.getElementById('address').value);
            const newPass = document.getElementById('newPassword').value;
            if (newPass) formData.append('password', newPass);
            const photo = document.getElementById('profilePhoto').files[0];
            if (photo) formData.append('photo', photo);

            const res = await fetch(`/api/student/update-profile/${studentId}`, { method: 'PUT', body: formData });
            if (res.ok) {
                alert('پروفایل با موفقیت به روز شد');
                loadProfile();
                document.getElementById('newPassword').value = '';
            } else alert('خطا');
        });

        function showStudentCard() { window.open(`/student-card.html?id=${studentId}`, '_blank'); }

        loadProfile();
    </script>
</body>

</html>
