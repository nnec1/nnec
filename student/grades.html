<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نمرات من</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">...</div>
            <div class="col-md-9 col-lg-10 main-content">
                <h3 class="section-title"><i class="bi bi-bar-chart-steps text-primary me-2"></i> نمرات من</h3>

                <div class="row g-4 mb-4">
                    <div class="col-md-4">
                        <div class="stat-card text-center"><i class="bi bi-star-fill fs-1 text-warning"></i>
                            <h2 id="totalAverage">0</h2><small>میانگین کل (%)</small>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card text-center"><i class="bi bi-trophy-fill fs-1 text-primary"></i>
                            <h3 id="bestSubject">-</h3><small>بهترین مضمون</small>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card text-center"><i class="bi bi-book-fill fs-1 text-info"></i>
                            <h3 id="totalSubjects">0</h3><small>تعداد مضامین</small>
                        </div>
                    </div>
                </div>

                <div class="table-container">
                    <div class="table-responsive">
                        <table class="table table-bordered">
                            <thead class="table-light">
                                <tr>
                                    <th>مضمون</th>
                                    <th>نوع امتحان</th>
                                    <th>نمره کسب شده</th>
                                    <th>نمره کل</th>
                                    <th>درصد</th>
                                    <th>تاریخ</th>
                                    <th>وضعیت</th>
                                </tr>
                            </thead>
                            <tbody id="gradesTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let studentId = localStorage.getItem('studentId') || localStorage.getItem('userId');

        async function loadGrades() {
            const res = await fetch(`/api/student/grades/${studentId}`);
            const grades = await res.json();
            if (grades.length === 0) { document.getElementById('gradesTable').innerHTML = '<td><td colspan="7" class="text-center">نمره‌ای ثبت نشده است</div></div></div></td>'; return; }
            let totalPercent = 0;
            let subjectScores = {};
            let gradeHtml = '';
            for (const g of grades) {
                const percent = (g.score / g.max_score) * 100;
                totalPercent += percent;
                if (!subjectScores[g.subject_name]) subjectScores[g.subject_name] = { total: 0, count: 0 };
                subjectScores[g.subject_name].total += percent;
                subjectScores[g.subject_name].count += 1;
                let statusClass = percent >= 60 ? 'bg-success' : (percent >= 40 ? 'bg-warning' : 'bg-danger');
                let statusText = percent >= 80 ? 'عالی' : (percent >= 60 ? 'خوب' : (percent >= 40 ? 'قابل قبول' : 'نیاز به تلاش'));
                gradeHtml += `<tr><td class="text-dark"><strong>${g.subject_name}</strong></div></div></div><td class="text-dark">${g.exam_type}</div></div></div><td class="text-warning">${g.score}</div></div></div><td class="text-dark">${g.max_score}</div></div></div><td class="${percent >= 50 ? 'text-success' : 'text-danger'}">${percent.toFixed(1)}%</div></div></div><td class="text-dark">${g.exam_date || '-'}</div></div></div><td class="text-dark"><span class="badge ${statusClass}">${statusText}</span></div></div></div>`;
            }
            let bestSubjectName = '-', bestSubjectAvg = 0;
            for (const [subject, scores] of Object.entries(subjectScores)) {
                const avg = scores.total / scores.count;
                if (avg > bestSubjectAvg) { bestSubjectAvg = avg; bestSubjectName = subject; }
            }
            const avg = grades.length ? (totalPercent / grades.length).toFixed(1) : 0;
            document.getElementById('totalAverage').innerHTML = avg + '%';
            document.getElementById('totalSubjects').innerText = Object.keys(subjectScores).length;
            document.getElementById('bestSubject').innerHTML = `${bestSubjectName}<br><small class="text-muted">${bestSubjectAvg.toFixed(1)}%</small>`;
            document.getElementById('gradesTable').innerHTML = gradeHtml;
        }

        loadGrades();
    </script>
</body>

</html>
