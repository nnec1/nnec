<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نمرات من | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        .stat-card { background: white; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1050;
            background: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar { position: fixed; right: -280px; width: 280px; z-index: 1040; transition: right 0.3s; height: 100%; top: 0; }
            .sidebar.show { right: 0; }
            .main-content { width: 100%; margin-right: 0; padding: 80px 15px 25px 15px; }
            .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1030; display: none; }
            .overlay.show { display: block; }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">
                <div class="text-center py-4">
                    <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-2" style="width:70px;height:70px;background:linear-gradient(135deg,#10b981,#059669)">
                        <i class="fa-solid fa-graduation-cap fs-1 text-white"></i>
                    </div>
                    <h5 class="text-white mb-0">پنل شاگرد</h5>
                    <small class="text-muted" id="studentNameSidebar">نام شاگرد</small>
                </div>
                <nav class="nav flex-column mt-2">
                    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> پیشخوان</a>
                    <a href="attendance.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> حاضری</a>
                    <a href="grades.html" class="nav-link active"><i class="fa-solid fa-chart-line"></i> نمرات</a>
                    <a href="fees.html" class="nav-link"><i class="fa-solid fa-money-bill-wave"></i> فیس</a>
                    <a href="complaints.html" class="nav-link"><i class="fa-solid fa-message"></i> شکایات</a>
                    <a href="profile.html" class="nav-link"><i class="fa-solid fa-user-circle"></i> پروفایل</a>
                    <hr class="text-secondary mx-3 my-2">
                    <a href="#" class="nav-link" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> خروج</a>
                </nav>
            </div>

            <div class="col-md-9 col-lg-10 main-content">
                <h3 class="section-title"><i class="fa-solid fa-chart-line text-success me-2"></i> نمرات من</h3>

                <div class="row g-4 mb-4">
                    <div class="col-md-4"><div class="stat-card text-center"><i class="fa-solid fa-star fs-1 text-warning"></i><h2 id="totalAverage">0</h2><small>میانگین کل (%)</small></div></div>
                    <div class="col-md-4"><div class="stat-card text-center"><i class="fa-solid fa-trophy fs-1 text-primary"></i><h3 id="bestSubject">-</h3><small>بهترین مضمون</small></div></div>
                    <div class="col-md-4"><div class="stat-card text-center"><i class="fa-solid fa-book fs-1 text-info"></i><h3 id="totalSubjects">0</h3><small>تعداد مضامین</small></div></div>
                </div>

                <div class="table-container">
                    <div class="table-responsive">
                        <table class="table table-bordered">
                            <thead class="table-light">
                                <tr><th>مضمون</th><th>نوع امتحان</th><th>نمره کسب شده</th><th>نمره کل</th><th>درصد</th><th>تاریخ</th><th>وضعیت</th></tr>
                            </thead>
                            <tbody id="gradesTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let studentId = localStorage.getItem('studentId') || localStorage.getItem('userId');

        function setupSidebar() {
            const toggleBtn = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (!toggleBtn) return;
            function closeSidebar() { if (sidebar) sidebar.classList.remove('show'); if (overlay) overlay.classList.remove('show'); }
            function openSidebar() { if (sidebar) sidebar.classList.add('show'); if (overlay) overlay.classList.add('show'); }
            toggleBtn.addEventListener('click', openSidebar);
            if (overlay) overlay.addEventListener('click', closeSidebar);
            window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });
        }

        async function loadGrades() {
            const res = await fetch(`/api/student/grades/${studentId}`);
            const grades = await res.json();
            if (grades.length === 0) { document.getElementById('gradesTable').innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">نمره‌ای ثبت نشده است</div></div></div></tr>'; return; }
            let totalPercent = 0;
            let subjectScores = {};
            let gradeHtml = '';
            for (const g of grades) {
                const percent = (g.score / g.max_score) * 100;
                totalPercent += percent;
                if (!subjectScores[g.subject_name]) subjectScores[g.subject_name] = { total: 0, count: 0 };
                subjectScores[g.subject_name].total += percent;
                subjectScores[g.subject_name].count += 1;
                let statusClass = percent >= 60 ? 'bg-success' : (percent >= 40 ? 'bg-warning' : 'bg-danger');
                let statusText = percent >= 80 ? 'عالی' : (percent >= 60 ? 'خوب' : (percent >= 40 ? 'قابل قبول' : 'نیاز به تلاش'));
                gradeHtml += `<tr><td class="text-dark"><strong>${g.subject_name}</strong></div></div></div><td class="text-dark">${g.exam_type}</div></div></div><td class="text-warning">${g.score}</div></div></div><td class="text-dark">${g.max_score}</div></div></div><td class="${percent >= 50 ? 'text-success' : 'text-danger'}">${percent.toFixed(1)}%</div></div></div><td class="text-dark">${new Date(g.exam_date).toLocaleDateString('fa-IR')}</div></div></div><td class="text-dark"><span class="badge ${statusClass}">${statusText}</span></div></div></div></tr>`;
            }
            let bestSubjectName = '-', bestSubjectAvg = 0;
            for (const [subject, scores] of Object.entries(subjectScores)) { const avg = scores.total / scores.count; if (avg > bestSubjectAvg) { bestSubjectAvg = avg; bestSubjectName = subject; } }
            const avg = grades.length ? (totalPercent / grades.length).toFixed(1) : 0;
            document.getElementById('totalAverage').innerHTML = avg + '%';
            document.getElementById('totalSubjects').innerText = Object.keys(subjectScores).length;
            document.getElementById('bestSubject').innerHTML = `${bestSubjectName}<br><small class="text-muted">${bestSubjectAvg.toFixed(1)}%</small>`;
            document.getElementById('gradesTable').innerHTML = gradeHtml;
        }

        setupSidebar();
        loadGrades();
    </script>
</body>
</html>
