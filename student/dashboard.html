<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>پیشخوان شاگرد | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/style.css">
    <style>
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            height: 100%;
        }

        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1050;
            background: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .sidebar {
                position: fixed;
                right: -280px;
                width: 280px;
                z-index: 1040;
                transition: right 0.3s;
                height: 100%;
                top: 0;
            }

            .sidebar.show {
                right: 0;
            }

            .main-content {
                width: 100%;
                margin-right: 0;
                padding: 80px 15px 25px 15px;
            }

            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                z-index: 1030;
                display: none;
            }

            .overlay.show {
                display: block;
            }
        }

        .alert-warning {
            background: #fef3c7;
            color: #b45309;
            border-right: 4px solid #f59e0b;
        }

        .alert-danger {
            background: #fee2e2;
            color: #dc2626;
            border-right: 4px solid #dc2626;
        }
    </style>
</head>

<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">
                <div class="text-center py-4">
                    <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-2"
                        style="width:70px;height:70px;background:linear-gradient(135deg,#10b981,#059669)">
                        <i class="fa-solid fa-graduation-cap fs-1 text-white"></i>
                    </div>
                    <h5 class="text-white mb-0">پنل شاگرد</h5>
                    <small class="text-muted" id="studentNameSidebar">نام شاگرد</small>
                </div>
                <nav class="nav flex-column mt-2">
                    <a href="dashboard.html" class="nav-link active"><i class="fa-solid fa-gauge-high"></i> پیشخوان</a>

                    <a href="attendance.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> حاضری</a>
                    <a href="grades.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> نمرات</a>
                    <a href="fees.html" class="nav-link"><i class="fa-solid fa-money-bill-wave"></i> فیس</a>
                    <a href="ratings.html" class="nav-link"><i class="fa-solid fa-star"></i> امتیازات</a>
                    <a href="complaints.html" class="nav-link"><i class="fa-solid fa-message"></i> شکایات</a>
                    <a href="profile.html" class="nav-link"><i class="fa-solid fa-user-circle"></i> پروفایل</a>
                    <hr class="text-secondary mx-3 my-2">
                    <a href="#" class="nav-link" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i>
                        خروج</a>
                </nav>
            </div>

            <div class="col-md-9 col-lg-10 main-content">
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
                    <h3 class="section-title"><i class="fa-solid fa-gauge-high text-success me-2"></i> پیشخوان شاگرد
                    </h3>
                    <div class="bg-white px-3 py-2 rounded-3 shadow-sm"><i
                            class="fa-regular fa-calendar text-success"></i><span id="currentDate"
                            class="me-2 text-dark"></span></div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="stat-card text-center"><i class="fa-solid fa-id-card fs-1 text-primary"></i>
                            <h6>آیدی کارت</h6>
                            <h5 id="studentCardId">-</h5>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card text-center"><i class="fa-solid fa-user fs-1 text-info"></i>
                            <h6>نام</h6>
                            <h5 id="studentName">-</h5>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card text-center"><i class="fa-solid fa-users fs-1 text-success"></i>
                            <h6>صنف</h6>
                            <h5 id="studentClass">-</h5>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card text-center"><i class="fa-solid fa-star fs-1 text-warning"></i>
                            <h6>میانگین نمرات</h6>
                            <h2 id="avgGrade">0</h2>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="chart-card p-3 bg-white rounded-3 shadow-sm"><canvas id="attendanceChart"
                                height="250"></canvas></div>
                    </div>
                    <div class="col-md-6">
                        <div class="chart-card p-3 bg-white rounded-3 shadow-sm"><canvas id="feeChart"
                                height="250"></canvas></div>
                    </div>
                </div>

                <div id="feeWarning" class="alert alert-danger mt-4 d-none"></div>
                <div id="expiryWarning" class="alert alert-warning mt-4 d-none"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let studentId = localStorage.getItem('studentId') || localStorage.getItem('userId');
        let attendanceChart = null, feeChart = null;

        function setupSidebar() {
            const toggleBtn = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (!toggleBtn) return;
            function closeSidebar() { if (sidebar) sidebar.classList.remove('show'); if (overlay) overlay.classList.remove('show'); }
            function openSidebar() { if (sidebar) sidebar.classList.add('show'); if (overlay) overlay.classList.add('show'); }
            toggleBtn.addEventListener('click', openSidebar);
            if (overlay) overlay.addEventListener('click', closeSidebar);
            window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });
        }

        async function loadStudentInfo() {
            try {
                const res = await fetch(`/api/student/info/${studentId}`);
                if (!res.ok) {
                    throw new Error('خطا در دریافت اطلاعات');
                }
                const data = await res.json();
                document.getElementById('studentCardId').innerText = data.student_card_id || '-';
                document.getElementById('studentName').innerText = data.name || '-';
                document.getElementById('studentClass').innerText = data.class_name || '-';
                document.getElementById('studentNameSidebar').innerText = data.name || 'شاگرد';
            } catch (err) {
                console.error(err);
                document.getElementById('studentNameSidebar').innerText = 'شاگرد';
            }
        }

        async function loadStats() {
            try {
                const res = await fetch(`/api/student/stats/${studentId}`);
                const data = await res.json();
                document.getElementById('avgGrade').innerText = data.avg_grade || 0;
                if (attendanceChart) attendanceChart.destroy();
                attendanceChart = new Chart(document.getElementById('attendanceChart'), { type: 'doughnut', data: { labels: ['حاضر', 'تأخیر', 'غایب'], datasets: [{ data: [data.present_count || 0, data.late_count || 0, data.absent_count || 0], backgroundColor: ['#10b981', '#f59e0b', '#dc2626'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom' } } } });
            } catch (err) { console.error(err); }
        }

        async function loadFeeStatus() {
            try {
                const res = await fetch(`/api/student/fees/${studentId}`);
                const data = await res.json();
                if (feeChart) feeChart.destroy();
                feeChart = new Chart(document.getElementById('feeChart'), { type: 'pie', data: { labels: ['پرداخت شده', 'باقی مانده'], datasets: [{ data: [data.paid_fee || 0, data.remaining_fee || 0], backgroundColor: ['#10b981', '#dc2626'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom' } } } });
                if (data.due_date && new Date(data.due_date) < new Date() && data.remaining_fee > 0) {
                    document.getElementById('feeWarning').innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ⚠️ هشدار! فیس شما منقضی شده است. لطفاً هرچه سریعتر پرداخت کنید.`;
                    document.getElementById('feeWarning').classList.remove('d-none');
                }
                if (data.due_date && new Date(data.due_date) < new Date() && data.remaining_fee > 0) {
                    document.getElementById('expiryWarning').innerHTML = `<i class="fa-solid fa-clock"></i> تاریخ انقضای فیس شما گذشته است!`;
                    document.getElementById('expiryWarning').classList.remove('d-none');
                }
            } catch (err) { console.error(err); }
        }

        setupSidebar();
        loadStudentInfo();
        loadStats();
        loadFeeStatus();
    </script>
</body>

</html>
