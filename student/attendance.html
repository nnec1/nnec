<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>گزارش حاضری من | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        .badge-present {
            background: #dcfce7;
            color: #15803d;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .badge-absent {
            background: #fee2e2;
            color: #dc2626;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .badge-late {
            background: #fef3c7;
            color: #b45309;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1050;
            background: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .sidebar {
                position: fixed;
                right: -280px;
                width: 280px;
                z-index: 1040;
                transition: right 0.3s;
                height: 100%;
                top: 0;
            }

            .sidebar.show {
                right: 0;
            }

            .main-content {
                width: 100%;
                margin-right: 0;
                padding: 80px 15px 25px 15px;
            }

            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                z-index: 1030;
                display: none;
            }

            .overlay.show {
                display: block;
            }
        }
    </style>
</head>

<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">
                <div class="text-center py-4">
                    <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-2"
                        style="width:70px;height:70px;background:linear-gradient(135deg,#10b981,#059669)">
                        <i class="fa-solid fa-graduation-cap fs-1 text-white"></i>
                    </div>
                    <h5 class="text-white mb-0">پنل شاگرد</h5>
                    <small class="text-muted" id="studentNameSidebar">نام شاگرد</small>
                </div>
                <nav class="nav flex-column mt-2">
                    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> پیشخوان</a>
                    <a href="attendance.html" class="nav-link active"><i class="fa-solid fa-calendar-check"></i>
                        حاضری</a>
                    <a href="grades.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> نمرات</a>
                    <a href="fees.html" class="nav-link"><i class="fa-solid fa-money-bill-wave"></i> فیس</a>
                    <a href="complaints.html" class="nav-link"><i class="fa-solid fa-message"></i> شکایات</a>
                    <a href="profile.html" class="nav-link"><i class="fa-solid fa-user-circle"></i> پروفایل</a>
                    <hr class="text-secondary mx-3 my-2">
                    <a href="#" class="nav-link" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i>
                        خروج</a>
                </nav>
            </div>

            <div class="col-md-9 col-lg-10 main-content">
                <h3 class="section-title"><i class="fa-solid fa-calendar-check text-success me-2"></i> گزارش حاضری من
                </h3>

                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <select class="form-select" id="attendanceMonth">
                            <option value="1">فروردین</option>
                            <option value="2">اردیبهشت</option>
                            <option value="3">خرداد</option>
                            <option value="4">تیر</option>
                            <option value="5">مرداد</option>
                            <option value="6">شهریور</option>
                            <option value="7">مهر</option>
                            <option value="8">آبان</option>
                            <option value="9">آذر</option>
                            <option value="10">دی</option>
                            <option value="11">بهمن</option>
                            <option value="12">اسفند</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="number" class="form-control" id="attendanceYear" value="2025">
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary" onclick="loadAttendance()"><i
                                class="fa-solid fa-magnifying-glass"></i> نمایش</button>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-secondary" onclick="printReport()"><i class="fa-solid fa-print"></i>
                            چاپ</button>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-4">
                        <div class="stat-card text-center">
                            <i class="fa-solid fa-check-circle fs-1 text-success"></i>
                            <h2 id="totalPresent">0</h2>
                            <small>حاضر</small>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card text-center">
                            <i class="fa-solid fa-clock fs-1 text-warning"></i>
                            <h2 id="totalLate">0</h2>
                            <small>تأخیر</small>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card text-center">
                            <i class="fa-solid fa-xmark-circle fs-1 text-danger"></i>
                            <h2 id="totalAbsent">0</h2>
                            <small>غایب</small>
                        </div>
                    </div>
                </div>

                <div class="table-container">
                    <div class="table-responsive">
                        <table class="table table-bordered">
                            <thead class="table-light">
                                <tr>
                                    <th>تاریخ</th>
                                    <th>وضعیت</th>
                                    <th>یادداشت</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceList">
                                <tr>
                                    <td colspan="3" class="text-center py-4">لطفاً ماه و سال را انتخاب کنید
                    </div>
                </div>
            </div>
            </tr>
            </tbody>
            </table>
        </div>
    </div>
    </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let studentId = localStorage.getItem('studentId') || localStorage.getItem('userId');

        function setupSidebar() {
            const toggleBtn = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (!toggleBtn) return;
            function closeSidebar() { if (sidebar) sidebar.classList.remove('show'); if (overlay) overlay.classList.remove('show'); }
            function openSidebar() { if (sidebar) sidebar.classList.add('show'); if (overlay) overlay.classList.add('show'); }
            toggleBtn.addEventListener('click', openSidebar);
            if (overlay) overlay.addEventListener('click', closeSidebar);
            window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            try {
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return dateString;
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}/${month}/${day}`;
            } catch (e) {
                return dateString;
            }
        }

        async function loadAttendance() {
            const month = document.getElementById('attendanceMonth').value;
            const year = document.getElementById('attendanceYear').value;

            const resultDiv = document.getElementById('attendanceList');
            resultDiv.innerHTML = '<tr><td colspan="3" class="text-center py-4"><div class="spinner-border text-success"></div> در حال بارگیری...</div></div></div></tr>';

            try {
                const res = await fetch(`/api/student/attendance/${studentId}?month=${month}&year=${year}`);
                const data = await res.json();

                document.getElementById('totalPresent').innerText = data.present || 0;
                document.getElementById('totalLate').innerText = data.late || 0;
                document.getElementById('totalAbsent').innerText = data.absent || 0;

                if (data.details && data.details.length > 0) {
                    let html = '';
                    for (const d of data.details) {
                        let badgeClass = '', statusText = '';
                        if (d.status === 'present') {
                            badgeClass = 'badge-present';
                            statusText = 'حاضر';
                        } else if (d.status === 'absent') {
                            badgeClass = 'badge-absent';
                            statusText = 'غایب';
                        } else {
                            badgeClass = 'badge-late';
                            statusText = 'تأخیر';
                        }
                        html += `<tr>
                            <td class="text-dark">${formatDate(d.date)}</div></div></div>
                            <td class="text-dark"><span class="${badgeClass}">${statusText}</span></div></div></div>
                            <td class="text-dark">${d.notes || '-'}</div></div></div>
                        </div></div></div>`;
                    }
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-4">هیچ حاضری در این ماه ثبت نشده است</div></div></div></tr>';
                }
            } catch (err) {
                console.error(err);
                resultDiv.innerHTML = '<tr><td colspan="3" class="text-center text-danger py-4">خطا در بارگیری اطلاعات</div></div></div></tr>';
            }
        }

        function printReport() {
            const month = document.getElementById('attendanceMonth').options[document.getElementById('attendanceMonth').selectedIndex]?.text || '';
            const year = document.getElementById('attendanceYear').value;
            const content = document.querySelector('.table-container').innerHTML;
            const stats = document.querySelector('.row.g-4.mb-4').innerHTML;
            const win = window.open('', '_blank');
            win.document.write(`
                <html dir="rtl">
                <head>
                    <title>گزارش حاضری - ${month} ${year}</title>
                    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
                    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
                    <style>
                        body { padding: 20px; }
                        @media print {
                            .no-print { display: none; }
                        }
                    </style>
                </head>
                <body>
                    <div class="container">
                        <div class="text-center mb-4">
                            <h3>گزارش حاضری</h3>
                            <p>${month} ${year}</p>
                        </div>
                        ${stats}
                        ${content}
                        <div class="text-center mt-4 text-muted small">
                            تاریخ چاپ: ${new Date().toLocaleDateString('fa-IR')}
                        </div>
                    </div>
                    <script>
                        window.onload = function() { window.print(); setTimeout(() => window.close(), 500); };
                    <\/script>
                </body>
                </html>
            `);
            win.document.close();
        }

        // بارگذاری خودکار حاضری ماه جاری
        const currentDate = new Date();
        const currentMonth = currentDate.getMonth() + 1;
        const currentYear = currentDate.getFullYear();
        document.getElementById('attendanceMonth').value = currentMonth;
        document.getElementById('attendanceYear').value = currentYear;

        setupSidebar();
        loadAttendance();

        // بارگذاری مجدد هر 30 ثانیه (برای به‌روزرسانی خودکار)
        setInterval(loadAttendance, 30000);
    </script>
</body>

</html>
