<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>شکایات من</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">...</div>
            <div class="col-md-9 col-lg-10 main-content">
                <div class="d-flex justify-content-between flex-wrap gap-2 mb-4">
                    <h3 class="section-title"><i class="bi bi-chat-dots-fill text-primary me-2"></i> شکایات من</h3>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#complaintModal"><i
                            class="bi bi-plus-circle"></i> شکایت جدید</button>
                </div>
                <div id="complaintsList"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="complaintModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white">
                    <h5 class="modal-title"><i class="bi bi-chat-dots-fill"></i> ثبت شکایت جدید</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="complaintForm">
                        <div class="mb-3"><label class="form-label">موضوع</label><input type="text" class="form-control"
                                id="subject" required></div>
                        <div class="mb-3"><label class="form-label">شرح شکایت</label><textarea class="form-control"
                                rows="5" id="message" required></textarea></div>
                        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-send"></i> ارسال
                            شکایت</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let studentId = localStorage.getItem('studentId') || localStorage.getItem('userId');

        async function loadComplaints() {
            const res = await fetch('/api/complaints');
            let complaints = await res.json();
            complaints = complaints.filter(c => c.student_id == studentId);
            if (complaints.length === 0) { document.getElementById('complaintsList').innerHTML = '<div class="alert alert-info text-center">هیچ شکایتی ثبت نشده است</div>'; return; }
            document.getElementById('complaintsList').innerHTML = complaints.map(c => `
                <div class="card mb-3 p-3 ${c.status === 'resolved' ? 'border-success' : 'border-warning'}">
                    <div class="d-flex justify-content-between"><div><h6><i class="bi bi-chat-dots-fill text-primary"></i> ${c.subject}</h6><small>${new Date(c.created_at).toLocaleDateString('fa-IR')}</small></div><div><span class="badge ${c.status === 'pending' ? 'bg-warning' : 'bg-success'}">${c.status === 'pending' ? 'در انتظار پاسخ' : 'پاسخ داده شد'}</span></div></div>
                    <hr><p>${c.message}</p>${c.response ? `<div class="alert alert-success mt-2"><strong>پاسخ مدیر:</strong><br>${c.response}</div>` : ''}
                </div>
            `).join('');
        }

        document.getElementById('complaintForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = { student_id: studentId, subject: document.getElementById('subject').value, message: document.getElementById('message').value };
            const res = await fetch('/api/complaints', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            if (res.ok) {
                alert('شکایت شما با موفقیت ثبت شد');
                bootstrap.Modal.getInstance(document.getElementById('complaintModal')).hide();
                loadComplaints();
                document.getElementById('complaintForm').reset();
            } else alert('خطا');
        });

        loadComplaints();
    </script>
</body>

</html>
