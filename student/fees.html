<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>وضعیت فیس من | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        .stat-card { background: white; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1050;
            background: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar { position: fixed; right: -280px; width: 280px; z-index: 1040; transition: right 0.3s; height: 100%; top: 0; }
            .sidebar.show { right: 0; }
            .main-content { width: 100%; margin-right: 0; padding: 80px 15px 25px 15px; }
            .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1030; display: none; }
            .overlay.show { display: block; }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">
                <div class="text-center py-4">
                    <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-2" style="width:70px;height:70px;background:linear-gradient(135deg,#10b981,#059669)">
                        <i class="fa-solid fa-graduation-cap fs-1 text-white"></i>
                    </div>
                    <h5 class="text-white mb-0">پنل شاگرد</h5>
                    <small class="text-muted" id="studentNameSidebar">نام شاگرد</small>
                </div>
                <nav class="nav flex-column mt-2">
                    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> پیشخوان</a>
                    <a href="attendance.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> حاضری</a>
                    <a href="grades.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> نمرات</a>
                    <a href="fees.html" class="nav-link active"><i class="fa-solid fa-money-bill-wave"></i> فیس</a>
                    <a href="complaints.html" class="nav-link"><i class="fa-solid fa-message"></i> شکایات</a>
                    <a href="profile.html" class="nav-link"><i class="fa-solid fa-user-circle"></i> پروفایل</a>
                    <hr class="text-secondary mx-3 my-2">
                    <a href="#" class="nav-link" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> خروج</a>
                </nav>
            </div>

            <div class="col-md-9 col-lg-10 main-content">
                <h3 class="section-title"><i class="fa-solid fa-money-bill-wave text-success me-2"></i> وضعیت فیس من</h3>

                <div class="row g-4 mb-4">
                    <div class="col-md-3"><div class="stat-card text-center"><i class="fa-solid fa-receipt fs-1 text-primary"></i><h3 id="feeMain">0</h3><small>فیس کل</small></div></div>
                    <div class="col-md-3"><div class="stat-card text-center"><i class="fa-solid fa-circle-check fs-1 text-success"></i><h3 id="feePaid">0</h3><small>پرداخت شده</small></div></div>
                    <div class="col-md-3"><div class="stat-card text-center"><i class="fa-solid fa-triangle-exclamation fs-1 text-danger"></i><h3 id="feeRemaining">0</h3><small>باقی مانده</small></div></div>
                    <div class="col-md-3"><div class="stat-card text-center"><i class="fa-regular fa-calendar-circle-exclamation fs-1 text-warning"></i><h4 id="feeExpiry">-</h4><small>تاریخ انقضا</small></div></div>
                </div>

                <div id="overdueWarning" class="alert alert-danger d-none"></div>

                <div class="table-container">
                    <h5><i class="fa-solid fa-clock-rotate-left"></i> تاریخچه پرداخت‌ها</h5>
                    <div class="table-responsive">
                        <table class="table">
                            <thead class="table-light"><tr><th>تاریخ</th><th>مبلغ</th><th>فیس کل</th><th>پرداخت شده (کل)</th><th>باقی مانده</th><th>تاریخ انقضا</th><th>شماره رسید</th><th>یادداشت</th></tr></thead>
                            <tbody id="paymentHistory"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let studentId = localStorage.getItem('studentId') || localStorage.getItem('userId');

        function setupSidebar() {
            const toggleBtn = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (!toggleBtn) return;
            function closeSidebar() { if (sidebar) sidebar.classList.remove('show'); if (overlay) overlay.classList.remove('show'); }
            function openSidebar() { if (sidebar) sidebar.classList.add('show'); if (overlay) overlay.classList.add('show'); }
            toggleBtn.addEventListener('click', openSidebar);
            if (overlay) overlay.addEventListener('click', closeSidebar);
            window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            try { const d = new Date(dateString); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
            catch (e) { return dateString; }
        }

        async function loadFeeStatus() {
            try {
                const res = await fetch(`/api/student/fees/${studentId}`);
                const data = await res.json();
                document.getElementById('feeMain').innerText = (data.total_fee || 0).toLocaleString();
                document.getElementById('feePaid').innerText = (data.paid_fee || 0).toLocaleString();
                document.getElementById('feeRemaining').innerText = (data.remaining_fee || 0).toLocaleString();
                document.getElementById('feeExpiry').innerText = formatDate(data.due_date) || '-';
                if (data.due_date && new Date(data.due_date) < new Date() && data.remaining_fee > 0) {
                    document.getElementById('overdueWarning').innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ⚠️ هشدار! فیس شما منقضی شده است. لطفاً هرچه سریعتر پرداخت کنید.`;
                    document.getElementById('overdueWarning').classList.remove('d-none');
                }
            } catch (err) { console.error(err); }
        }

        async function loadPaymentHistory() {
            try {
                const res = await fetch(`/api/student/payments/${studentId}`);
                const payments = await res.json();
                if (payments.length === 0) { document.getElementById('paymentHistory').innerHTML = '<td><td colspan="8" class="text-center text-muted py-4">هیچ پرداختی ثبت نشده است</div></div></div></td>'; return; }
                document.getElementById('paymentHistory').innerHTML = payments.map(p => `<tr><td class="text-dark">${formatDate(p.payment_date)}</div></div></div><td class="text-success">${(p.amount || 0).toLocaleString()} AFN</div></div></div><td class="text-dark">${(p.total_fee || 0).toLocaleString()} AFN</div></div></div><td class="text-success">${(p.paid_fee || 0).toLocaleString()} AFN</div></div></div><td class="${(p.remaining_after || 0) > 0 ? 'text-danger' : 'text-success'}">${(p.remaining_after || 0).toLocaleString()} AFN</div></div></div><td class="text-dark">${formatDate(p.due_date)}</div></div></div><td class="text-dark">${p.receipt_number || '-'}</div></div></div><td class="text-dark">${p.notes || '-'}</div></div></div></tr>`).join('');
            } catch (err) { console.error(err); }
        }

        setupSidebar();
        loadFeeStatus();
        loadPaymentHistory();
        setInterval(loadFeeStatus, 30000);
    </script>
</body>
</html>
