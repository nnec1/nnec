<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>چت با مدیر | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        * {
            box-sizing: border-box;
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 150px);
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        /* هدر چت */
        .chat-header {
            padding: 15px 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .admin-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .admin-info {
            flex: 1;
        }
        .admin-name {
            font-weight: 600;
            font-size: 16px;
        }
        .admin-status {
            font-size: 11px;
            opacity: 0.8;
        }
        .back-btn {
            color: white;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 12px;
        }
        /* منطقه پیام‌ها */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8fafc;
        }
        .message {
            display: flex;
            max-width: 80%;
        }
        .message-sent {
            align-self: flex-end;
        }
        .message-received {
            align-self: flex-start;
        }
        .message-bubble {
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }
        .message-sent .message-bubble {
            background: #10b981;
            color: white;
            border-bottom-left-radius: 4px;
        }
        .message-received .message-bubble {
            background: white;
            border: 1px solid #e2e8f0;
            border-bottom-right-radius: 4px;
        }
        .message-time {
            font-size: 10px;
            margin-top: 4px;
            text-align: center;
            color: #94a3b8;
        }
        /* ناحیه ورودی */
        .chat-input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        .chat-input-area input {
            flex: 1;
            border-radius: 30px;
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
        }
        .chat-input-area input:focus {
            outline: none;
            border-color: #10b981;
        }
        .chat-input-area button {
            background: #10b981;
            border: none;
            border-radius: 30px;
            padding: 0 20px;
            color: white;
            font-weight: 600;
            transition: 0.2s;
        }
        .chat-input-area button:hover {
            background: #059669;
        }
        .empty-chat {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
            text-align: center;
            flex-direction: column;
        }
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1050;
            background: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar { position: fixed; right: -280px; width: 280px; z-index: 1040; transition: right 0.3s; height: 100%; top: 0; }
            .sidebar.show { right: 0; }
            .main-content { width: 100%; margin-right: 0; padding: 80px 10px 10px 10px; }
            .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1030; display: none; }
            .overlay.show { display: block; }
            .message { max-width: 90%; }
        }
        .date-divider {
            text-align: center;
            margin: 10px 0;
        }
        .date-divider span {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #475569;
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">
                <div class="text-center py-4">
                    <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-2" style="width:70px;height:70px;background:linear-gradient(135deg,#10b981,#059669)">
                        <i class="fa-solid fa-graduation-cap fs-1 text-white"></i>
                    </div>
                    <h5 class="text-white mb-0">پنل شاگرد</h5>
                    <small class="text-muted" id="studentNameSidebar">نام شاگرد</small>
                </div>
                <nav class="nav flex-column mt-2">
                    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> پیشخوان</a>
                    <a href="attendance.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> حاضری</a>
                    <a href="grades.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> نمرات</a>
                    <a href="fees.html" class="nav-link"><i class="fa-solid fa-money-bill-wave"></i> فیس</a>
                    <a href="complaints.html" class="nav-link"><i class="fa-solid fa-message"></i> شکایات</a>
                    <a href="chat.html" class="nav-link active"><i class="fa-solid fa-comments"></i> چت با مدیر</a>
                    <a href="profile.html" class="nav-link"><i class="fa-solid fa-user-circle"></i> پروفایل</a>
                    <hr class="text-secondary mx-3 my-2">
                    <a href="#" class="nav-link" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> خروج</a>
                </nav>
            </div>

            <div class="col-md-9 col-lg-10 main-content">
                <h3 class="section-title"><i class="fa-solid fa-comments text-success me-2"></i> چت با مدیریت</h3>

                <div class="chat-container">
                    <!-- هدر چت -->
                    <div class="chat-header">
                        <div class="admin-avatar">
                            <i class="fa-solid fa-building"></i>
                        </div>
                        <div class="admin-info">
                            <div class="admin-name">مدیریت آموزشگاه</div>
                            <div class="admin-status">آنلاین</div>
                        </div>
                        <button class="back-btn" onclick="window.location.href='dashboard.html'">
                            <i class="fa-solid fa-arrow-right"></i> بازگشت
                        </button>
                    </div>

                    <!-- منطقه پیام‌ها -->
                    <div class="chat-messages" id="chatMessages">
                        <div class="empty-chat">
                            <i class="fa-solid fa-comments fs-1 text-muted"></i>
                            <p class="mt-2">در حال بارگیری پیام‌ها...</p>
                        </div>
                    </div>

                    <!-- ناحیه ورودی -->
                    <div class="chat-input-area">
                        <input type="text" id="messageInput" placeholder="پیام خود را بنویسید..." onkeypress="if(event.keyCode===13) sendMessage()">
                        <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i> ارسال</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let studentId = localStorage.getItem('studentId') || localStorage.getItem('userId');
        let adminId = 2; // آیدی مدیر پیش‌فرض
        let messagesInterval = null;

        function setupSidebar() {
            const toggleBtn = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (!toggleBtn) return;
            function closeSidebar() { if (sidebar) sidebar.classList.remove('show'); if (overlay) overlay.classList.remove('show'); }
            function openSidebar() { if (sidebar) sidebar.classList.add('show'); if (overlay) overlay.classList.add('show'); }
            toggleBtn.addEventListener('click', openSidebar);
            if (overlay) overlay.addEventListener('click', closeSidebar);
            window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });
        }

        function formatTime(dateString) {
            if (!dateString) return '';
            try {
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return dateString;
                return d.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
            } catch(e) { return dateString; }
        }

        function formatFullDate(dateString) {
            if (!dateString) return '';
            try {
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return dateString;
                return d.toLocaleDateString('fa-IR');
            } catch(e) { return dateString; }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadStudentInfo() {
            try {
                const res = await fetch(`/api/student/info/${studentId}`);
                const data = await res.json();
                document.getElementById('studentNameSidebar').innerText = data.name || 'شاگرد';
            } catch(err) { console.error(err); }
        }

        async function loadMessages() {
            try {
                const res = await fetch(`/api/messages/conversation/student/${studentId}`);
                const messages = await res.json();
                
                const container = document.getElementById('chatMessages');
                if (!container) return;
                
                if (!messages || messages.length === 0) {
                    container.innerHTML = `
                        <div class="empty-chat">
                            <i class="fa-solid fa-comments fs-1 text-muted"></i>
                            <p class="mt-2">هیچ پیامی وجود ندارد.</p>
                            <p class="small text-muted">اولین پیام را ارسال کنید.</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                let lastDate = '';
                for (const m of messages) {
                    const isOwn = m.sender_type === 'student' && m.sender_id == studentId;
                    const messageDate = formatFullDate(m.created_at);
                    
                    if (lastDate !== messageDate) {
                        html += `<div class="date-divider"><span>${messageDate}</span></div>`;
                        lastDate = messageDate;
                    }
                    
                    html += `
                        <div class="message ${isOwn ? 'message-sent' : 'message-received'}">
                            <div class="message-bubble">
                                ${escapeHtml(m.message)}
                                <div class="message-time">${formatTime(m.created_at)}</div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
                
                // اسکرول به پایین
                container.scrollTop = container.scrollHeight;
                
            } catch (err) {
                console.error(err);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            input.disabled = true;
            
            try {
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        receiver_type: 'admin',
                        receiver_id: adminId,
                        subject: 'پیام از شاگرد',
                        message: message
                    })
                });
                
                if (res.ok) {
                    input.value = '';
                    await loadMessages();
                } else {
                    alert('❌ خطا در ارسال پیام');
                }
            } catch (err) {
                alert('❌ خطا در ارتباط با سرور');
            } finally {
                input.disabled = false;
                input.focus();
            }
        }

        // شروع پولینگ برای دریافت پیام‌های جدید (هر 3 ثانیه)
        function startPolling() {
            if (messagesInterval) clearInterval(messagesInterval);
            messagesInterval = setInterval(loadMessages, 3000);
        }

        setupSidebar();
        loadStudentInfo();
        loadMessages();
        startPolling();
        
        // توقف پولینگ هنگام خروج از صفحه
        window.addEventListener('beforeunload', () => {
            if (messagesInterval) clearInterval(messagesInterval);
        });
        
        window.sendMessage = sendMessage;
    </script>
</body>
</html>
