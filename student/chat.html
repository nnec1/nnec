<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>چت با مدیر | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        /* همان استایل‌های قبلی با اضافه شدن استایل‌های ویرایش و حذف */
        .message {
            position: relative;
        }

        .message-actions {
            position: absolute;
            top: 0;
            display: none;
            gap: 5px;
            background: white;
            padding: 2px 8px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message-sent .message-actions {
            left: -70px;
        }

        .message-received .message-actions {
            right: -70px;
        }

        .message:hover .message-actions {
            display: flex;
        }

        .message-actions button {
            background: none;
            border: none;
            font-size: 12px;
            cursor: pointer;
        }

        .message-actions .edit-btn {
            color: #f59e0b;
        }

        .message-actions .delete-btn {
            color: #dc2626;
        }

        .edited-badge {
            font-size: 9px;
            opacity: 0.7;
            margin-left: 5px;
        }

        @media (max-width: 768px) {
            .message-actions {
                display: flex !important;
                position: static;
                margin-top: 5px;
                justify-content: center;
            }

            .message-sent .message-actions {
                left: auto;
            }

            .message-received .message-actions {
                right: auto;
            }
        }
    </style>
</head>

<body>
    <!-- همان ساختار قبلی پنل شاگرد -->
    <script>
        let studentId = localStorage.getItem('studentId') || localStorage.getItem('userId');
        let adminId = 2;
        let messagesInterval = null;

        // توابع کمکی (formatTime, formatFullDate, escapeHtml)

        async function loadMessages() {
            try {
                const res = await fetch(`/api/messages/conversation/student/${studentId}`);
                const messages = await res.json();
                const container = document.getElementById('chatMessages');
                if (!container) return;
                if (messages.length === 0) { container.innerHTML = '<div class="empty-chat">...</div>'; return; }
                let html = '', lastDate = '';
                for (const m of messages) {
                    const isOwn = m.sender_type === 'student' && m.sender_id == studentId;
                    const messageDate = formatFullDate(m.created_at);
                    if (lastDate !== messageDate) { html += `<div class="date-divider"><span>${messageDate}</span></div>`; lastDate = messageDate; }
                    html += `<div class="message ${isOwn ? 'message-sent' : 'message-received'}">
                        <div class="message-bubble">
                            <div id="msg-text-${m.id}">${escapeHtml(m.message)}${m.is_edited ? '<span class="edited-badge">(ویرایش شده)</span>' : ''}</div>
                            <div class="message-time">${formatTime(m.created_at)}</div>
                        </div>
                        ${isOwn ? `<div class="message-actions"><button class="edit-btn" onclick="editMessage(${m.id})"><i class="fa-solid fa-pen"></i></button><button class="delete-btn" onclick="deleteMessage(${m.id})"><i class="fa-solid fa-trash"></i></button></div>` : ''}
                    </div>`;
                }
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            } catch (err) { console.error(err); }
        }

        async function editMessage(messageId) {
            const msgDiv = document.getElementById(`msg-text-${messageId}`);
            const oldText = msgDiv.innerText.replace('(ویرایش شده)', '').trim();
            const newText = prompt('ویرایش پیام:', oldText);
            if (!newText || newText === oldText) return;
            const res = await fetch(`/api/messages/${messageId}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: newText })
            });
            if (res.ok) loadMessages();
            else alert('❌ خطا در ویرایش پیام');
        }

        async function deleteMessage(messageId) {
            if (!confirm('آیا از حذف این پیام اطمینان دارید؟')) return;
            const res = await fetch(`/api/messages/${messageId}`, { method: 'DELETE' });
            if (res.ok) loadMessages();
            else alert('❌ خطا در حذف پیام');
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            input.disabled = true;
            const res = await fetch('/api/messages', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ receiver_type: 'admin', receiver_id: adminId, subject: 'پیام از شاگرد', message })
            });
            if (res.ok) { input.value = ''; loadMessages(); }
            else alert('❌ خطا در ارسال پیام');
            input.disabled = false; input.focus();
        }

        loadMessages();
        messagesInterval = setInterval(loadMessages, 3000);
        window.sendMessage = sendMessage;
        window.editMessage = editMessage;
        window.deleteMessage = deleteMessage;
    </script>
</body>

</html>
