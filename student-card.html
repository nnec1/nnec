<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>کارت شناسایی شاگرد | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .id-card {
            width: 85mm;
            height: 54mm;
            background: #1e293b;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            direction: rtl;
            border-radius: 4px;
        }

        .card-header {
            background: #1e293b;
            padding: 4px 8px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
        .inst-name {
            font-size: 9px;
            font-weight: bold;
            color: white;
        }
        .inst-tagline {
            font-size: 6px;
            color: #94a3b8;
        }

        .card-body {
            display: flex;
            flex-direction: row;
            height: calc(100% - 38px);
            padding: 6px;
            background: #1e293b;
        }

        .left-section {
            flex: 1.3;
            background: transparent;
            padding: 4px 6px;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .right-section {
            flex: 0.9;
            background: rgba(255, 255, 255, 0.06);
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .student-photo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #10b981;
            background: #f1f5f9;
            display: block;
            margin: 0 auto 6px auto;
        }

        .info-row {
            display: flex;
            margin-bottom: 4px;
            font-size: 8px;
            color: white;
        }

        .info-label {
            width: 52px;
            font-weight: 700;
            color: #94a3b8;
        }

        .info-value {
            flex: 1;
            color: white;
            font-weight: 500;
        }

        .badge-status {
            background: #10b981;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 7px;
            font-weight: 600;
            display: inline-block;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 6px;
        }

        .school-logo {
            width: 40px;
            height: 40px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 4px;
        }

        .school-logo i {
            font-size: 1.3rem;
            color: white;
        }

        .logo-text {
            font-size: 7px;
            color: #94a3b8;
            font-weight: 600;
        }

        .qr-box {
            background: white;
            border-radius: 8px;
            padding: 4px;
            text-align: center;
        }

        .qr-hint {
            font-size: 6px;
            color: #94a3b8;
            margin-top: 3px;
            text-align: center;
        }

        .btn-container {
            text-align: center;
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-print, .btn-close {
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-print { background: #1e293b; }
        .btn-close { background: #64748b; }
        .btn-print:hover, .btn-close:hover {
            opacity: 0.85;
            transform: translateY(-2px);
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .btn-container {
                display: none;
            }
            .id-card {
                box-shadow: none;
                margin: 0;
                width: 85mm;
                height: 54mm;
            }
            .card-header, .card-body, .left-section, .right-section {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .student-photo {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>

<body>
    <div>
        <div class="id-card" id="idCard">
            <div class="card-header">
                <div class="inst-name" id="instituteName">آموزشگاه نوی نور</div>
                <div class="inst-tagline" id="instituteTagline">پیشرو در آموزش</div>
            </div>
            <div class="card-body">
                <div class="left-section">
                    <img id="studentPhoto" src="/default-avatar.png" class="student-photo" onerror="this.src='/default-avatar.png'">
                    <div class="info-row"><div class="info-label">نام:</div><div class="info-value" id="studentName">-</div></div>
                    <div class="info-row"><div class="info-label">نام پدر:</div><div class="info-value" id="studentFather">-</div></div>
                    <div class="info-row"><div class="info-label">صنف:</div><div class="info-value" id="studentClass">-</div></div>
                    <div class="info-row"><div class="info-label">شماره:</div><div class="info-value" id="studentPhone">-</div></div>
                    <div class="info-row"><div class="info-label">آیدی:</div><div class="info-value" id="studentCardId">-</div></div>
                    <div class="info-row"><div class="info-label">وضعیت:</div><div class="info-value"><span class="badge-status" id="studentStatus">فعال</span></div></div>
                </div>
                <div class="right-section">
                    <div class="logo-container">
                        <div class="school-logo"><i class="bi bi-mortarboard-fill"></i></div>
                        <div class="logo-text">نوی نور</div>
                    </div>
                    <div class="qr-box" id="qrcode"></div>
                    <div class="qr-hint">اسکن برای ورود</div>
                </div>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn-print" onclick="printCard()"><i class="bi bi-printer"></i> چاپ کارت</button>
            <button class="btn-close" onclick="window.close()"><i class="bi bi-x-lg"></i> بستن</button>
        </div>
    </div>

    <script>
        let currentStudentData = null;
        let currentQrToken = null;

        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('id');

        if (!studentId) {
            document.getElementById('idCard').innerHTML = '<div class="alert alert-danger m-4">❌ آیدی شاگرد مشخص نشده است</div>';
        } else {
            loadStudentInfo(studentId);
            loadInstituteSettings();
        }

        async function loadInstituteSettings() {
            try {
                const res = await fetch('/api/settings');
                const settings = await res.json();
                if (settings.institute_name) document.getElementById('instituteName').innerText = settings.institute_name;
                if (settings.institute_tagline) document.getElementById('instituteTagline').innerText = settings.institute_tagline;
            } catch (e) {}
        }

        async function loadStudentInfo(id) {
            try {
                const response = await fetch(`/api/students/${id}`);
                const student = await response.json();

                if (student && student.id) {
                    currentStudentData = student;
                    currentQrToken = student.qr_token || `STU_${student.id}`;
                    
                    document.getElementById('studentName').innerText = student.name || '-';
                    document.getElementById('studentFather').innerText = student.father_name || '-';
                    document.getElementById('studentClass').innerText = student.class_name || '-';
                    document.getElementById('studentCardId').innerText = student.student_card_id || `STU-${student.id}`;
                    document.getElementById('studentPhone').innerText = student.phone || '-';
                    
                    let statusText = 'فعال';
                    if (student.status === 'graduated') statusText = 'فارغ‌التحصیل';
                    else if (student.status === 'disabled') statusText = 'غیرفعال';
                    document.getElementById('studentStatus').innerHTML = statusText;

                    if (student.photo) document.getElementById('studentPhoto').src = student.photo;

                    const qrUrl = `${window.location.origin}/login-with-qr.html?qr=${currentQrToken}`;
                    document.getElementById('qrcode').innerHTML = '';
                    new QRCode(document.getElementById("qrcode"), {
                        text: qrUrl,
                        width: 65,
                        height: 65,
                        colorDark: "#1e293b",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                } else {
                    showError('شاگرد یافت نشد');
                }
            } catch (error) {
                console.error(error);
                showError('خطا در دریافت اطلاعات شاگرد');
            }
        }

        function showError(message) {
            document.getElementById('idCard').innerHTML = `<div class="alert alert-danger m-4">${message}</div>`;
        }

        // تابع چاپ - مستقیماً پنجره پرینت مرورگر را باز می‌کند
        function printCard() {
            window.print();
        }
    </script>
</body>

</html>
