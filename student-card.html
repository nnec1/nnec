<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>کارت شناسایی شاگرد | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* اندازه استاندارد کارت ID (لنداسکیپ) - 85mm x 54mm */
        .id-card {
            width: 85mm;
            height: 54mm;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
            direction: rtl;
        }

        /* هدر کارت - سرمه‌ای */
        .card-header {
            background: #1e293b;
            padding: 6px 12px;
            height: 32px;
        }

        .inst-name {
            font-size: 11px;
            font-weight: 800;
            color: white;
            line-height: 1.2;
        }

        .inst-tagline {
            font-size: 7px;
            color: rgba(255, 255, 255, 0.8);
        }

        /* بدنه اصلی - دو بخش */
        .card-body {
            display: flex;
            flex-direction: row;
            height: calc(100% - 32px);
        }

        /* بخش چپ - سفید (اطلاعات شاگرد) */
        .left-section {
            flex: 1.3;
            background: white;
            padding: 6px 8px;
            display: flex;
            flex-direction: column;
        }

        /* بخش راست - سرمه‌ای (لوگو + QR) */
        .right-section {
            flex: 0.9;
            background: #1e293b;
            padding: 6px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* عکس شاگرد - 55x55 دایره (مناسب کارت کوچک) */
        .student-photo {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #10b981;
            background: #f1f5f9;
            display: block;
            margin: 0 auto 6px auto;
        }

        /* ردیف اطلاعات - فشرده */
        .info-row {
            display: flex;
            margin-bottom: 4px;
            font-size: 8px;
        }

        .info-label {
            width: 50px;
            font-weight: 700;
            color: #475569;
        }

        .info-value {
            flex: 1;
            color: #1e293b;
            font-weight: 600;
        }

        /* نشانگر وضعیت */
        .badge-status {
            background: #10b981;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 7px;
            font-weight: 600;
            display: inline-block;
        }

        /* لوگو در بخش راست */
        .logo-container {
            text-align: center;
            margin-bottom: 6px;
        }

        .school-logo {
            width: 35px;
            height: 35px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 5px;
        }

        .school-logo i {
            font-size: 1.2rem;
            color: white;
        }

        .logo-text {
            font-size: 7px;
            color: #94a3b8;
            font-weight: 600;
        }

        /* باکس QR - کوچک */
        .qr-box {
            background: white;
            border-radius: 8px;
            padding: 4px;
            text-align: center;
        }

        .qr-hint {
            font-size: 6px;
            color: #94a3b8;
            margin-top: 3px;
            text-align: center;
        }

        /* چاپ - حذف فضاهای اضافی، اندازه دقیق */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            .no-print {
                display: none;
            }

            .id-card {
                box-shadow: none;
                margin: 0;
                padding: 0;
                width: 85mm;
                height: 54mm;
                border-radius: 0;
            }

            .card-header {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .right-section {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .student-photo {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            /* حذف فضاهای خالی */
            body,
            .id-card,
            .card-body,
            .left-section,
            .right-section {
                margin: 0;
                padding: 0;
            }

            .left-section {
                padding: 4px 6px;
            }

            .right-section {
                padding: 4px 6px;
            }

            .info-row {
                margin-bottom: 3px;
            }
        }

        /* دکمه‌ها در صفحه (برای چاپ) */
        .print-btn-container {
            text-align: center;
            margin-top: 20px;
        }

        .btn-print {
            background: #10b981;
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-close {
            background: #64748b;
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <div>
        <!-- کارت با اندازه استاندارد -->
        <div class="id-card" id="idCard">
            <!-- هدر سرمه‌ای -->
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center">
                    <div><i class="bi bi-mortarboard-fill text-white" style="font-size: 14px;"></i></div>
                    <div class="text-center">
                        <div class="inst-name" id="instituteName">آموزشگاه نوی نور</div>
                        <div class="inst-tagline" id="instituteTagline">پیشرو در آموزش</div>
                    </div>
                    <div><i class="bi bi-stars text-white" style="font-size: 12px;"></i></div>
                </div>
            </div>

            <!-- بدنه -->
            <div class="card-body">
                <!-- بخش چپ: اطلاعات شاگرد (سفید) -->
                <div class="left-section">
                    <img id="studentPhoto" src="/default-avatar.png" class="student-photo"
                        onerror="this.src='/default-avatar.png'">

                    <div class="info-row">
                        <div class="info-label">نام:</div>
                        <div class="info-value" id="studentName">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">نام پدر:</div>
                        <div class="info-value" id="studentFather">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">صنف:</div>
                        <div class="info-value" id="studentClass">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">آیدی:</div>
                        <div class="info-value" id="studentCardId">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">وضعیت:</div>
                        <div class="info-value"><span class="badge-status" id="studentStatus">فعال</span></div>
                    </div>
                </div>

                <!-- بخش راست: لوگو + QR (سرمه‌ای) -->
                <div class="right-section">
                    <div class="logo-container">
                        <div class="school-logo">
                            <i class="bi bi-mortarboard-fill"></i>
                        </div>
                        <div class="logo-text">نوی نور</div>
                    </div>
                    <div class="qr-box" id="qrcode"></div>
                    <div class="qr-hint">
                        اسکن برای ورود
                    </div>
                </div>
            </div>
        </div>

        <!-- دکمه‌های خارج از کارت (برای چاپ) -->
        <div class="print-btn-container no-print">
            <button class="btn-print" onclick="printCard()"><i class="bi bi-printer"></i> چاپ کارت</button>
            <button class="btn-close" onclick="window.close()"><i class="bi bi-x-lg"></i> بستن</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('id');

        if (!studentId) {
            document.getElementById('idCard').innerHTML = '<div class="alert alert-danger m-4">❌ آیدی شاگرد مشخص نشده است</div>';
        } else {
            loadStudentInfo(studentId);
            loadInstituteSettings();
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            try {
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return dateString;
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            } catch (e) { return dateString; }
        }

        async function loadInstituteSettings() {
            try {
                const res = await fetch('/api/settings');
                const settings = await res.json();
                if (settings.institute_name) {
                    document.getElementById('instituteName').innerText = settings.institute_name;
                }
                if (settings.institute_tagline) {
                    document.getElementById('instituteTagline').innerText = settings.institute_tagline;
                }
            } catch (e) { }
        }

        async function loadStudentInfo(id) {
            try {
                const response = await fetch(`/api/students/${id}`);
                const student = await response.json();

                if (student && student.id) {
                    document.getElementById('studentName').innerText = student.name || '-';
                    document.getElementById('studentFather').innerText = student.father_name || '-';
                    document.getElementById('studentClass').innerText = student.class_name || '-';
                    document.getElementById('studentCardId').innerText = student.student_card_id || `STU-${student.id}`;
                    document.getElementById('regDate') && (document.getElementById('regDate').innerText = formatDate(student.registration_date));

                    let statusText = 'فعال';
                    if (student.status === 'graduated') statusText = 'فارغ‌التحصیل';
                    else if (student.status === 'disabled') statusText = 'غیرفعال';
                    document.getElementById('studentStatus').innerHTML = statusText;

                    if (student.photo) document.getElementById('studentPhoto').src = student.photo;

                    const qrToken = student.qr_token || `STU_${student.id}`;
                    const qrUrl = `${window.location.origin}/login-with-qr.html?qr=${qrToken}`;

                    document.getElementById('qrcode').innerHTML = '';
                    new QRCode(document.getElementById("qrcode"), {
                        text: qrUrl,
                        width: 65,
                        height: 65,
                        colorDark: "#1e293b",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                } else {
                    showError('شاگرد یافت نشد');
                }
            } catch (error) {
                console.error(error);
                showError('خطا در دریافت اطلاعات شاگرد');
            }
        }

        function showError(message) {
            document.getElementById('idCard').innerHTML = `<div class="alert alert-danger m-4">${message}</div>`;
        }

        function printCard() {
            const originalTitle = document.title;
            document.title = 'کارت شناسایی شاگرد';
            window.print();
            document.title = originalTitle;
        }
    </script>
</body>

</html>
