<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کارت شناسایی شاگرد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* کارت */
        .card {
            width: 85mm;
            height: 54mm;
            background: #1e293b;
            border-radius: 4px;
            overflow: hidden;
            direction: rtl;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* هدر */
        .card-header {
            background: #0f172a;
            padding: 5px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }

        .inst-name {
            font-size: 10px;
            font-weight: bold;
            color: white;
        }

        .inst-tagline {
            font-size: 7px;
            color: #94a3b8;
        }

        /* بدنه */
        .card-body {
            display: flex;
            padding: 8px;
            gap: 8px;
        }

        /* بخش اطلاعات */
        .info-section {
            flex: 1;
        }

        .photo {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #f1f5f9;
            border: 2px solid #10b981;
            margin: 0 auto 8px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 24px;
        }

        .info-row {
            display: flex;
            margin-bottom: 4px;
            font-size: 8px;
            color: white;
        }

        .info-label {
            width: 50px;
            font-weight: bold;
            color: #94a3b8;
        }

        .info-value {
            flex: 1;
        }

        .status-badge {
            background: #10b981;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 7px;
            display: inline-block;
        }

        /* بخش QR */
        .qr-section {
            width: 90px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }

        .logo {
            width: 35px;
            height: 35px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 5px;
            font-size: 18px;
            color: white;
        }

        .logo-text {
            font-size: 7px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .qr-box {
            background: white;
            border-radius: 6px;
            padding: 4px;
        }

        .qr-hint {
            font-size: 6px;
            color: #94a3b8;
            margin-top: 4px;
        }

        /* دکمه */
        .btn-print {
            margin-top: 20px;
            background: #1e293b;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-print:hover {
            background: #0f172a;
        }

        /* چاپ */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            .btn-print {
                display: none;
            }

            .card {
                box-shadow: none;
                margin: 0;
                width: 85mm;
                height: 54mm;
            }

            .card-header,
            .card-body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>

<body>

    <div class="card" id="studentCard">
        <div class="card-header">
            <div class="inst-name" id="instName">آموزشگاه نوی نور</div>
            <div class="inst-tagline" id="instTagline">پیشرو در آموزش</div>
        </div>
        <div class="card-body">
            <div class="info-section">
                <div class="photo" id="photoArea">
                    🧑‍🎓
                </div>
                <div class="info-row">
                    <div class="info-label">نام:</div>
                    <div class="info-value" id="studentName">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">نام پدر:</div>
                    <div class="info-value" id="studentFather">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">صنف:</div>
                    <div class="info-value" id="studentClass">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">شماره:</div>
                    <div class="info-value" id="studentPhone">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">آیدی:</div>
                    <div class="info-value" id="studentCardId">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">وضعیت:</div>
                    <div class="info-value"><span class="status-badge" id="studentStatus">فعال</span></div>
                </div>
            </div>
            <div class="qr-section">
                <div class="logo">🎓</div>
                <div class="logo-text">نوی نور</div>
                <div class="qr-box" id="qrcode"></div>
                <div class="qr-hint">اسکن کنید</div>
            </div>
        </div>
    </div>

    <button class="btn-print" onclick="window.print();">🖨️ چاپ کارت</button>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script>
        const studentId = new URLSearchParams(window.location.search).get('id');

        async function loadData() {
            if (!studentId) return;

            try {
                // بارگیری تنظیمات آموزشگاه
                const settingsRes = await fetch('/api/settings');
                const settings = await settingsRes.json();
                if (settings.institute_name) document.getElementById('instName').innerText = settings.institute_name;
                if (settings.institute_tagline) document.getElementById('instTagline').innerText = settings.institute_tagline;
            } catch (e) { }

            try {
                // بارگیری اطلاعات شاگرد
                const studentRes = await fetch(`/api/students/${studentId}`);
                const s = await studentRes.json();

                if (s.id) {
                    document.getElementById('studentName').innerText = s.name || '-';
                    document.getElementById('studentFather').innerText = s.father_name || '-';
                    document.getElementById('studentClass').innerText = s.class_name || '-';
                    document.getElementById('studentPhone').innerText = s.phone || '-';
                    document.getElementById('studentCardId').innerText = s.student_card_id || `STU-${s.id}`;

                    let status = 'فعال';
                    if (s.status === 'graduated') status = 'فارغ‌التحصیل';
                    if (s.status === 'disabled') status = 'غیرفعال';
                    document.getElementById('studentStatus').innerHTML = status;

                    // ساخت QR کد
                    const qrToken = s.qr_token || `STU_${s.id}`;
                    const qrUrl = `${window.location.origin}/login-with-qr.html?qr=${qrToken}`;
                    document.getElementById('qrcode').innerHTML = '';
                    new QRCode(document.getElementById("qrcode"), {
                        text: qrUrl,
                        width: 60,
                        height: 60,
                        colorDark: "#1e293b",
                        colorLight: "#ffffff"
                    });
                }
            } catch (e) {
                console.error('خطا:', e);
            }
        }

        loadData();

        // دکمه چاپ - ساده
        window.printCard = function () {
            window.print();
        };
    </script>
</body>

</html>
