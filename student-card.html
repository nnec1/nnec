<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کارت شناسایی شاگرد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #cbd5e1, #e2e8f0);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* کارت با گرادینت آبی زیبا */
        .card {
            width: 90mm;
            height: 57mm;
            background: linear-gradient(145deg, #1e3a5f, #2563eb, #1e40af);
            border-radius: 10px;
            overflow: hidden;
            direction: rtl;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
            position: relative;
        }

        /* افکت شاین روی کارت */
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 120%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transform: rotate(25deg);
            transition: left 0.6s;
        }

        .card:hover::before {
            left: 100%;
        }

        /* هدر */
        .card-header {
            background: rgba(0, 0, 0, 0.15);
            padding: 6px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .inst-name {
            font-size: 12px;
            font-weight: bold;
            color: white;
            letter-spacing: 0.5px;
        }

        .inst-tagline {
            font-size: 8px;
            color: #bfdbfe;
        }

        /* بدنه */
        .card-body {
            display: flex;
            padding: 10px 12px;
            gap: 12px;
        }

        /* بخش اطلاعات */
        .info-section {
            flex: 1.4;
        }

        /* آیکون شاگرد - یک آیکون ثابت و شیک */
        .student-avatar {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            margin: 0 auto 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.3s;
        }

        .student-avatar:hover {
            transform: scale(1.05);
        }

        .info-row {
            display: flex;
            margin-bottom: 8px;
            font-size: 11px;
            color: white;
        }

        .info-label {
            width: 55px;
            font-weight: bold;
            color: #bfdbfe;
        }

        .info-value {
            flex: 1;
            color: white;
            font-weight: 600;
        }

        .status-badge {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1e3a5f;
            padding: 3px 10px;
            border-radius: 25px;
            font-size: 10px;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        /* بخش QR */
        .qr-section {
            width: 100px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            backdrop-filter: blur(2px);
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 6px;
            font-size: 20px;
            color: #1e3a5f;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }

        .logo-text {
            font-size: 8px;
            color: #bfdbfe;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .qr-box {
            background: white;
            border-radius: 10px;
            padding: 6px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
        }

        .qr-hint {
            font-size: 7px;
            color: #bfdbfe;
            margin-top: 6px;
        }

        /* دکمه چاپ */
        .btn-print {
            margin-top: 28px;
            background: linear-gradient(135deg, #1e3a5f, #1e40af);
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.25);
            transition: all 0.3s;
        }

        .btn-print:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
            background: linear-gradient(135deg, #1e40af, #1e3a5f);
        }

        /* تنظیمات چاپ */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            .btn-print {
                display: none;
            }

            .card {
                box-shadow: none;
                margin: 0;
                width: 90mm;
                height: 57mm;
                border-radius: 0;
            }

            .card-header,
            .card-body,
            .student-avatar,
            .logo,
            .status-badge {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>

<body>

    <div class="card" id="studentCard">
        <div class="card-header">
            <div class="inst-name" id="instName">آموزشگاه نوی نور</div>
            <div class="inst-tagline" id="instTagline">پیشرو در آموزش و توانمندسازی</div>
        </div>
        <div class="card-body">
            <div class="info-section">
                <!-- آیکون ثابت و شیک شاگرد -->
                <div class="student-avatar" id="studentAvatar">
                    🧑‍🎓
                </div>
                <div class="info-row">
                    <div class="info-label">نام:</div>
                    <div class="info-value" id="studentName">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">نام پدر:</div>
                    <div class="info-value" id="studentFather">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">صنف:</div>
                    <div class="info-value" id="studentClass">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">شماره:</div>
                    <div class="info-value" id="studentPhone">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">آیدی:</div>
                    <div class="info-value" id="studentCardId">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">وضعیت:</div>
                    <div class="info-value"><span class="status-badge" id="studentStatus">فعال</span></div>
                </div>
            </div>
            <div class="qr-section">
                <div class="logo">🎓</div>
                <div class="logo-text">نوی نور</div>
                <div class="qr-box" id="qrcode"></div>
                <div class="qr-hint">اسکن برای ورود</div>
            </div>
        </div>
    </div>

    <button class="btn-print" onclick="window.print();">🖨️ چاپ کارت</button>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script>
        const studentId = new URLSearchParams(window.location.search).get('id');

        async function loadData() {
            if (!studentId) return;

            try {
                // بارگیری تنظیمات آموزشگاه
                const settingsRes = await fetch('/api/settings');
                const settings = await settingsRes.json();
                if (settings.institute_name) document.getElementById('instName').innerText = settings.institute_name;
                if (settings.institute_tagline) document.getElementById('instTagline').innerText = settings.institute_tagline;
            } catch (e) { }

            try {
                // بارگیری اطلاعات شاگرد
                const studentRes = await fetch(`/api/students/${studentId}`);
                const s = await studentRes.json();

                if (s.id) {
                    document.getElementById('studentName').innerText = s.name || '-';
                    document.getElementById('studentFather').innerText = s.father_name || '-';
                    document.getElementById('studentClass').innerText = s.class_name || '-';
                    document.getElementById('studentPhone').innerText = s.phone || '-';
                    document.getElementById('studentCardId').innerText = s.student_card_id || `STU-${s.id}`;

                    let status = 'فعال';
                    if (s.status === 'graduated') status = 'فارغ‌التحصیل';
                    if (s.status === 'disabled') status = 'غیرفعال';
                    document.getElementById('studentStatus').innerHTML = status;

                    // ساخت QR کد
                    const qrToken = s.qr_token || `STU_${s.id}`;
                    const qrUrl = `${window.location.origin}/login-with-qr.html?qr=${qrToken}`;
                    document.getElementById('qrcode').innerHTML = '';
                    new QRCode(document.getElementById("qrcode"), {
                        text: qrUrl,
                        width: 65,
                        height: 65,
                        colorDark: "#1e3a5f",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }
            } catch (e) {
                console.error('خطا:', e);
            }
        }

        loadData();

        // دکمه چاپ
        window.printCard = function () {
            window.print();
        };
    </script>
</body>

</html>
