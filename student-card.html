<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>کارت شناسایی شاگرد | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* اندازه استاندارد کارت ID (لنداسکیپ) - 85mm x 54mm */
        .id-card {
            width: 85mm;
            height: 54mm;
            background: #1e293b;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            direction: rtl;
            border-radius: 4px;
        }

        /* هدر کارت - همان رنگ سرمه‌ای */
        .card-header {
            background: #1e293b;
            padding: 4px 8px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
        .inst-name {
            font-size: 9px;
            font-weight: bold;
            color: white;
        }
        .inst-tagline {
            font-size: 6px;
            color: #94a3b8;
        }

        /* بدنه اصلی - دو بخش */
        .card-body {
            display: flex;
            flex-direction: row;
            height: calc(100% - 38px);
            padding: 6px;
            background: #1e293b;
        }

        /* بخش چپ - اطلاعات شاگرد */
        .left-section {
            flex: 1.3;
            background: transparent;
            padding: 4px 6px;
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* بخش راست - لوگو + QR */
        .right-section {
            flex: 0.9;
            background: rgba(255, 255, 255, 0.06);
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        /* عکس شاگرد - 60x60 دایره */
        .student-photo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #10b981;
            background: #f1f5f9;
            display: block;
            margin: 0 auto 6px auto;
        }

        /* ردیف اطلاعات */
        .info-row {
            display: flex;
            margin-bottom: 4px;
            font-size: 8px;
            color: white;
        }

        .info-label {
            width: 52px;
            font-weight: 700;
            color: #94a3b8;
        }

        .info-value {
            flex: 1;
            color: white;
            font-weight: 500;
        }

        /* نشانگر وضعیت */
        .badge-status {
            background: #10b981;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 7px;
            font-weight: 600;
            display: inline-block;
        }

        /* لوگو در بخش راست */
        .logo-container {
            text-align: center;
            margin-bottom: 6px;
        }

        .school-logo {
            width: 40px;
            height: 40px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 4px;
        }

        .school-logo i {
            font-size: 1.3rem;
            color: white;
        }

        .logo-text {
            font-size: 7px;
            color: #94a3b8;
            font-weight: 600;
        }

        /* باکس QR */
        .qr-box {
            background: white;
            border-radius: 8px;
            padding: 4px;
            text-align: center;
        }

        .qr-hint {
            font-size: 6px;
            color: #94a3b8;
            margin-top: 3px;
            text-align: center;
        }

        /* چاپ و PDF */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .no-print {
                display: none;
            }
            .id-card {
                box-shadow: none;
                margin: 0;
                padding: 0;
                width: 85mm;
                height: 54mm;
                border-radius: 0;
            }
            .card-header, .card-body, .left-section, .right-section {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .student-photo {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        /* دکمه‌ها */
        .btn-container {
            text-align: center;
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .btn-print, .btn-pdf {
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-print {
            background: #1e293b;
        }
        .btn-pdf {
            background: #dc2626;
        }
        .btn-close {
            background: #64748b;
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-print:hover, .btn-pdf:hover, .btn-close:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div>
        <!-- کارت با اندازه استاندارد -->
        <div class="id-card" id="idCard">
            <!-- هدر -->
            <div class="card-header">
                <div class="inst-name" id="instituteName">آموزشگاه نوی نور</div>
                <div class="inst-tagline" id="instituteTagline">پیشرو در آموزش</div>
            </div>

            <!-- بدنه -->
            <div class="card-body">
                <!-- بخش چپ: اطلاعات شاگرد -->
                <div class="left-section">
                    <img id="studentPhoto" src="/default-avatar.png" class="student-photo" onerror="this.src='/default-avatar.png'">
                    
                    <div class="info-row">
                        <div class="info-label">نام:</div>
                        <div class="info-value" id="studentName">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">نام پدر:</div>
                        <div class="info-value" id="studentFather">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">صنف:</div>
                        <div class="info-value" id="studentClass">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">شماره:</div>
                        <div class="info-value" id="studentPhone">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">آیدی:</div>
                        <div class="info-value" id="studentCardId">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">وضعیت:</div>
                        <div class="info-value"><span class="badge-status" id="studentStatus">فعال</span></div>
                    </div>
                </div>

                <!-- بخش راست: لوگو + QR -->
                <div class="right-section">
                    <div class="logo-container">
                        <div class="school-logo">
                            <i class="bi bi-mortarboard-fill"></i>
                        </div>
                        <div class="logo-text">نوی نور</div>
                    </div>
                    <div class="qr-box" id="qrcode"></div>
                    <div class="qr-hint">
                        اسکن برای ورود
                    </div>
                </div>
            </div>
        </div>

        <!-- دکمه‌ها -->
        <div class="btn-container no-print">
            <button class="btn-print" onclick="printCard()"><i class="bi bi-printer"></i> چاپ کارت</button>
            <button class="btn-pdf" onclick="downloadPDF()"><i class="bi bi-file-pdf"></i> دانلود PDF</button>
            <button class="btn-close" onclick="closeWindow()"><i class="bi bi-x-lg"></i> بستن</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('id');

        if (!studentId) {
            document.getElementById('idCard').innerHTML = '<div class="alert alert-danger m-4">❌ آیدی شاگرد مشخص نشده است</div>';
        } else {
            loadStudentInfo(studentId);
            loadInstituteSettings();
        }

        async function loadInstituteSettings() {
            try {
                const res = await fetch('/api/settings');
                const settings = await res.json();
                if (settings.institute_name) {
                    document.getElementById('instituteName').innerText = settings.institute_name;
                }
                if (settings.institute_tagline) {
                    document.getElementById('instituteTagline').innerText = settings.institute_tagline;
                }
            } catch (e) {}
        }

        async function loadStudentInfo(id) {
            try {
                const response = await fetch(`/api/students/${id}`);
                const student = await response.json();

                if (student && student.id) {
                    document.getElementById('studentName').innerText = student.name || '-';
                    document.getElementById('studentFather').innerText = student.father_name || '-';
                    document.getElementById('studentClass').innerText = student.class_name || '-';
                    document.getElementById('studentCardId').innerText = student.student_card_id || `STU-${student.id}`;
                    document.getElementById('studentPhone').innerText = student.phone || '-';
                    
                    let statusText = 'فعال';
                    if (student.status === 'graduated') statusText = 'فارغ‌التحصیل';
                    else if (student.status === 'disabled') statusText = 'غیرفعال';
                    document.getElementById('studentStatus').innerHTML = statusText;

                    if (student.photo) document.getElementById('studentPhoto').src = student.photo;

                    const qrToken = student.qr_token || `STU_${student.id}`;
                    const qrUrl = `${window.location.origin}/login-with-qr.html?qr=${qrToken}`;

                    document.getElementById('qrcode').innerHTML = '';
                    new QRCode(document.getElementById("qrcode"), {
                        text: qrUrl,
                        width: 65,
                        height: 65,
                        colorDark: "#1e293b",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                } else {
                    showError('شاگرد یافت نشد');
                }
            } catch (error) {
                console.error(error);
                showError('خطا در دریافت اطلاعات شاگرد');
            }
        }

        function showError(message) {
            document.getElementById('idCard').innerHTML = `<div class="alert alert-danger m-4">${message}</div>`;
        }

        // تابع چاپ مستقیم
        function printCard() {
            const printContent = document.getElementById('idCard').cloneNode(true);
            const originalTitle = document.title;
            document.title = 'کارت شناسایی شاگرد';
            
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html dir="rtl">
                <head>
                    <title>کارت شناسایی شاگرد</title>
                    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
                    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
                    <style>
                        * { margin: 0; padding: 0; box-sizing: border-box; }
                        body { 
                            display: flex; 
                            justify-content: center; 
                            align-items: center; 
                            min-height: 100vh; 
                            background: white;
                            margin: 0;
                            padding: 0;
                        }
                        .id-card {
                            width: 85mm;
                            height: 54mm;
                            background: #1e293b;
                            direction: rtl;
                            border-radius: 4px;
                            overflow: hidden;
                        }
                        .card-header {
                            background: #1e293b;
                            padding: 4px 8px;
                            text-align: center;
                            border-bottom: 1px solid #334155;
                        }
                        .inst-name { font-size: 9px; font-weight: bold; color: white; }
                        .inst-tagline { font-size: 6px; color: #94a3b8; }
                        .card-body { display: flex; padding: 6px; background: #1e293b; }
                        .left-section { flex: 1.3; padding: 4px 6px; color: white; }
                        .right-section { flex: 0.9; background: rgba(255,255,255,0.06); padding: 6px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; }
                        .student-photo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #10b981; margin: 0 auto 6px auto; }
                        .info-row { display: flex; margin-bottom: 4px; font-size: 8px; }
                        .info-label { width: 52px; font-weight: 700; color: #94a3b8; }
                        .info-value { flex: 1; color: white; }
                        .badge-status { background: #10b981; color: white; padding: 2px 8px; border-radius: 20px; font-size: 7px; }
                        .school-logo { width: 40px; height: 40px; background: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 4px; }
                        .school-logo i { font-size: 1.3rem; color: white; }
                        .logo-text { font-size: 7px; color: #94a3b8; }
                        .qr-box { background: white; border-radius: 8px; padding: 4px; text-align: center; }
                        .qr-hint { font-size: 6px; color: #94a3b8; margin-top: 3px; text-align: center; }
                        @media print {
                            body { margin: 0; padding: 0; }
                            .id-card { box-shadow: none; margin: 0; }
                        }
                    </style>
                </head>
                <body>
                    ${printContent.outerHTML}
                    <script>
                        window.onload = function() {
                            window.print();
                            setTimeout(function() { window.close(); }, 500);
                        };
                    <\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
            document.title = originalTitle;
        }

        // تابع دانلود PDF
        function downloadPDF() {
            const element = document.getElementById('idCard');
            const opt = {
                margin: [0, 0, 0, 0],
                filename: `کارت_شناسایی_${document.getElementById('studentName').innerText}_${document.getElementById('studentCardId').innerText}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3, letterRendering: true, useCORS: true },
                jsPDF: { unit: 'mm', format: [85, 54], orientation: 'landscape' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function closeWindow() {
            window.close();
        }
    </script>
</body>

</html>
