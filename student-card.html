<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کارت شناسایی شاگرد</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #cbd5e1, #e2e8f0);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', 'Tahoma', Geneva, Verdana, sans-serif;
        }

        .card {
            width: 90mm;
            height: 57mm;
            background: linear-gradient(145deg, #1e3a5f, #2563eb, #1e40af);
            border-radius: 8px;
            overflow: hidden;
            direction: rtl;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .card-header {
            background: rgba(0, 0, 0, 0.15);
            padding: 5px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .inst-name {
            font-size: 13px;
            font-weight: bold;
            color: white;
        }

        .inst-tagline {
            font-size: 8px;
            color: #bfdbfe;
        }

        .card-body {
            display: flex;
            padding: 8px 10px;
            gap: 10px;
            height: calc(100% - 42px);
        }

        .info-section {
            flex: 1.4;
            display: flex;
            gap: 10px;
        }

        .info-left {
            flex: 1;
        }

        .info-right {
            flex: 1;
        }

        .student-avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            margin: 0 auto 8px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .info-row {
            display: flex;
            margin-bottom: 6px;
            font-size: 10px;
            color: white;
            align-items: baseline;
        }

        .info-label {
            width: 48px;
            font-weight: bold;
            color: #bfdbfe;
            font-size: 9px;
        }

        .info-value {
            flex: 1;
            color: white;
            font-weight: 500;
            font-size: 9px;
        }

        .status-badge {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1e3a5f;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 8px;
            font-weight: bold;
            display: inline-block;
        }

        /* بخش QR - بزرگتر شده */
        .qr-section {
            width: 105px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 8px;
            text-align: center;
        }

        .logo {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 5px;
            font-size: 18px;
            color: #1e3a5f;
        }

        .logo-text {
            font-size: 8px;
            color: #bfdbfe;
            margin-bottom: 8px;
        }

        .qr-box {
            background: white;
            border-radius: 8px;
            padding: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .qr-hint {
            font-size: 7px;
            color: #bfdbfe;
            margin-top: 6px;
        }

        .btn-container {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-print,
        .btn-png {
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .btn-print {
            background: linear-gradient(135deg, #1e3a5f, #1e40af);
        }

        .btn-png {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .btn-print:hover,
        .btn-png:hover {
            transform: translateY(-2px);
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            .btn-container {
                display: none;
            }

            .card {
                box-shadow: none;
                margin: 0;
                width: 90mm;
                height: 57mm;
                border-radius: 0;
            }

            .card-header,
            .card-body,
            .student-avatar,
            .logo,
            .status-badge {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>

<body>

    <div class="card" id="studentCard">
        <div class="card-header">
            <div class="inst-name" id="instName">آموزشگاه نوی نور</div>
            <div class="inst-tagline" id="instTagline">پیشرو در آموزش و توانمندسازی</div>
        </div>
        <div class="card-body">
            <div class="info-section">
                <div class="info-left">
                    <div class="student-avatar" id="studentAvatar">🧑‍🎓</div>
                    <div class="info-row">
                        <div class="info-label">نام:</div>
                        <div class="info-value" id="studentName">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">نام پدر:</div>
                        <div class="info-value" id="studentFather">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">صنف:</div>
                        <div class="info-value" id="studentClass">-</div>
                    </div>
                </div>
                <div class="info-right">
                    <div class="info-row">
                        <div class="info-label">شماره:</div>
                        <div class="info-value" id="studentPhone">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">آیدی:</div>
                        <div class="info-value" id="studentCardId">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">وضعیت:</div>
                        <div class="info-value"><span class="status-badge" id="studentStatus">فعال</span></div>
                    </div>
                </div>
            </div>
            <div class="qr-section">
                <div class="logo">🎓</div>
                <div class="logo-text">نوی نور</div>
                <div class="qr-box" id="qrcode"></div>
                <div class="qr-hint">برای ورود اسکن کنید</div>
            </div>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-print" onclick="window.print();">🖨️ چاپ کارت</button>
        <button class="btn-png" onclick="downloadAsPNG();">📸 دانلود PNG</button>
    </div>

    <script>
        const studentId = new URLSearchParams(window.location.search).get('id');

        async function loadData() {
            if (!studentId) return;

            try {
                const settingsRes = await fetch('/api/settings');
                const settings = await settingsRes.json();
                if (settings.institute_name) document.getElementById('instName').innerText = settings.institute_name;
                if (settings.institute_tagline) document.getElementById('instTagline').innerText = settings.institute_tagline;
            } catch (e) { }

            try {
                const studentRes = await fetch(`/api/students/${studentId}`);
                const s = await studentRes.json();

                if (s.id) {
                    document.getElementById('studentName').innerText = s.name || '-';
                    document.getElementById('studentFather').innerText = s.father_name || '-';
                    document.getElementById('studentClass').innerText = s.class_name || '-';
                    document.getElementById('studentPhone').innerText = s.phone || '-';
                    document.getElementById('studentCardId').innerText = s.student_card_id || `STU-${s.id}`;

                    let status = 'فعال';
                    if (s.status === 'graduated') status = 'فارغ‌التحصیل';
                    if (s.status === 'disabled') status = 'غیرفعال';
                    document.getElementById('studentStatus').innerHTML = status;

                    // استفاده از qr_token واقعی
                    let qrToken = s.qr_token;

                    if (!qrToken || qrToken === 'null' || qrToken === '') {
                        qrToken = 'QR_' + Date.now() + '_' + Math.random().toString(36).substr(2, 10);
                        await fetch(`/api/students/update-qr-token/${studentId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ qr_token: qrToken })
                        });
                    }

                    // آدرس کامل برای QR
                    const qrUrl = `${window.location.origin}/login-with-qr.html?qr=${encodeURIComponent(qrToken)}`;
                    console.log('QR URL:', qrUrl);

                    // پاک کردن و ساخت QR جدید با اندازه بزرگتر (85x85)
                    document.getElementById('qrcode').innerHTML = '';
                    new QRCode(document.getElementById("qrcode"), {
                        text: qrUrl,
                        width: 85,
                        height: 85,
                        colorDark: "#0f172a",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }
            } catch (e) {
                console.error('خطا:', e);
                document.getElementById('qrcode').innerHTML = '<div style="color:#fbbf24;font-size:8px;">خطا</div>';
            }
        }

        async function downloadAsPNG() {
            const card = document.getElementById('studentCard');
            const originalWidth = card.style.width;
            const originalHeight = card.style.height;

            card.style.width = (90 * 3.78) + 'px';
            card.style.height = (57 * 3.78) + 'px';

            try {
                const canvas = await html2canvas(card, {
                    scale: 3,
                    backgroundColor: null,
                    useCORS: true,
                    logging: false
                });

                card.style.width = originalWidth;
                card.style.height = originalHeight;

                const link = document.createElement('a');
                const studentName = document.getElementById('studentName').innerText;
                link.download = `کارت_شناسایی_${studentName}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();

            } catch (error) {
                console.error('Error:', error);
                alert('خطا در ساخت PNG');
                card.style.width = originalWidth;
                card.style.height = originalHeight;
            }
        }

        loadData();
    </script>
</body>

</html>
