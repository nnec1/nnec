<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تنظیمات اکاونت</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">...</div>
            <div class="col-md-9 col-lg-10 main-content">
                <h3 class="section-title"><i class="bi bi-person-circle text-primary me-2"></i> تنظیمات اکاونت</h3>

                <div class="row">
                    <div class="col-md-4 text-center">
                        <img id="profilePhoto" src="/default-avatar.png" class="rounded-circle mb-3"
                            style="width:120px;height:120px;object-fit:cover;border:3px solid #667eea;">
                        <button class="btn btn-primary btn-sm"
                            onclick="document.getElementById('photoInput').click()">تغییر عکس</button>
                        <input type="file" id="photoInput" style="display:none" accept="image/*">
                    </div>
                    <div class="col-md-8">
                        <div class="card p-4">
                            <form id="profileForm" enctype="multipart/form-data">
                                <div class="mb-3"><label class="form-label">نام کامل</label><input type="text"
                                        id="fullName" class="form-control" required></div>
                                <div class="mb-3"><label class="form-label">نام پدر</label><input type="text"
                                        id="fatherName" class="form-control"></div>
                                <div class="mb-3"><label class="form-label">شماره تماس</label><input type="text"
                                        id="phone" class="form-control"></div>
                                <div class="mb-3"><label class="form-label">آدرس</label><textarea id="address"
                                        class="form-control" rows="2"></textarea></div>
                                <div class="mb-3"><label class="form-label">رمز عبور جدید</label><input type="password"
                                        id="newPassword" class="form-control" placeholder="در صورت تمایل"></div>
                                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-save"></i> ذخیره
                                    تغییرات</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let teacherId = localStorage.getItem('userId') || 3;

        async function loadProfile() {
            const res = await fetch(`/api/teacher/info/${teacherId}`);
            const data = await res.json();
            document.getElementById('fullName').value = data.name || '';
            document.getElementById('fatherName').value = data.father_name || '';
            document.getElementById('phone').value = data.phone || '';
            document.getElementById('address').value = data.home_address || '';
            if (data.photo) document.getElementById('profilePhoto').src = data.photo;
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('fullName').value);
            formData.append('father_name', document.getElementById('fatherName').value);
            formData.append('phone', document.getElementById('phone').value);
            formData.append('home_address', document.getElementById('address').value);
            const pass = document.getElementById('newPassword').value;
            if (pass) formData.append('password', pass);
            const photo = document.getElementById('photoInput').files[0];
            if (photo) formData.append('photo', photo);

            const res = await fetch(`/api/teacher/update-account/${teacherId}`, { method: 'PUT', body: formData });
            if (res.ok) {
                alert('پروفایل با موفقیت به‌روز شد');
                loadProfile();
                document.getElementById('newPassword').value = '';
            } else alert('خطا در ویرایش پروفایل');
        });

        loadProfile();
    </script>
</body>

</html>
