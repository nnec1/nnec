<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مدیریت نمرات | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1050;
            background: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .sidebar {
                position: fixed;
                right: -280px;
                width: 280px;
                z-index: 1040;
                transition: right 0.3s;
                height: 100%;
                top: 0;
            }

            .sidebar.show {
                right: 0;
            }

            .main-content {
                width: 100%;
                margin-right: 0;
                padding: 80px 15px 25px 15px;
            }

            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                z-index: 1030;
                display: none;
            }

            .overlay.show {
                display: block;
            }
        }
    </style>
</head>

<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">
                <div class="text-center py-4">
                    <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-2"
                        style="width:70px;height:70px;background:linear-gradient(135deg,#10b981,#059669)">
                        <i class="fa-solid fa-chalkboard-user fs-1 text-white"></i>
                    </div>
                    <h5 class="text-white mb-0">پنل استاد</h5>
                    <small class="text-muted" id="teacherNameSidebar">نام استاد</small>
                </div>
                <nav class="nav flex-column mt-2">
                    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> پیشخوان</a>
                    <a href="attendance.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> حاضری</a>
                    <a href="grades.html" class="nav-link active"><i class="fa-solid fa-chart-line"></i> نمرات</a>
                    <a href="class-settings.html" class="nav-link"><i class="fa-solid fa-gear"></i> تنظیمات صنف</a>
                    <a href="profile.html" class="nav-link"><i class="fa-solid fa-user-circle"></i> تنظیمات اکاونت</a>
                    <hr class="text-secondary mx-3 my-2">
                    <a href="#" class="nav-link" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i>
                        خروج</a>
                </nav>
            </div>

            <div class="col-md-9 col-lg-10 main-content">
                <h3 class="section-title"><i class="fa-solid fa-chart-line text-success me-2"></i> مدیریت نمرات</h3>

                <div class="row g-3 mb-4">
                    <div class="col-md-3"><select class="form-select" id="gradeClass" onchange="loadSubjects()">
                            <option value="">انتخاب صنف...</option>
                        </select></div>
                    <div class="col-md-3"><select class="form-select" id="gradeSubject" onchange="loadStudents()">
                            <option value="">انتخاب مضمون...</option>
                        </select></div>
                    <div class="col-md-2"><select class="form-select" id="examType">
                            <option value="quiz">Quiz</option>
                            <option value="midterm">Midterm</option>
                            <option value="final">Final</option>
                            <option value="group_project">پروژه گروهی</option>
                        </select></div>
                    <div class="col-md-2"><input type="number" class="form-control" id="maxScore" value="100"></div>
                    <div class="col-md-2"><button class="btn btn-success w-100" onclick="saveAllGrades()"><i
                                class="fa-solid fa-save"></i> ذخیره همه</button></div>
                </div>

                <div class="alert alert-info d-flex justify-content-between align-items-center"><span><i
                            class="fa-solid fa-users"></i> نمره گروهی: برای کل صنف یک نمره ثبت کنید</span><button
                        class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#groupGradeModal"><i
                            class="fa-solid fa-plus-circle"></i> نمره گروهی</button></div>

                <div class="table-container">
                    <div class="table-responsive">
                        <table class="table table-bordered align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>آیدی کارت</th>
                                    <th>نام شاگرد</th>
                                    <th>نمره (از <span id="maxScoreDisplay">100</span>)</th>
                                    <th>درصد</th>
                                    <th>Grade</th>
                                </tr>
                            </thead>
                            <tbody id="gradesStudentsList">
                                <tr>
                                    <td colspan="5" class="text-center">لطفاً صنف و مضمون را انتخاب کنید
                    </div>
                </div>
            </div>
            </td>
            </tbody>
            </table>
        </div>
    </div>
    </div>
    </div>
    </div>

    <div class="modal fade" id="groupGradeModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background:linear-gradient(135deg,#10b981,#059669);color:white">
                    <h5 class="modal-title"><i class="fa-solid fa-users"></i> نمره گروهی</h5><button type="button"
                        class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="groupGradeForm">
                        <div class="mb-3"><label class="form-label">نمره گروهی</label><input type="number"
                                class="form-control" id="groupScore" required></div>
                        <div class="mb-3"><label class="form-label">نمره کل</label><input type="number"
                                class="form-control" id="groupMaxScore" value="100" required></div>
                        <div class="mb-3"><label class="form-label">نوع امتحان</label><select class="form-select"
                                id="groupExamType">
                                <option value="group_project">پروژه گروهی</option>
                                <option value="quiz">Quiz</option>
                                <option value="midterm">Midterm</option>
                            </select></div><button type="submit" class="btn btn-primary w-100"><i
                                class="fa-solid fa-save"></i> ذخیره برای همه شاگردان</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let teacherId = localStorage.getItem('userId') || 3;
        let currentSubjectId = null;
        let currentClassId = null;
        let allStudents = [];

        function setupSidebar() {
            const toggleBtn = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (!toggleBtn) return;
            function closeSidebar() { if (sidebar) sidebar.classList.remove('show'); if (overlay) overlay.classList.remove('show'); }
            function openSidebar() { if (sidebar) sidebar.classList.add('show'); if (overlay) overlay.classList.add('show'); }
            toggleBtn.addEventListener('click', openSidebar);
            if (overlay) overlay.addEventListener('click', closeSidebar);
            window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });
        }

        async function loadClasses() {
            const res = await fetch(`/api/teacher/classes/${teacherId}`);
            const classes = await res.json();
            const select = document.getElementById('gradeClass');
            select.innerHTML = '<option value="">انتخاب صنف...</option>' + classes.map(c => `<option value="${c.id}">${c.class_name}</option>`).join('');
        }

        async function loadSubjects() {
            currentClassId = document.getElementById('gradeClass').value;
            if (!currentClassId) { document.getElementById('gradeSubject').innerHTML = '<option value="">انتخاب مضمون...</option>'; return; }
            const res = await fetch(`/api/class-subjects/${currentClassId}`);
            const subjects = await res.json();
            document.getElementById('gradeSubject').innerHTML = '<option value="">انتخاب مضمون...</option>' + subjects.map(s => `<option value="${s.subject_id}">${s.subject_name}</option>`).join('');
        }

        async function loadStudents() {
            currentSubjectId = document.getElementById('gradeSubject').value;
            if (!currentSubjectId || !currentClassId) return;
            const res = await fetch('/api/students');
            let students = await res.json();
            students = students.filter(s => s.class_id == currentClassId);
            allStudents = students;
            if (students.length === 0) { document.getElementById('gradesStudentsList').innerHTML = '<tr><td colspan="5" class="text-center">هیچ شاگردی نیست</div></div></div></td>'; return; }
            const maxScore = document.getElementById('maxScore').value;
            document.getElementById('maxScoreDisplay').innerText = maxScore;
            document.getElementById('gradesStudentsList').innerHTML = students.map(s => `<tr id="grade-row-${s.id}"><td class="text-dark">${s.student_card_id || '-'}</div></div></div><td class="text-dark"><strong>${s.name}</strong><br><small>${s.father_name || ''}</small></div></div></div><td class="text-dark"><input type="number" class="form-control grade-input" id="grade_${s.id}" style="width:100px" min="0" max="${maxScore}" step="0.5" onchange="updatePercentage(${s.id})"></div></div></div><td class="text-dark"><span id="percent_${s.id}">-</span>%</div></div></div><td class="text-dark"><span id="grade_letter_${s.id}" class="badge bg-secondary">-</span></div></div></div></tr>`).join('');
            for (const s of students) { const gradeRes = await fetch(`/api/student/grades/${s.id}`); const grades = await gradeRes.json(); const existing = grades.find(g => g.subject_id == currentSubjectId && g.exam_type === document.getElementById('examType').value); if (existing) { document.getElementById(`grade_${s.id}`).value = existing.score; updatePercentage(s.id); } }
        }

        function updatePercentage(studentId) {
            const score = parseFloat(document.getElementById(`grade_${studentId}`).value) || 0;
            const maxScore = parseFloat(document.getElementById('maxScore').value) || 100;
            const percent = ((score / maxScore) * 100).toFixed(1);
            document.getElementById(`percent_${studentId}`).innerText = percent;
            let gradeLetter = percent >= 90 ? 'A+' : percent >= 80 ? 'A' : percent >= 70 ? 'B+' : percent >= 60 ? 'B' : percent >= 50 ? 'C' : percent >= 40 ? 'D' : 'F';
            let gradeClass = percent >= 60 ? 'bg-success' : (percent >= 40 ? 'bg-warning' : 'bg-danger');
            document.getElementById(`grade_letter_${studentId}`).innerHTML = `<span class="badge ${gradeClass}">${gradeLetter}</span>`;
        }

        async function saveAllGrades() {
            if (!currentSubjectId || !currentClassId) { alert('لطفاً صنف و مضمون را انتخاب کنید'); return; }
            const maxScore = parseFloat(document.getElementById('maxScore').value) || 100;
            const examType = document.getElementById('examType').value;
            let saved = 0;
            for (const s of allStudents) { const scoreInput = document.getElementById(`grade_${s.id}`); if (scoreInput) { const score = parseFloat(scoreInput.value); if (!isNaN(score)) { await fetch('/api/teacher/save-grade', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ student_id: s.id, class_id: currentClassId, subject_id: currentSubjectId, score, max_score: maxScore, exam_type: examType, teacher_id: teacherId }) }); saved++; } } }
            alert(`${saved} نمره با موفقیت ذخیره شد`);
        }

        document.getElementById('groupGradeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentClassId || !currentSubjectId) { alert('لطفاً صنف و مضمون را انتخاب کنید'); return; }
            const score = document.getElementById('groupScore').value;
            const maxScore = document.getElementById('groupMaxScore').value;
            const examType = document.getElementById('groupExamType').value;
            const res = await fetch('/api/teacher/save-group-grade', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ class_id: currentClassId, subject_id: currentSubjectId, score, max_score: maxScore, exam_type: examType, teacher_id: teacherId }) });
            if (res.ok) { alert('نمره گروهی با موفقیت برای همه شاگردان ثبت شد'); bootstrap.Modal.getInstance(document.getElementById('groupGradeModal')).hide(); loadStudents(); }
            else alert('خطا');
        });

        document.getElementById('maxScore').addEventListener('change', () => { document.getElementById('maxScoreDisplay').innerText = document.getElementById('maxScore').value; });
        setupSidebar();
        loadClasses();
    </script>
</body>

</html>
