<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مدیریت تکالیف</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">...</div>
            <div class="col-md-9 col-lg-10 main-content">
                <div class="d-flex justify-content-between flex-wrap gap-2 mb-4">
                    <h3 class="section-title"><i class="bi bi-journal-bookmark-fill text-primary me-2"></i> مدیریت
                        تکالیف</h3>
                    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#hwModal"><i
                            class="bi bi-plus-circle"></i> تکلیف جدید</button>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-3"><select id="filterClass" class="form-select">
                            <option value="">همه صنف‌ها</option>
                        </select></div>
                    <div class="col-md-3"><button class="btn btn-primary" onclick="loadHomeworks()"><i
                                class="bi bi-search"></i> جستجو</button></div>
                </div>

                <div id="homeworksList"></div>
            </div>
        </div>
    </div>

    <!-- مودال تکلیف -->
    <div class="modal fade" id="hwModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white">
                    <h5 class="modal-title"><i class="bi bi-journal-plus"></i> تکلیف جدید</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="hwForm"><input type="hidden" id="hwId">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label">تاریخ تکلیف</label><input type="date"
                                    id="hwDate" class="form-control" required></div>
                            <div class="col-md-6"><label class="form-label">تاریخ سررسید</label><input type="date"
                                    id="dueDate" class="form-control"></div>
                            <div class="col-md-6"><label class="form-label">صنف</label><select id="hwClass"
                                    class="form-select" required>
                                    <option value="">انتخاب صنف...</option>
                                </select></div>
                            <div class="col-md-6"><label class="form-label">مضمون</label><select id="hwSubject"
                                    class="form-select" required>
                                    <option value="">ابتدا صنف را انتخاب کنید...</option>
                                </select></div>
                            <div class="col-12"><label class="form-label">متن تکلیف</label><textarea id="hwAssignment"
                                    class="form-control" rows="5" required></textarea></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-3"><i class="bi bi-save"></i>
                            ذخیره</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let teacherId = localStorage.getItem('userId') || 3;

        async function loadClassesForSelect() {
            const res = await fetch(`/api/teacher/classes/${teacherId}`);
            const classes = await res.json();
            const selectClass = document.getElementById('hwClass');
            const filterClass = document.getElementById('filterClass');
            const options = classes.map(c => `<option value="${c.id}">${c.class_name}</option>`).join('');
            selectClass.innerHTML = '<option value="">انتخاب صنف...</option>' + options;
            filterClass.innerHTML = '<option value="">همه صنف‌ها</option>' + options;

            selectClass.onchange = async () => {
                const classId = selectClass.value;
                if (classId) {
                    const subRes = await fetch(`/api/class-subjects/${classId}`);
                    const subs = await subRes.json();
                    document.getElementById('hwSubject').innerHTML = '<option value="">انتخاب مضمون...</option>' + subs.map(s => `<option value="${s.subject_id}">${s.subject_name}</option>`).join('');
                }
            };
        }

        async function loadHomeworks() {
            const classId = document.getElementById('filterClass').value;
            let url = `/api/teacher/homework/${teacherId}`;
            if (classId) url += `?class_id=${classId}`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.length === 0) {
                document.getElementById('homeworksList').innerHTML = '<div class="alert alert-info text-center">تکلیفی ثبت نشده است</div>';
                return;
            }
            document.getElementById('homeworksList').innerHTML = data.map(h => `
                <div class="card mb-3 p-3"><div class="d-flex justify-content-between flex-wrap"><div><h5><i class="bi bi-journal-bookmark-fill text-primary"></i> ${h.class_name} - ${h.subject_name}</h5><small class="text-muted"><i class="bi bi-calendar"></i> تاریخ: ${h.homework_date} | <i class="bi bi-calendar-exclamation"></i> سررسید: ${h.due_date || '-'}</small></div><div><button class="btn btn-sm btn-warning me-1" onclick="editHomework(${h.id})"><i class="bi bi-pencil"></i></button><button class="btn btn-sm btn-danger" onclick="deleteHomework(${h.id})"><i class="bi bi-trash"></i></button></div></div><hr><p>${h.assignment}</p></div>
            `).join('');
        }

        async function editHomework(id) {
            const res = await fetch(`/api/homework/${id}`);
            const h = await res.json();
            document.getElementById('hwId').value = h.id;
            document.getElementById('hwDate').value = h.homework_date;
            document.getElementById('dueDate').value = h.due_date || '';
            document.getElementById('hwClass').value = h.class_id;
            document.getElementById('hwAssignment').value = h.assignment;
            const subRes = await fetch(`/api/class-subjects/${h.class_id}`);
            const subs = await subRes.json();
            document.getElementById('hwSubject').innerHTML = subs.map(s => `<option value="${s.subject_id}" ${s.subject_id == h.subject_id ? 'selected' : ''}>${s.subject_name}</option>`).join('');
            new bootstrap.Modal(document.getElementById('hwModal')).show();
        }

        async function deleteHomework(id) {
            if (confirm('حذف شود؟')) {
                await fetch(`/api/homework/${id}`, { method: 'DELETE' });
                loadHomeworks();
            }
        }

        document.getElementById('hwForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('hwId').value;
            const data = { class_id: document.getElementById('hwClass').value, subject_id: document.getElementById('hwSubject').value, teacher_id: teacherId, homework_date: document.getElementById('hwDate').value, due_date: document.getElementById('dueDate').value, assignment: document.getElementById('hwAssignment').value };
            const url = id ? `/api/homework/${id}` : '/api/homework';
            const method = id ? 'PUT' : 'POST';
            const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            if (res.ok) {
                alert(id ? 'تکلیف ویرایش شد' : 'تکلیف اضافه شد');
                bootstrap.Modal.getInstance(document.getElementById('hwModal')).hide();
                loadHomeworks();
                document.getElementById('hwForm').reset();
                document.getElementById('hwId').value = '';
            } else alert('خطا');
        });

        loadClassesForSelect();
        loadHomeworks();
        document.getElementById('hwDate').value = new Date().toISOString().split('T')[0];
    </script>
</body>

</html>
