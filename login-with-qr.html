<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ورود با QR کد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5 text-center">
        <div class="card p-4" style="max-width:400px; margin:auto;">
            <i class="bi bi-qr-code-scan fs-1 text-primary"></i>
            <h4 class="mt-3">در حال ورود با QR کد</h4>
            <div id="status" class="mt-3">
                <div class="spinner-border text-primary"></div>
                <p class="text-muted">لطفاً صبر کنید...</p>
            </div>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('qr');
        if (!token) {
            document.getElementById('status').innerHTML = `<div class="alert alert-danger">توکن معتبر نیست</div><a href="login.html" class="btn btn-primary">بازگشت</a>`;
        } else {
            fetch('/api/student-login-with-qr', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ qr_token: token }) })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        localStorage.setItem('studentId', data.user.id);
                        localStorage.setItem('studentName', data.user.name);
                        document.getElementById('status').innerHTML = `<div class="alert alert-success">ورود موفق! در حال انتقال...</div>`;
                        setTimeout(() => window.location.href = data.redirectUrl, 1000);
                    } else {
                        document.getElementById('status').innerHTML = `<div class="alert alert-danger">${data.error || 'QR کد معتبر نیست'}</div><a href="login.html" class="btn btn-primary">بازگشت</a>`;
                    }
                })
                .catch(() => {
                    document.getElementById('status').innerHTML = `<div class="alert alert-danger">خطا در ارتباط با سرور</div><a href="login.html" class="btn btn-primary">بازگشت</a>`;
                });
        }
    </script>
</body>

</html>
