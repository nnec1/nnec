<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>تست API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            background: #f0f2f5;
        }

        .result {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .status-ok {
            border-right: 4px solid #28a745;
        }

        .status-error {
            border-right: 4px solid #dc3545;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🧪 تست API سیستم مدیریت آموزشگاه</h2>
        <div class="row g-3 mb-4">
            <div class="col-md-3"><button class="btn btn-primary w-100" onclick="testApi('/api/classes')">GET
                    /api/classes</button></div>
            <div class="col-md-3"><button class="btn btn-primary w-100" onclick="testApi('/api/subjects')">GET
                    /api/subjects</button></div>
            <div class="col-md-3"><button class="btn btn-primary w-100" onclick="testApi('/api/students')">GET
                    /api/students</button></div>
            <div class="col-md-3"><button class="btn btn-primary w-100" onclick="testApi('/api/announcements')">GET
                    /api/announcements</button></div>
        </div>
        <div id="result" class="result">در انتظار درخواست...</div>
    </div>
    <script>
        async function testApi(url) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="spinner-border text-primary"></div> در حال بارگیری...';
            try {
                const res = await fetch(url);
                const data = await res.json();
                resultDiv.innerHTML = `<div class="status-ok p-2"><strong>✅ ${url}</strong><br>وضعیت: ${res.status}<br>${JSON.stringify(data, null, 2)}</div>`;
            } catch (err) {
                resultDiv.innerHTML = `<div class="status-error p-2"><strong>❌ ${url}</strong><br>خطا: ${err.message}</div>`;
            }
        }
    </script>
</body>

</html>
