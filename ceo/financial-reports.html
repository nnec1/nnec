<div class="table-container">
    <h6>جزئیات تراکنش‌ها</h6>
    <div class="table-responsive">
        <table class="table table-sm">
            <thead>
                <tr>
                    <th>دوره</th>
                    <th>درآمد</th>
                    <th>هزینه</th>
                    <th>سود</th>
                </tr>
            </thead>
            <tbody id="detailsTable"></tbody>
            追赶
    </div>
</div>
</div>
</div>

<div class="mt-4">
    <button class="btn btn-secondary" onclick="printReport()"><i class="fa-solid fa-print"></i> چاپ گزارش</button>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/main.js"></script>
<script>
    let financeChart = null;

    function setupSidebar() {
        const toggleBtn = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        if (!toggleBtn) return;
        function closeSidebar() { if (sidebar) sidebar.classList.remove('show'); if (overlay) overlay.classList.remove('show'); }
        function openSidebar() { if (sidebar) sidebar.classList.add('show'); if (overlay) overlay.classList.add('show'); }
        toggleBtn.addEventListener('click', openSidebar);
        if (overlay) overlay.addEventListener('click', closeSidebar);
        window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });
    }

    function formatDate(dateString) {
        if (!dateString) return '-';
        try { const d = new Date(dateString); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
        catch (e) { return dateString; }
    }

    async function loadReport() {
        const period = document.getElementById('periodSelect').value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        let url = `/api/financial-reports?period=${period}`;
        if (startDate && endDate) url = `/api/financial-reports?start_date=${startDate}&end_date=${endDate}`;
        const res = await fetch(url);
        const data = await res.json();
        document.getElementById('totalIncome').innerText = (data.total_income || 0).toLocaleString();
        document.getElementById('totalExpense').innerText = (data.total_expense || 0).toLocaleString();
        document.getElementById('netProfit').innerText = (data.net_profit || 0).toLocaleString();
        if (financeChart) financeChart.destroy();
        const ctx = document.getElementById('financeChart').getContext('2d');
        financeChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.periods || [],
                datasets: [
                    { label: 'درآمد', data: data.incomes || [], backgroundColor: '#10b981', borderRadius: 8 },
                    { label: 'هزینه', data: data.expenses || [], backgroundColor: '#dc2626', borderRadius: 8 }
                ]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });
        const allPeriods = [...new Set([...(data.incomes || []).map(i => i.period_date), ...(data.expenses || []).map(e => e.period_date)])];
        let detailsHtml = '';
        allPeriods.forEach(p => {
            const income = (data.incomes || []).find(i => i.period_date === p)?.total_income || 0;
            const expense = (data.expenses || []).find(e => e.period_date === p)?.total_expense || 0;
            detailsHtml += `<tr><td class="text-dark">${p}</div></div></div><td class="text-success">${income.toLocaleString()}</div></div></div><td class="text-danger">${expense.toLocaleString()}</div></div></div><td class="${income - expense >= 0 ? 'text-success' : 'text-danger'}">${(income - expense).toLocaleString()}</div></div></div></tr>`;
        });
        document.getElementById('detailsTable').innerHTML = detailsHtml || '<td><td colspan="4" class="text-center">هیچ داده‌ای موجود نیست</div></div></div></tr>';
    }

    function printReport() { window.print(); }

    document.getElementById('startDate').value = new Date(new Date().setDate(1)).toISOString().split('T')[0];
    document.getElementById('endDate').value = new Date().toISOString().split('T')[0];
    setupSidebar();
    loadReport();
</script>
</body>

</html>
