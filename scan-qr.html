<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اسکن QR کد - ورود سریع</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .scanner-card {
            background: white;
            border-radius: 28px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        #reader {
            width: 100%;
            margin: 20px 0;
            border-radius: 20px;
            overflow: hidden;
        }

        #reader video {
            width: 100%;
            border-radius: 20px;
        }

        .btn-custom {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 12px;
            border-radius: 16px;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="scanner-card">
        <i class="bi bi-qr-code-scan fs-1 text-primary"></i>
        <h4 class="mt-2">اسکن QR کد</h4>
        <p class="text-muted">دوربین را روی QR کد کارت شناسایی بگیرید</p>
        <div id="reader"></div>
        <div id="result" class="alert alert-info d-none mt-3"></div>
        <button class="btn btn-secondary w-100 rounded-3 mt-3" onclick="closeWindow()"><i class="bi bi-x-lg"></i>
            بستن</button>
    </div>
    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const qrCodeSuccessCallback = (decodedText, decodedResult) => {
            html5QrCode.stop();
            document.getElementById('result').innerHTML = `<i class="bi bi-check-circle"></i> QR کد شناسایی شد! در حال ورود...`;
            document.getElementById('result').classList.remove('d-none');
            let token = decodedText;
            const tokenMatch = decodedText.match(/[?&]qr=([^&]+)/);
            if (tokenMatch) token = tokenMatch[1];
            fetch('/api/student-login-with-qr', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ qr_token: token }) })
                .then(r => r.json()).then(data => {
                    if (data.success) { localStorage.setItem('studentId', data.user.id); localStorage.setItem('studentName', data.user.name); window.location.href = data.redirectUrl; }
                    else { alert(data.error || 'QR کد معتبر نیست'); closeWindow(); }
                }).catch(() => { alert('خطا در ارتباط با سرور'); closeWindow(); });
        };
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 280, height: 280 } }, qrCodeSuccessCallback, (err) => console.error(err));
        function closeWindow() { if (html5QrCode.isScanning) html5QrCode.stop(); window.location.href = 'login.html'; }
    </script>
</body>

</html>
