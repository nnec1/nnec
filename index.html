<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ورود | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
        }

        .logo-circle i {
            font-size: 2.5rem;
            color: white;
        }

        .institute-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1e293b;
        }

        .institute-tagline {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 5px;
        }

        .user-type-btn {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            text-align: center;
            padding: 14px 8px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .user-type-btn i {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 8px;
        }

        .user-type-btn.active {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border-color: transparent;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }

        .user-type-btn.active i {
            color: white;
        }

        .btn-login {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s;
            color: white;
            width: 100%;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.5);
        }

        .form-control {
            border-radius: 16px;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
        }

        .form-control:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
            outline: none;
        }

        .announcement-item {
            background: #f0fdf4;
            border-right: 4px solid #10b981;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .announcement-item:hover {
            background: #dcfce7;
            transform: translateX(-4px);
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
        }

        .register-link a {
            color: #10b981;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .login-options {
            text-align: center;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .login-options a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .login-options a:hover {
            color: #10b981;
        }

        .alert-custom {
            background: #fee2e2;
            color: #dc2626;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 20px;
            display: none;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 25px;
            }

            .user-type-btn {
                padding: 10px 5px;
            }

            .user-type-btn i {
                font-size: 1.4rem;
            }

            .user-type-btn small {
                font-size: 10px;
            }

            .login-options {
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo-area">
            <div class="logo-circle">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <div class="institute-name">آموزشگاه نوی نور</div>
            <div class="institute-tagline">پیشرو در آموزش و توانمندسازی</div>
        </div>

        <div id="announcementsList" class="mb-4"></div>
        <div id="errorMsg" class="alert-custom"></div>

        <div class="row g-3 mb-4">
            <div class="col-3">
                <div class="user-type-btn" data-type="ceo">
                    <i class="fa-solid fa-user-tie"></i>
                    <small>ریس</small>
                </div>
            </div>
            <div class="col-3">
                <div class="user-type-btn active" data-type="admin">
                    <i class="fa-solid fa-people-group"></i>
                    <small>مدیر</small>
                </div>
            </div>
            <div class="col-3">
                <div class="user-type-btn" data-type="teacher">
                    <i class="fa-solid fa-chalkboard-user"></i>
                    <small>استاد</small>
                </div>
            </div>
            <div class="col-3">
                <div class="user-type-btn" data-type="student">
                    <i class="fa-solid fa-user-graduate"></i>
                    <small>شاگرد</small>
                </div>
            </div>
        </div>

        <!-- فرم لاگین برای مدیر، استاد، ریس -->
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-envelope me-2"></i> ایمیل</label>
                <input type="email" class="form-control" id="email" placeholder="example@school.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-lock me-2"></i> رمز عبور</label>
                <input type="password" class="form-control" id="password" placeholder="••••••" required>
            </div>
            <input type="hidden" id="userType" value="admin">
            <button type="submit" class="btn-login"><i class="fa-solid fa-right-to-bracket me-2"></i> ورود</button>
        </form>

        <!-- فرم لاگین شاگرد (مخفی در ابتدا) -->
        <form id="studentLoginForm" style="display: none;">
            <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-barcode me-2"></i> آیدی کارت / بارکد</label>
                <input type="text" class="form-control" id="studentCardId" placeholder="مثال: STU-2501-1234" required>
                <small class="text-muted">آیدی کارت خود را از کارت شناسایی وارد کنید</small>
            </div>
            <button type="submit" class="btn-login"><i class="fa-solid fa-right-to-bracket me-2"></i> ورود با
                بارکد</button>
        </form>

        <!-- <div class="register-link">
            <a href="register.html"><i class="fa-solid fa-user-plus me-1"></i> ثبت نام شاگرد جدید</a>
        </div> -->

        <div class="login-options">
            <a href="#" onclick="showStudentLogin()"><i class="fa-solid fa-barcode me-1"></i> ورود شاگرد با بارکد</a>
            <span class="text-muted">|</span>
            <a href="scan-qr.html"><i class="fa-solid fa-qrcode me-1"></i> ورود با QR کد</a>
        </div>
    </div>

    <script>
        // انتخاب نوع کاربر
        let currentUserType = 'admin';

        document.querySelectorAll('.user-type-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.user-type-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentUserType = this.dataset.type;
                document.getElementById('userType').value = currentUserType;

                // تغییر فرم بر اساس نوع کاربر
                const adminForm = document.getElementById('loginForm');
                const studentForm = document.getElementById('studentLoginForm');

                if (currentUserType === 'student') {
                    adminForm.style.display = 'none';
                    studentForm.style.display = 'block';
                } else {
                    adminForm.style.display = 'block';
                    studentForm.style.display = 'none';
                }
            });
        });

        // فرم لاگین برای مدیر، استاد، ریس
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const userType = document.getElementById('userType').value;

            const errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'none';

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, userType })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('userId', data.user.id);
                localStorage.setItem('userName', data.user.name);
                localStorage.setItem('userRole', userType);
                window.location.href = data.redirectUrl;
            } else {
                errorDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation me-2"></i> ${data.error}`;
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
            }
        });

        // فرم لاگین شاگرد با آیدی کارت
        document.getElementById('studentLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const studentCardId = document.getElementById('studentCardId').value;

            const errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'none';

            if (!studentCardId) {
                errorDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation me-2"></i> لطفاً آیدی کارت خود را وارد کنید`;
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/student-login-with-card', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_card_id: studentCardId })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('studentId', data.user.id);
                    localStorage.setItem('studentName', data.user.name);
                    localStorage.setItem('userRole', 'student');
                    window.location.href = data.redirectUrl;
                } else {
                    errorDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation me-2"></i> ${data.error || 'آیدی کارت معتبر نیست'}`;
                    errorDiv.style.display = 'block';
                    setTimeout(() => errorDiv.style.display = 'none', 3000);
                }
            } catch (err) {
                errorDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation me-2"></i> خطا در ارتباط با سرور`;
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
            }
        });

        // نمایش فرم ورود شاگرد (در صورت کلیک روی لینک)
        function showStudentLogin() {
            document.querySelectorAll('.user-type-btn').forEach(b => b.classList.remove('active'));
            const studentBtn = document.querySelector('.user-type-btn[data-type="student"]');
            if (studentBtn) studentBtn.classList.add('active');
            currentUserType = 'student';
            document.getElementById('userType').value = 'student';
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('studentLoginForm').style.display = 'block';
        }

        // بارگذاری اعلانات عمومی
        fetch('/api/announcements/public').then(r => r.json()).then(data => {
            const div = document.getElementById('announcementsList');
            if (data && data.length) {
                div.innerHTML = data.map(a => `
                    <div class="announcement-item">
                        <strong><i class="fa-solid fa-bullhorn text-success me-2"></i> ${a.title}</strong>
                        <p class="mb-0 small text-muted">${a.content.substring(0, 100)}${a.content.length > 100 ? '...' : ''}</p>
                    </div>
                `).join('');
            }
        }).catch(() => { });
    </script>
</body>

</html>
