<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ورود به سیستم مدیریت آموزشگاه</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .user-type-btn {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            text-align: center;
            padding: 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .user-type-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.5);
        }

        .announcement-item {
            background: #f0f9ff;
            border-right: 4px solid #667eea;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .announcement-item:hover {
            background: #e0f2fe;
            transform: translateX(-4px);
        }

        .form-control {
            border-radius: 16px;
            padding: 12px 16px;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                style="width:80px;height:80px;background:linear-gradient(135deg,#667eea,#764ba2)">
                <i class="bi bi-mortarboard-fill fs-1 text-white"></i>
            </div>
            <h3 class="mt-2">مدیریت آموزشگاه</h3>
            <p class="text-muted">سیستم جامع مدیریت آموزشی</p>
        </div>

        <div id="announcementsList" class="mb-4"></div>
        <div id="errorMsg" class="alert alert-danger d-none"></div>

        <div class="row g-3 mb-4">
            <div class="col-4">
                <div class="user-type-btn active" data-type="admin"><i
                        class="bi bi-shield-lock-fill fs-5 d-block mb-1"></i><small>مدیر</small></div>
            </div>
            <div class="col-4">
                <div class="user-type-btn" data-type="teacher"><i
                        class="bi bi-chalkboard-fill fs-5 d-block mb-1"></i><small>استاد</small></div>
            </div>
            <div class="col-4">
                <div class="user-type-btn" data-type="ceo"><i
                        class="bi bi-star-fill fs-5 d-block mb-1"></i><small>ریس</small></div>
            </div>
        </div>

        <form id="loginForm">
            <div class="mb-3"><label class="form-label">ایمیل</label><input type="email" class="form-control" id="email"
                    placeholder="example@school.com" required></div>
            <div class="mb-3"><label class="form-label">رمز عبور</label><input type="password" class="form-control"
                    id="password" placeholder="••••••" required></div>
            <input type="hidden" id="userType" value="admin">
            <button type="submit" class="btn btn-login w-100 text-white"><i class="bi bi-box-arrow-in-left"></i>
                ورود</button>
        </form>

        <hr class="my-4">
        <div class="text-center"><a href="register.html" class="btn btn-outline-primary w-100"
                style="border-radius: 16px;"><i class="bi bi-person-plus-fill"></i> ثبت نام شاگرد جدید</a></div>
        <div class="text-center mt-3"><small class="text-muted"><i class="bi bi-qr-code"></i> <a href="scan-qr.html"
                    class="text-decoration-none">ورود با QR کد</a></small></div>
    </div>

    <script>
        document.querySelectorAll('.user-type-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.user-type-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('userType').value = this.dataset.type;
            });
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const userType = document.getElementById('userType').value;
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password, userType }) });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('userId', data.user.id);
                localStorage.setItem('userName', data.user.name);
                localStorage.setItem('userRole', userType);
                window.location.href = data.redirectUrl;
            } else {
                const errDiv = document.getElementById('errorMsg');
                errDiv.innerHTML = `<i class="bi bi-exclamation-triangle-fill"></i> ${data.error}`;
                errDiv.classList.remove('d-none');
                setTimeout(() => errDiv.classList.add('d-none'), 3000);
            }
        });

        fetch('/api/announcements/public').then(r => r.json()).then(data => {
            const div = document.getElementById('announcementsList');
            if (data && data.length) { div.innerHTML = data.map(a => `<div class="announcement-item"><strong><i class="bi bi-megaphone-fill text-primary"></i> ${a.title}</strong><p class="mb-0 small text-muted">${a.content.substring(0, 100)}${a.content.length > 100 ? '...' : ''}</p></div>`).join(''); }
        });
    </script>
</body>

</html>
