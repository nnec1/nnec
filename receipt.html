<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>رسید پرداخت فیس | آموزشگاه نوی نور</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .receipt {
            width: 300px;
            max-width: 100%;
            background: white;
            padding: 15px;
            margin: 0 auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            direction: rtl;
            border-radius: 12px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            .receipt {
                box-shadow: none;
                padding: 10px;
                margin: 0;
                width: 100%;
            }

            .no-print {
                display: none;
            }
        }

        .hr {
            border-top: 1px dashed #aaa;
            margin: 8px 0;
        }

        .hr-double {
            border-top: 2px solid #333;
            margin: 8px 0;
        }

        .text-center {
            text-align: center;
        }

        .bold {
            font-weight: bold;
        }

        .small {
            font-size: 11px;
        }

        .normal {
            font-size: 13px;
        }

        .large {
            font-size: 15px;
        }

        .xlarge {
            font-size: 16px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            font-size: 13px;
            line-height: 1.4;
        }

        .row .label {
            font-weight: bold;
        }

        .amount-paid {
            color: #15803d;
            font-weight: bold;
        }

        .amount-remaining {
            color: #dc2626;
            font-weight: bold;
        }

        .warning {
            background: #fef3c7;
            color: #b45309;
            padding: 6px;
            text-align: center;
            font-size: 11px;
            margin: 8px 0;
            border-radius: 6px;
        }

        .contact {
            text-align: center;
            font-size: 11px;
            margin-top: 8px;
        }

        .receipt-title {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            margin: 5px 0;
        }

        .date-line {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin: 5px 0;
        }

        .inst-name {
            font-size: 16px;
            font-weight: bold;
            margin: 5px 0;
        }

        .fee-status {
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            margin: 8px 0;
        }

        .status-paid {
            color: #15803d;
        }

        .status-debtor {
            color: #dc2626;
        }
    </style>
</head>

<body>
    <div class="receipt" id="receipt">
        <!-- نام آموزشگاه -->
        <div class="text-center bold xlarge" id="instName">آموزشگاه نوی نور</div>
        <div class="receipt-title">رسید پرداخت فیس</div>
        <div class="hr"></div>

        <!-- تاریخ صدور و شماره رسید -->
        <div class="date-line">
            <span><strong>تاریخ صدور:</strong> <span id="issueDate">-</span></span>
            <span><strong>شماره:</strong> <span id="receiptNumber">-</span></span>
        </div>
        <div class="hr"></div>

        <!-- اطلاعات شاگرد -->
        <div class="row"><span class="label">نام شاگرد:</span><span id="studentName">-</span></div>
        <div class="row"><span class="label">نام پدر:</span><span id="studentFather">-</span></div>
        <div class="row"><span class="label">صنف:</span><span id="studentClass">-</span></div>
        <div class="row"><span class="label">آیدی کارت:</span><span id="studentCardId">-</span></div>
        <div class="hr"></div>

        <!-- اطلاعات مالی -->
        <div class="row"><span class="label">فیس کل:</span><span id="totalFee">0 AFN</span></div>
        <div class="row"><span class="label">پرداخت شده (کل):</span><span class="amount-paid" id="paidFee">0 AFN</span>
        </div>
        <div class="row"><span class="label">این پرداخت:</span><span class="amount-paid" id="paymentAmount">0 AFN</span>
        </div>
        <div class="row"><span class="label">باقی مانده:</span><span class="amount-remaining" id="remainingFee">0
                AFN</span></div>
        <div class="hr"></div>

        <!-- تاریخ‌ها -->
        <div class="row"><span class="label">تاریخ پرداخت:</span><span id="paymentDate">-</span></div>
        <div class="row"><span class="label">تاریخ انقضا:</span><span id="expiryDate">-</span></div>
        <div class="hr"></div>

        <!-- وضعیت -->
        <div class="fee-status" id="feeStatus"></div>

        <!-- یادداشت -->
        <div id="notesRow" style="display:none;" class="row"><span class="label">یادداشت:</span><span
                id="notes">-</span></div>

        <!-- متن قانونی -->
        <div class="warning">⚠️ فیس تحویل شده مسترد نمیگردد</div>

        <!-- تماس -->
        <div class="contact">📞 0781304830</div>

        <div class="hr-double"></div>
        <div class="text-center small">با تشکر از اعتماد شما</div>
    </div>

    <!-- دکمه‌های چاپ و بستن -->
    <div class="no-print" style="text-align:center; margin-top:15px;">
        <button onclick="window.print()"
            style="padding:8px 20px;background:#10b981;color:white;border:none;border-radius:8px;cursor:pointer;margin:0 5px;">🖨️
            چاپ</button>
        <button onclick="window.close()"
            style="padding:8px 20px;background:#64748b;color:white;border:none;border-radius:8px;cursor:pointer;margin:0 5px;">❌
            بستن</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);

        function formatNumber(num) {
            if (num === undefined || num === null || isNaN(num)) return '0';
            return Number(num).toLocaleString();
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            try {
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return dateString;
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            } catch (e) {
                return dateString;
            }
        }

        // دریافت مقادیر از پارامترها
        const studentName = urlParams.get('student_name') || '-';
        const studentFather = urlParams.get('student_father') || '-';
        const studentCardId = urlParams.get('student_card_id') || '-';
        const className = urlParams.get('class_name') || '-';
        const totalFee = parseFloat(urlParams.get('total_fee')) || 0;
        const paidFee = parseFloat(urlParams.get('paid_fee')) || 0;
        const remainingFee = parseFloat(urlParams.get('remaining_fee')) || 0;
        const paymentAmount = parseFloat(urlParams.get('payment_amount')) || 0;
        const paymentDate = urlParams.get('payment_date') || '-';
        const expiryDate = urlParams.get('expiry_date') || '-';
        const receiptNumber = urlParams.get('receipt_number') || '-';
        const notes = urlParams.get('notes');
        const studentStatus = urlParams.get('student_status') || '';

        // تنظیم اطلاعات در صفحه
        document.getElementById('studentName').innerText = studentName;
        document.getElementById('studentFather').innerText = studentFather;
        document.getElementById('studentClass').innerText = className;
        document.getElementById('studentCardId').innerText = studentCardId;
        document.getElementById('totalFee').innerHTML = formatNumber(totalFee) + ' AFN';
        document.getElementById('paidFee').innerHTML = formatNumber(paidFee) + ' AFN';
        document.getElementById('paymentAmount').innerHTML = formatNumber(paymentAmount) + ' AFN';
        document.getElementById('remainingFee').innerHTML = formatNumber(remainingFee) + ' AFN';
        document.getElementById('paymentDate').innerText = formatDate(paymentDate);
        document.getElementById('expiryDate').innerText = formatDate(expiryDate);
        document.getElementById('receiptNumber').innerText = receiptNumber;

        // تنظیم تاریخ صدور (امروز)
        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        document.getElementById('issueDate').innerText = todayStr;

        // تنظیم وضعیت فیس
        const feeStatusDiv = document.getElementById('feeStatus');
        if (remainingFee > 0) {
            feeStatusDiv.innerHTML = '<span class="status-debtor">⚠️ وضعیت: بدهکار - لطفاً باقی مانده را پرداخت کنید</span>';
        } else {
            feeStatusDiv.innerHTML = '<span class="status-paid">✅ وضعیت: تسویه شده - با تشکر</span>';
        }

        // نمایش یادداشت
        if (notes && notes !== 'null' && notes !== '') {
            document.getElementById('notes').innerText = notes;
            document.getElementById('notesRow').style.display = 'flex';
        }

        // بارگذاری تنظیمات آموزشگاه
        async function loadInstituteSettings() {
            try {
                const res = await fetch('/api/settings');
                const settings = await res.json();
                if (settings.institute_name) {
                    document.getElementById('instName').innerText = settings.institute_name;
                }
            } catch (e) {
                console.log('Could not load institute settings');
            }
        }

        // اگر پارامتری وجود نداشت، از localStorage استفاده کن
        if (!urlParams.get('student_name') || urlParams.get('student_name') === '-') {
            const lastReceipt = localStorage.getItem('lastReceipt');
            if (lastReceipt) {
                const data = JSON.parse(lastReceipt);
                document.getElementById('studentName').innerText = data.student_name || '-';
                document.getElementById('studentFather').innerText = data.student_father || '-';
                document.getElementById('studentClass').innerText = data.class_name || '-';
                document.getElementById('totalFee').innerHTML = formatNumber(data.total_fee) + ' AFN';
                document.getElementById('paidFee').innerHTML = formatNumber(data.paid_fee) + ' AFN';
                document.getElementById('paymentAmount').innerHTML = formatNumber(data.payment_amount) + ' AFN';
                document.getElementById('remainingFee').innerHTML = formatNumber(data.remaining_fee) + ' AFN';
                document.getElementById('paymentDate').innerText = data.payment_date || '-';
                document.getElementById('expiryDate').innerText = data.expiry_date || '-';
                document.getElementById('receiptNumber').innerText = data.receipt_number || '-';
                if (data.notes) {
                    document.getElementById('notes').innerText = data.notes;
                    document.getElementById('notesRow').style.display = 'flex';
                }
                if (data.remaining_fee > 0) {
                    feeStatusDiv.innerHTML = '<span class="status-debtor">⚠️ وضعیت: بدهکار - لطفاً باقی مانده را پرداخت کنید</span>';
                } else {
                    feeStatusDiv.innerHTML = '<span class="status-paid">✅ وضعیت: تسویه شده - با تشکر</span>';
                }
            }
        }

        // چاپ خودکار هنگام بارگذاری (اختیاری)
        // setTimeout(() => window.print(), 500);

        loadInstituteSettings();
    </script>
</body>

</html>
