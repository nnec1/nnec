<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>رسید پرداخت فیس | آموزشگاه نوی نور</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Tahoma', 'Segoe UI', monospace;
        }

        .receipt {
            width: 190px;
            max-width: 100%;
            background: white;
            padding: 6px 8px;
            margin: 0 auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            direction: rtl;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            .receipt {
                box-shadow: none;
                padding: 2px;
                margin: 0;
                width: 100%;
            }

            .no-print {
                display: none;
            }
        }

        .hr {
            border-top: 1px dashed #aaa;
            margin: 5px 0;
        }

        .hr-double {
            border-top: 2px solid #333;
            margin: 5px 0;
        }

        .text-center {
            text-align: center;
        }

        .bold {
            font-weight: bold;
        }

        .small {
            font-size: 9px;
        }

        .normal {
            font-size: 10px;
        }

        .large {
            font-size: 12px;
        }

        .logo {
            text-align: center;
            margin-bottom: 5px;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 50%;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
            font-size: 10px;
        }

        .row .label {
            font-weight: bold;
        }

        .amount-paid {
            color: #15803d;
        }

        .amount-remaining {
            color: #dc2626;
        }

        .warning {
            background: #fef3c7;
            color: #b45309;
            padding: 3px;
            text-align: center;
            font-size: 8px;
            margin: 6px 0;
            border-radius: 3px;
        }

        .contact {
            text-align: center;
            font-size: 8px;
            margin-top: 6px;
        }

        .signature {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 8px;
            padding-top: 4px;
        }

        .receipt-title {
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            margin: 3px 0;
        }

        .date-line {
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            margin: 3px 0;
        }
    </style>
</head>

<body>
    <div class="receipt">
        <div class="logo">
            <img id="logoImg" src="/default-logo.png" class="logo-img"
                onerror="this.src='https://placehold.co/40x40?text=logo'">
        </div>
        <div class="text-center bold large" id="instName">آموزشگاه نوی نور</div>
        <div class="receipt-title">رسید فیس شاگرد</div>
        <div class="hr"></div>

        <div class="date-line">
            <span>تاریخ صدور: <span id="issueDate">-</span></span>
            <span>شماره: <span id="receiptNumber">-</span></span>
        </div>
        <div class="hr"></div>

        <div class="row"><span class="label">نام:</span><span id="studentName">-</span></div>
        <div class="row"><span class="label">نام پدر:</span><span id="studentFather">-</span></div>
        <div class="row"><span class="label">صنف:</span><span id="studentClass">-</span></div>
        <div class="hr"></div>

        <div class="row"><span class="label">فیس کل:</span><span id="totalFee">0 AFN</span></div>
        <div class="row"><span class="label">پرداخت:</span><span class="amount-paid" id="paymentAmount">0 AFN</span>
        </div>
        <div class="row"><span class="label">باقی:</span><span class="amount-remaining" id="remainingFee">0 AFN</span>
        </div>
        <div class="hr"></div>

        <div class="row"><span class="label">تاریخ پرداخت:</span><span id="paymentDate">-</span></div>
        <div class="row"><span class="label">تاریخ انقضا:</span><span id="expiryDate">-</span></div>
        <div class="hr"></div>

        <div id="notesRow" style="display:none;" class="row"><span class="label">یادداشت:</span><span
                id="notes">-</span></div>

        <div class="warning">⚠️ فیس تحویل شده دوباره مسترد نمیگردد</div>
        <div class="contact">📞 0781304830</div>

        <div class="signature">
            <span>امضاء پرداخت‌کننده: ___________</span>
            <span>امضاء مسئول: ___________</span>
        </div>
        <div class="hr-double"></div>
        <div class="text-center small">با تشکر از اعتماد شما</div>
    </div>

    <div class="no-print" style="text-align:center; margin-top:15px;">
        <button onclick="window.print()"
            style="padding:8px 20px;background:#10b981;color:white;border:none;border-radius:8px;cursor:pointer;">🖨️
            چاپ رسید</button>
        <button onclick="window.close()"
            style="padding:8px 20px;background:#94a3b8;color:white;border:none;border-radius:8px;cursor:pointer;margin-right:10px;">❌
            بستن</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);

        function formatNumber(num) {
            if (num === undefined || num === null || isNaN(num)) return '0';
            return Number(num).toLocaleString();
        }

        document.getElementById('studentName').innerText = urlParams.get('student_name') || '-';
        document.getElementById('studentFather').innerText = urlParams.get('student_father') || '-';
        document.getElementById('studentClass').innerText = urlParams.get('class_name') || '-';
        document.getElementById('totalFee').innerHTML = formatNumber(urlParams.get('total_fee')) + ' AFN';
        document.getElementById('paymentAmount').innerHTML = formatNumber(urlParams.get('payment_amount')) + ' AFN';
        document.getElementById('remainingFee').innerHTML = formatNumber(urlParams.get('remaining_fee')) + ' AFN';
        document.getElementById('paymentDate').innerText = urlParams.get('payment_date') || '-';
        document.getElementById('expiryDate').innerText = urlParams.get('expiry_date') || '-';
        document.getElementById('receiptNumber').innerText = urlParams.get('receipt_number') || '-';

        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        document.getElementById('issueDate').innerText = todayStr;

        const notes = urlParams.get('notes');
        if (notes && notes !== 'null' && notes !== '') {
            document.getElementById('notes').innerText = notes;
            document.getElementById('notesRow').style.display = 'flex';
        }

        async function loadInstituteSettings() {
            try {
                const res = await fetch('/api/settings');
                const settings = await res.json();
                if (settings.institute_name) {
                    document.getElementById('instName').innerText = settings.institute_name;
                }
            } catch (e) { }
        }

        if (!urlParams.get('student_name') || urlParams.get('student_name') === '-') {
            const lastReceipt = localStorage.getItem('lastReceipt');
            if (lastReceipt) {
                const data = JSON.parse(lastReceipt);
                document.getElementById('studentName').innerText = data.student_name || '-';
                document.getElementById('studentFather').innerText = data.student_father || '-';
                document.getElementById('studentClass').innerText = data.class_name || '-';
                document.getElementById('totalFee').innerHTML = formatNumber(data.total_fee) + ' AFN';
                document.getElementById('paymentAmount').innerHTML = formatNumber(data.payment_amount) + ' AFN';
                document.getElementById('remainingFee').innerHTML = formatNumber(data.remaining_fee) + ' AFN';
                document.getElementById('paymentDate').innerText = data.payment_date || '-';
                document.getElementById('expiryDate').innerText = data.expiry_date || '-';
                document.getElementById('receiptNumber').innerText = data.receipt_number || '-';
                if (data.notes) {
                    document.getElementById('notes').innerText = data.notes;
                    document.getElementById('notesRow').style.display = 'flex';
                }
            }
        }

        loadInstituteSettings();
    </script>
</body>

</html>
