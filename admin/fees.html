<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مدیریت فیس</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .payment-card {
            background: white;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        .payment-history-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 10px;
            border-right: 4px solid #667eea;
        }

        .info-row {
            display: flex;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #e2e8f0;
        }

        .info-label {
            width: 140px;
            font-weight: 600;
            color: #475569;
        }

        .info-value {
            flex: 1;
            color: #1e293b;
        }

        .amount-pay {
            font-size: 1.8rem;
            color: #28a745;
            font-weight: bold;
        }

        .expired-badge {
            background: #dc2626;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
        }

        .paid-badge {
            background: #10b981;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
        }

        .partial-badge {
            background: #f59e0b;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
        }
    </style>
</head>

<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">
                <div class="text-center py-4">
                    <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-2"
                        style="width:70px;height:70px;background:linear-gradient(135deg,#667eea,#764ba2)">
                        <i class="bi bi-building fs-1 text-white"></i>
                    </div>
                    <h5 class="text-white mb-0">پنل مدیریت</h5>
                    <small class="text-muted" id="adminName">مدیر سیستم</small>
                </div>
                <nav class="nav flex-column mt-2">
                    <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> داشبورد</a>
                    <a href="students.html" class="nav-link"><i class="bi bi-mortarboard-fill"></i> شاگردان</a>
                    <a href="graduates.html" class="nav-link"><i class="bi bi-mortarboard-fill"></i> فارغ التحصیلان</a>
                    <a href="employees.html" class="nav-link"><i class="bi bi-people-fill"></i> کارمندان</a>
                    <a href="classes.html" class="nav-link"><i class="bi bi-grid-3x3-gap-fill"></i> صنف‌ها</a>
                    <a href="assign-teacher.html" class="nav-link"><i class="bi bi-person-plus-fill"></i> تخصیص
                        استاد</a>
                    <a href="fees.html" class="nav-link"><i class="bi bi-cash-stack"></i> مدیریت فیس</a>
                    <a href="accounts.html" class="nav-link"><i class="bi bi-cash-stack"></i> مدیریت حساب ها</a>
                    <a href="attendance.html" class="nav-link"><i class="bi bi-calendar-check-fill"></i> حاضری</a>
                    <a href="grades.html" class="nav-link"><i class="bi bi-bar-chart-steps"></i> نمرات</a>
                    <a href="reports.html" class="nav-link "><i class="bi bi-file-text-fill"></i> گزارشات</a>
                    <a href="financial-reports.html" class="nav-link "><i class="bi bi-coin"></i>گزارشات
                        مالی</a>
                    <a href="announcements.html" class="nav-link "><i class="bi bi-megaphone"></i>مدیریت
                        اعلانات</a>
                    <a href="complaints.html" class="nav-link "><i class="bi bi-building-fill-x"></i>
                        مدیریت شکایات</a>
                    <a href="subjects.html" class="nav-link "><i class="bi bi-book"></i>
                        مدیریت دروس</a>
                    <a href="settings.html" class="nav-link "><i class="bi bi-gear"></i>
                        تنظیمات</a>
                    <hr class="text-secondary mx-3 my-2">
                    <a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-right"></i>
                        خروج</a>
                </nav>
            </div>

            <div class="col-md-9 col-lg-10 main-content">
                <h3 class="section-title"><i class="bi bi-cash-stack text-primary me-2"></i> مدیریت فیس</h3>

                <!-- جستجو -->
                <div class="payment-card">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">انتخاب صنف</label>
                            <select id="feeClassFilter" class="form-select">
                                <option value="">همه صنف‌ها</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">جستجوی شاگرد</label>
                            <input type="text" id="searchStudentFee" class="form-control"
                                placeholder="نام یا آیدی کارت...">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">&nbsp;</label>
                            <button class="btn btn-primary w-100" onclick="searchStudents()">
                                <i class="bi bi-search"></i> جستجو
                            </button>
                        </div>
                    </div>
                </div>

                <!-- نتایج جستجو -->
                <div id="studentsList"></div>
            </div>
        </div>
    </div>

    <!-- مودال پرداخت فیس -->
    <div class="modal fade" id="paymentModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white">
                    <h5 class="modal-title"><i class="bi bi-cash-stack"></i> پرداخت فیس</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="paymentModalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let currentStudent = null;

        // فرمت تاریخ میلادی
        function formatDate(dateString) {
            if (!dateString) return '-';
            try {
                const d = new Date(dateString);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            } catch (e) { return dateString; }
        }

        // بارگذاری صنف‌ها
        async function loadClasses() {
            try {
                const res = await fetch('/api/classes');
                const classes = await res.json();
                document.getElementById('feeClassFilter').innerHTML = '<option value="">همه صنف‌ها</option>' +
                    classes.map(c => `<option value="${c.id}">${c.class_name}</option>`).join('');
            } catch (err) { console.error(err); }
        }

        // جستجوی شاگردان
        async function searchStudents() {
            const classId = document.getElementById('feeClassFilter').value;
            const search = document.getElementById('searchStudentFee').value;
            const res = await fetch(`/api/student-fee-search?class_id=${classId}&search=${search}`);
            const students = await res.json();

            if (students.length === 0) {
                document.getElementById('studentsList').innerHTML = '<div class="alert alert-warning">هیچ شاگردی یافت نشد</div>';
                return;
            }

            let html = '<div class="row g-4">';
            for (const s of students) {
                const isExpired = s.due_date && new Date(s.due_date) < new Date();
                const statusBadge = s.remaining_fee <= 0 ? '<span class="paid-badge">پرداخت کامل</span>' :
                    (isExpired ? '<span class="expired-badge">منقضی شده</span>' : '<span class="partial-badge">بدهکار</span>');

                html += `
                    <div class="col-md-6">
                        <div class="payment-card" style="cursor:pointer" onclick="openPaymentModal(${s.id})">
                            <div class="d-flex justify-content-between">
                                <h6><i class="bi bi-person-badge"></i> ${s.name}</h6>
                                ${statusBadge}
                            </div>
                            <p class="mb-1 text-muted small">آیدی کارت: ${s.student_card_id || '-'}</p>
                            <p class="mb-1 text-muted small">صنف: ${s.class_name}</p>
                            <p class="mb-1"><span class="text-danger">باقی مانده: ${(s.remaining_fee || 0).toLocaleString()} AFN</span></p>
                            <p class="mb-0"><small>تاریخ انقضا: ${formatDate(s.due_date)}</small></p>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            document.getElementById('studentsList').innerHTML = html;
        }

        // باز کردن مودال پرداخت با اطلاعات کامل
        async function openPaymentModal(studentId) {
            currentStudent = studentId;

            // دریافت اطلاعات کامل شاگرد
            const studentRes = await fetch(`/api/students/${studentId}`);
            const student = await studentRes.json();

            // دریافت تاریخچه پرداخت‌ها
            const paymentsRes = await fetch(`/api/student/payments/${studentId}`);
            const payments = await paymentsRes.json();

            // آخرین پرداخت (اگر وجود داشته باشد)
            const lastPayment = payments.length > 0 ? payments[0] : null;

            // محاسبه فیس پیشنهادی (مثل ماه جاری)
            const suggestedAmount = student.total_fee || 0;

            const modalBody = document.getElementById('paymentModalBody');
            modalBody.innerHTML = `
                <form id="paymentForm">
                    <!-- اطلاعات شاگرد -->
                    <div class="bg-light p-3 rounded-3 mb-3">
                        <h6><i class="bi bi-person-circle"></i> اطلاعات شاگرد</h6>
                        <div class="row">
                            <div class="col-6"><strong>نام:</strong> ${student.name}</div>
                            <div class="col-6"><strong>نام پدر:</strong> ${student.father_name || '-'}</div>
                            <div class="col-6"><strong>آیدی کارت:</strong> ${student.student_card_id || '-'}</div>
                            <div class="col-6"><strong>شماره تماس:</strong> ${student.phone || '-'}</div>
                            <div class="col-6"><strong>صنف:</strong> ${student.class_name || '-'}</div>
                            <div class="col-6"><strong>تاریخ انقضا فعلی:</strong> <span class="${new Date(student.due_date) < new Date() ? 'text-danger fw-bold' : ''}">${formatDate(student.due_date)}</span></div>
                        </div>
                    </div>
                    
                    <!-- آخرین پرداخت (تاریخ قبلی) -->
                    <div class="bg-info bg-opacity-10 p-3 rounded-3 mb-3">
                        <h6><i class="bi bi-clock-history"></i> آخرین پرداخت (تاریخچه قبلی)</h6>
                        ${lastPayment ? `
                            <div class="row">
                                <div class="col-6"><strong>تاریخ پرداخت قبلی:</strong> ${formatDate(lastPayment.payment_date)}</div>
                                <div class="col-6"><strong>مبلغ پرداخت قبلی:</strong> <span class="text-success">${lastPayment.amount.toLocaleString()} AFN</span></div>
                                <div class="col-12 mt-2"><strong>شماره رسید قبلی:</strong> ${lastPayment.receipt_number || '-'}</div>
                            </div>
                        ` : '<p class="text-muted mb-0">هیچ پرداختی قبلی ثبت نشده است</p>'}
                    </div>
                    
                    <!-- وضعیت فعلی فیس -->
                    <div class="bg-warning bg-opacity-10 p-3 rounded-3 mb-3">
                        <h6><i class="bi bi-cash-stack"></i> وضعیت فعلی فیس</h6>
                        <div class="row">
                            <div class="col-4"><strong>فیس کل:</strong> ${(student.total_fee || 0).toLocaleString()} AFN</div>
                            <div class="col-4"><strong>پرداخت شده کل:</strong> <span class="text-success">${(student.paid_fee || 0).toLocaleString()} AFN</span></div>
                            <div class="col-4"><strong>باقی مانده کل:</strong> <span class="text-danger">${(student.remaining_fee || 0).toLocaleString()} AFN</span></div>
                        </div>
                    </div>
                    
                    <input type="hidden" id="currentRemaining" value="${student.remaining_fee || 0}">
                    <input type="hidden" id="currentTotalFee" value="${student.total_fee || 0}">
                    <input type="hidden" id="currentPaidFee" value="${student.paid_fee || 0}">
                    
                    <!-- فرم پرداخت جدید -->
                    <div class="bg-white p-3 rounded-3 border">
                        <h6><i class="bi bi-plus-circle text-success"></i> پرداخت جدید</h6>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label">فیس قابل پرداخت (پیشنهادی)</label>
                                <input type="number" id="suggestedAmount" class="form-control" value="${suggestedAmount}" readonly style="background:#f1f5f9">
                                <small class="text-muted">مبلغ پیشنهادی بر اساس فیس کل</small>
                            </div>
                            <div class="col-12">
                                <label class="form-label">مبلغ پرداختی جدید <span class="text-danger">*</span></label>
                                <input type="number" id="payAmount" class="form-control" value="${student.remaining_fee || 0}" max="${student.remaining_fee || 0}" required oninput="updateRemaining()">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">تاریخ پرداخت جدید <span class="text-danger">*</span></label>
                                <input type="date" id="payDate" class="form-control" value="${new Date().toISOString().split('T')[0]}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">تاریخ انقضای جدید</label>
                                <input type="date" id="newDueDate" class="form-control">
                                <small class="text-muted">خالی بگذارید = یک ماه بعد</small>
                            </div>
                            <div class="col-12">
                                <label class="form-label">باقی مانده پس از این پرداخت</label>
                                <h4 class="text-danger" id="newRemaining">${(student.remaining_fee || 0).toLocaleString()} AFN</h4>
                            </div>
                            <div class="col-12">
                                <label class="form-label">یادداشت</label>
                                <textarea id="payNotes" class="form-control" rows="2" placeholder="توضیحات..."></textarea>
                            </div>
                        </div>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-success w-100"><i class="bi bi-printer"></i> ثبت پرداخت و چاپ رسید</button>
                        </div>
                    </div>
                </form>
            `;

            // تنظیم تاریخ انقضای جدید پیش‌فرض (یک ماه بعد)
            const today = new Date();
            const nextMonth = new Date(today);
            nextMonth.setMonth(today.getMonth() + 1);
            document.getElementById('newDueDate').value = nextMonth.toISOString().split('T')[0];

            new bootstrap.Modal(document.getElementById('paymentModal')).show();
        }

        // به‌روزرسانی باقی مانده پس از پرداخت
        function updateRemaining() {
            const currentRemaining = parseFloat(document.getElementById('currentRemaining').value) || 0;
            const payAmount = parseFloat(document.getElementById('payAmount').value) || 0;
            const newRemaining = currentRemaining - payAmount;
            document.getElementById('newRemaining').innerHTML = (newRemaining < 0 ? 0 : newRemaining).toLocaleString() + ' AFN';
        }

        // ثبت پرداخت
        document.getElementById('paymentModalBody').addEventListener('submit', async (e) => {
            if (e.target && e.target.id === 'paymentForm') {
                e.preventDefault();

                const amount = document.getElementById('payAmount').value;
                const date = document.getElementById('payDate').value;
                const newDueDate = document.getElementById('newDueDate').value;
                const notes = document.getElementById('payNotes').value;

                if (!amount || amount <= 0) { alert('مبلغ معتبر وارد کنید'); return; }
                if (!date) { alert('تاریخ پرداخت را انتخاب کنید'); return; }

                const res = await fetch('/api/collect-fee', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        student_id: currentStudent,
                        amount: parseFloat(amount),
                        payment_date: date,
                        new_due_date: newDueDate,
                        notes: notes
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    alert('پرداخت با موفقیت ثبت شد');
                    bootstrap.Modal.getInstance(document.getElementById('paymentModal')).hide();
                    searchStudents();

                    // چاپ رسید
                    printReceipt(
                        data.student_name,
                        data.student_father,
                        data.student_card_id,
                        data.total_fee,
                        data.paid_fee,
                        data.remaining_fee,
                        data.payment_amount,
                        data.payment_date,
                        data.expiry_date,
                        data.receipt_number,
                        notes
                    );
                } else {
                    alert(data.error || 'خطا در ثبت پرداخت');
                }
            }
        });

        loadClasses();
        searchStudents();
    </script>
</body>

</html>
