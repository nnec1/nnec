<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>تنظیمات سیستم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">...</div>
            <div class="col-md-9 col-lg-10 main-content">
                <h3 class="section-title">⚙️ تنظیمات سیستم</h3>

                <ul class="nav nav-tabs mb-4">
                    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#general">تنظیمات
                            عمومی</a></li>
                    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#security">امنیت</a></li>
                    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#feeSettings">تنظیمات فیس</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#backup">پشتیبان گیری</a></li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="general">
                        <div class="card p-4">
                            <form id="generalSettingsForm">
                                <div class="row g-3">
                                    <div class="col-md-6"><label>نام موسسه</label><input type="text" id="instituteName"
                                            class="form-control"></div>
                                    <div class="col-md-6"><label>شعار موسسه</label><input type="text"
                                            id="instituteTagline" class="form-control"></div>
                                    <div class="col-md-6"><label>شماره تماس</label><input type="text"
                                            id="institutePhone" class="form-control"></div>
                                    <div class="col-md-6"><label>ایمیل</label><input type="email" id="instituteEmail"
                                            class="form-control"></div>
                                    <div class="col-md-6"><label>آدرس</label><input type="text" id="instituteAddress"
                                            class="form-control"></div>
                                    <div class="col-md-6"><label>سال تحصیلی جاری</label><input type="text"
                                            id="academicYear" class="form-control" value="1404"></div>
                                    <div class="col-12"><button type="submit" class="btn btn-primary">ذخیره
                                            تنظیمات</button></div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="security">
                        <div class="card p-4">
                            <h5>تغییر رمز عبور مدیر</h5>
                            <form id="changePasswordForm">
                                <div class="mb-3"><label>رمز عبور فعلی</label><input type="password"
                                        id="currentPassword" class="form-control" required></div>
                                <div class="mb-3"><label>رمز عبور جدید</label><input type="password" id="newPassword"
                                        class="form-control" required></div>
                                <div class="mb-3"><label>تکرار رمز عبور جدید</label><input type="password"
                                        id="confirmPassword" class="form-control" required></div>
                                <button type="submit" class="btn btn-primary">تغییر رمز عبور</button>
                            </form>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="feeSettings">
                        <div class="card p-4">
                            <form id="feeSettingsForm">
                                <div class="row g-3">
                                    <div class="col-md-6"><label>هشدار انقضای فیس (روز قبل)</label><input type="number"
                                            id="feeWarningDays" class="form-control" value="7"></div>
                                    <div class="col-md-6"><label>جریمه تاخیر (درصد)</label><input type="number"
                                            id="lateFeePercent" class="form-control" value="0"></div>
                                    <div class="col-md-6"><label>پیشوند آیدی کارت</label><input type="text"
                                            id="cardIdPrefix" class="form-control" value="STU"></div>
                                    <div class="col-12"><button type="submit" class="btn btn-primary">ذخیره تنظیمات
                                            فیس</button></div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="backup">
                        <div class="card p-4 text-center">
                            <i class="bi bi-database-fill-down fs-1 text-primary"></i>
                            <h5 class="mt-3">پشتیبان گیری از دیتابیس</h5>
                            <p class="text-muted">با کلیک بر روی دکمه زیر می‌توانید از کل دیتابیس سیستم پشتیبان بگیرید.
                            </p>
                            <button class="btn btn-primary" onclick="backupDatabase()"><i class="bi bi-download"></i>
                                دریافت پشتیبان</button>
                            <hr class="my-4">
                            <i class="bi bi-arrow-repeat fs-1 text-warning"></i>
                            <h5 class="mt-3">بازنشانی سیستم</h5>
                            <p class="text-muted">توجه: این عمل تمام داده‌ها را حذف می‌کند!</p>
                            <button class="btn btn-danger" onclick="resetSystem()"><i
                                    class="bi bi-exclamation-triangle"></i> بازنشانی کامل سیستم</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/main.js"></script>
    <script>
        // بارگذاری تنظیمات ذخیره شده
        async function loadSettings() {
            const res = await fetch('/api/settings');
            const settings = await res.json();
            if (settings.institute_name) document.getElementById('instituteName').value = settings.institute_name;
            if (settings.institute_tagline) document.getElementById('instituteTagline').value = settings.institute_tagline;
            if (settings.institute_phone) document.getElementById('institutePhone').value = settings.institute_phone;
            if (settings.institute_email) document.getElementById('instituteEmail').value = settings.institute_email;
            if (settings.institute_address) document.getElementById('instituteAddress').value = settings.institute_address;
            if (settings.academic_year) document.getElementById('academicYear').value = settings.academic_year;
            if (settings.fee_warning_days) document.getElementById('feeWarningDays').value = settings.fee_warning_days;
            if (settings.late_fee_percent) document.getElementById('lateFeePercent').value = settings.late_fee_percent;
            if (settings.card_id_prefix) document.getElementById('cardIdPrefix').value = settings.card_id_prefix;
        }

        document.getElementById('generalSettingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                institute_name: document.getElementById('instituteName').value,
                institute_tagline: document.getElementById('instituteTagline').value,
                institute_phone: document.getElementById('institutePhone').value,
                institute_email: document.getElementById('instituteEmail').value,
                institute_address: document.getElementById('instituteAddress').value,
                academic_year: document.getElementById('academicYear').value
            };
            const res = await fetch('/api/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            if (res.ok) alert('تنظیمات ذخیره شد'); else alert('خطا');
        });

        document.getElementById('feeSettingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                fee_warning_days: document.getElementById('feeWarningDays').value,
                late_fee_percent: document.getElementById('lateFeePercent').value,
                card_id_prefix: document.getElementById('cardIdPrefix').value
            };
            const res = await fetch('/api/settings/fee', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            if (res.ok) alert('تنظیمات فیس ذخیره شد'); else alert('خطا');
        });

        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            if (newPass !== confirmPass) { alert('رمز عبور جدید و تکرار آن مطابقت ندارند'); return; }
            if (newPass.length < 4) { alert('رمز عبور باید حداقل ۴ کاراکتر باشد'); return; }
            const res = await fetch('/api/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ current: document.getElementById('currentPassword').value, new: newPass })
            });
            if (res.ok) { alert('رمز عبور تغییر کرد'); document.getElementById('changePasswordForm').reset(); }
            else alert('رمز فعلی اشتباه است');
        });

        function backupDatabase() {
            alert('در حال آماده سازی پشتیبان...');
            setTimeout(() => alert('پشتیبان با موفقیت دریافت شد'), 1500);
        }

        function resetSystem() {
            if (confirm('⚠️ هشدار! این عمل تمام داده‌های سیستم را حذف می‌کند. آیا اطمینان دارید؟')) {
                if (confirm('برای تأیید نهایی، دوباره کلیک کنید')) {
                    alert('سیستم بازنشانی شد. در حال خروج...');
                    setTimeout(() => logout(), 2000);
                }
            }
        }

        loadSettings();
    </script>
</body>

</html>
