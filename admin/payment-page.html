<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>پرداخت جدید | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .payment-container {
            max-width: 550px;
            margin: 0 auto;
        }
        .payment-card {
            background: white;
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-circle {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
        }
        .logo-circle i { font-size: 1.8rem; color: white; }
        
        .search-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .student-list {
            max-height: 280px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .student-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }
        .student-item:hover {
            background: #e0f2fe;
            border-color: #10b981;
        }
        .student-item.selected {
            background: #dcfce7;
            border-color: #10b981;
            border-width: 2px;
        }
        
        .payment-form {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .info-row:last-child { border-bottom: none; }
        
        .amount-input {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
        }
        
        .remaining-box {
            background: #fef3c7;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin: 15px 0;
        }
        
        .btn-payment {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 12px;
            border-radius: 14px;
            font-weight: bold;
            width: 100%;
            color: white;
            transition: 0.3s;
        }
        .btn-payment:hover { transform: translateY(-2px); }
        .btn-back {
            background: #64748b;
            border: none;
            padding: 10px;
            border-radius: 14px;
            width: 100%;
            color: white;
            margin-top: 15px;
        }
        .form-control, .form-select {
            border-radius: 12px;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
        }
        .badge-debtor { background: #fef3c7; color: #b45309; padding: 2px 10px; border-radius: 20px; font-size: 10px; }
        
        @media (max-width: 480px) {
            .payment-card { padding: 20px; }
            .info-row { flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="payment-card">
            <div class="logo-area">
                <div class="logo-circle"><i class="fa-solid fa-graduation-cap"></i></div>
                <h5>پرداخت جدید فیس</h5>
                <small class="text-muted">آموزشگاه نوی نور</small>
            </div>

            <!-- جستجو -->
            <div class="search-box">
                <div class="row g-2">
                    <div class="col-8">
                        <input type="text" id="searchInput" class="form-control" placeholder="جستجوی نام یا آیدی کارت...">
                    </div>
                    <div class="col-4">
                        <select id="classFilter" class="form-select">
                            <option value="">همه صنف‌ها</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- لیست شاگردان -->
            <div id="studentList" class="student-list">
                <div class="text-center py-4">
                    <div class="spinner-border text-success spinner-border-sm"></div>
                    <p class="text-muted small mt-2">در حال بارگیری...</p>
                </div>
            </div>

            <!-- فرم پرداخت (مخفی در ابتدا) -->
            <div id="paymentForm" class="payment-form" style="display: none;">
                <!-- شماره تماس -->
                <div class="info-row">
                    <span><i class="fa-solid fa-phone"></i> شماره تماس:</span>
                    <span id="studentPhone" class="fw-bold text-primary">-</span>
                </div>

                <!-- فیس قابل پرداخت -->
                <div class="info-row">
                    <span><i class="fa-solid fa-hand-holding-dollar"></i> فیس قابل پرداخت:</span>
                    <span id="payableFee" class="fw-bold">0 AFN</span>
                </div>

                <!-- مبلغ پرداختی -->
                <div class="mt-3">
                    <label class="form-label"><i class="fa-solid fa-money-bill-wave"></i> مبلغ پرداختی</label>
                    <input type="number" id="payAmount" class="form-control amount-input" step="100" placeholder="مبلغ را وارد کنید">
                </div>

                <!-- باقی مانده پس از پرداخت -->
                <div class="remaining-box">
                    <span class="text-dark">💰 باقی مانده پس از پرداخت:</span>
                    <h4 class="text-danger mb-0" id="newRemaining">0 AFN</h4>
                </div>

                <!-- تاریخ پرداخت جدید -->
                <div class="mt-3">
                    <label class="form-label"><i class="fa-regular fa-calendar"></i> تاریخ پرداخت جدید</label>
                    <input type="date" id="paymentDate" class="form-control">
                    <small class="text-muted">تاریخ صدور رسید همین تاریخ خواهد بود</small>
                </div>

                <!-- تاریخ انقضا -->
                <div class="mt-3">
                    <label class="form-label"><i class="fa-regular fa-calendar-plus"></i> تاریخ انقضا</label>
                    <input type="date" id="dueDate" class="form-control">
                    <small class="text-muted">به طور خودکار یک ماه بعد از تاریخ پرداخت</small>
                </div>

                <button type="button" id="submitPayment" class="btn-payment mt-4">
                    <i class="fa-solid fa-print"></i> ثبت پرداخت و چاپ رسید
                </button>
            </div>

            <button class="btn-back" onclick="window.location.href='fee-management.html'">
                <i class="fa-solid fa-arrow-right"></i> بازگشت
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let currentStudent = null;
        let allStudents = [];

        function formatDate(dateString) {
            if (!dateString) return '-';
            try {
                let d = new Date(dateString);
                if (isNaN(d.getTime())) return dateString;
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            } catch (e) { return dateString; }
        }

        // محاسبه تاریخ انقضا (یک ماه بعد)
        function calculateExpiryDate(dateString) {
            if (!dateString) return '';
            let date = new Date(dateString);
            date.setMonth(date.getMonth() + 1);
            return date.toISOString().split('T')[0];
        }

        async function loadClasses() {
            try {
                const res = await fetch('/api/classes');
                const classes = await res.json();
                const options = '<option value="">همه صنف‌ها</option>' + classes.map(c => `<option value="${c.id}">${c.class_name}</option>`).join('');
                document.getElementById('classFilter').innerHTML = options;
            } catch (err) { console.error(err); }
        }

        async function loadStudents() {
            try {
                const res = await fetch('/api/students');
                allStudents = await res.json();
                filterAndDisplay();
            } catch (err) {
                document.getElementById('studentList').innerHTML = '<div class="alert alert-danger">خطا در بارگیری</div>';
            }
        }

        function filterAndDisplay() {
            const classId = document.getElementById('classFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = [...allStudents];
            if (classId) filtered = filtered.filter(s => s.class_id == classId);
            if (search) filtered = filtered.filter(s => s.name.toLowerCase().includes(search) || (s.student_card_id && s.student_card_id.toLowerCase().includes(search)));
            
            if (filtered.length === 0) {
                document.getElementById('studentList').innerHTML = '<div class="alert alert-info text-center">هیچ شاگردی یافت نشد</div>';
                return;
            }
            
            let html = '';
            for (const s of filtered) {
                const isSelected = (currentStudent && currentStudent.id === s.id);
                html += `
                    <div class="student-item ${isSelected ? 'selected' : ''}" onclick="selectStudent(${s.id})">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <strong>${s.name}</strong><br>
                                <small class="text-muted">${s.student_card_id || '-'} | ${s.class_name || '-'}</small>
                            </div>
                            <div class="text-end">
                                <span class="badge-debtor">${s.phone || 'بدون شماره'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('studentList').innerHTML = html;
        }

        async function selectStudent(studentId) {
            try {
                const res = await fetch(`/api/students/${studentId}`);
                currentStudent = await res.json();
                
                // نمایش اطلاعات
                document.getElementById('studentPhone').innerHTML = currentStudent.phone || '-';
                document.getElementById('payableFee').innerHTML = 'مبلغ دلخواه';
                
                // مقداردهی اولیه فرم
                document.getElementById('payAmount').value = '';
                
                // تاریخ پرداخت جدید = امروز
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('paymentDate').value = today;
                
                // تاریخ انقضا = یک ماه بعد از امروز
                document.getElementById('dueDate').value = calculateExpiryDate(today);
                
                // محاسبه باقی مانده پس از پرداخت
                document.getElementById('payAmount').oninput = function() {
                    let pay = parseFloat(this.value) || 0;
                    document.getElementById('newRemaining').innerHTML = pay.toLocaleString() + ' AFN (پرداخت شده)';
                    if (pay > 0) {
                        document.getElementById('newRemaining').innerHTML = '0 AFN (باقی نمانده)';
                    }
                };
                
                // رویداد تغییر تاریخ پرداخت
                document.getElementById('paymentDate').onchange = function() {
                    let newDate = this.value;
                    if (newDate) {
                        document.getElementById('dueDate').value = calculateExpiryDate(newDate);
                    }
                };
                
                document.getElementById('paymentForm').style.display = 'block';
                
                // هایلایت کارت انتخاب شده
                filterAndDisplay();
                
            } catch(err) {
                alert('❌ خطا در بارگیری اطلاعات');
            }
        }

        // ثبت پرداخت جدید (مستقل)
        document.getElementById('submitPayment').addEventListener('click', async () => {
            if (!currentStudent) {
                alert('لطفاً ابتدا یک شاگرد را انتخاب کنید');
                return;
            }
            
            const amount = parseFloat(document.getElementById('payAmount').value);
            if (isNaN(amount) || amount <= 0) {
                alert('❌ مبلغ معتبر وارد کنید');
                return;
            }
            
            const paymentDate = document.getElementById('paymentDate').value;
            const dueDate = document.getElementById('dueDate').value;
            
            if (!paymentDate) {
                alert('❌ تاریخ پرداخت را انتخاب کنید');
                return;
            }
            
            // ثبت در API جدید
            const res = await fetch('/api/new-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    student_id: currentStudent.id, 
                    amount: amount, 
                    payment_date: paymentDate, 
                    due_date: dueDate, 
                    notes: 'پرداخت جدید مستقل'
                })
            });
            
            const data = await res.json();
            if (res.ok) {
                alert('✅ پرداخت با موفقیت ثبت شد');
                
                // چاپ رسید
                if (typeof printReceipt === 'function') {
                    printReceipt(
                        data.student_name, 
                        data.student_father, 
                        data.student_card_id,
                        '0',           // فیس کل (در این روش وجود ندارد)
                        '0',           // پرداخت شده کل (در این روش وجود ندارد)
                        '0',           // باقی مانده (در این روش وجود ندارد)
                        data.amount, 
                        data.payment_date, 
                        data.due_date,
                        data.receipt_number, 
                        data.notes || '',
                        data.class_name || '',
                        'new_payment',
                        0,
                        false
                    );
                }
                
                // ریست فرم
                document.getElementById('payAmount').value = '';
                document.getElementById('newRemaining').innerHTML = '0 AFN';
                
                // به روزرسانی لیست (اختیاری)
                await loadStudents();
                
            } else {
                alert(data.error || '❌ خطا در ثبت پرداخت');
            }
        });

        // رویدادهای جستجو
        document.getElementById('searchInput').addEventListener('input', () => {
            filterAndDisplay();
            document.getElementById('paymentForm').style.display = 'none';
            currentStudent = null;
        });
        document.getElementById('classFilter').addEventListener('change', () => {
            filterAndDisplay();
            document.getElementById('paymentForm').style.display = 'none';
            currentStudent = null;
        });

        loadClasses();
        loadStudents();
    </script>
</body>
</html>
