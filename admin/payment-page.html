<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>پرداخت فیس | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .payment-container {
            max-width: 650px;
            margin: 0 auto;
        }

        .payment-card {
            background: white;
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-circle {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
        }

        .logo-circle i {
            font-size: 1.8rem;
            color: white;
        }

        .search-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .student-list {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .student-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }

        .student-item:hover {
            background: #e0f2fe;
            border-color: #10b981;
        }

        .student-item.selected {
            background: #dcfce7;
            border-color: #10b981;
            border-width: 2px;
        }

        .payment-form {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .info-box {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .remaining-box {
            background: #dcfce7;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin: 15px 0;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
        }

        .btn-payment {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 12px;
            border-radius: 14px;
            font-weight: bold;
            width: 100%;
            color: white;
            transition: 0.3s;
        }

        .btn-payment:hover {
            transform: translateY(-2px);
        }

        .btn-back {
            background: #64748b;
            border: none;
            padding: 10px;
            border-radius: 14px;
            width: 100%;
            color: white;
            margin-top: 15px;
        }

        @media (max-width: 480px) {
            .payment-card {
                padding: 20px;
            }

            .info-row {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>

<body>
    <div class="payment-container">
        <div class="payment-card">
            <div class="logo-area">
                <div class="logo-circle"><i class="fa-solid fa-graduation-cap"></i></div>
                <h5>پرداخت فیس</h5>
                <small class="text-muted">آموزشگاه نوی نور</small>
            </div>

            <div class="search-box">
                <div class="row g-2">
                    <div class="col-8">
                        <input type="text" id="searchInput" class="form-control" placeholder="جستجوی نام شاگرد...">
                    </div>
                    <div class="col-4">
                        <select id="classFilter" class="form-select">
                            <option value="">همه صنف‌ها</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="studentList" class="student-list">
                <div class="text-center py-4">
                    <div class="spinner-border text-success spinner-border-sm"></div>
                    <p class="text-muted small mt-2">در حال بارگیری...</p>
                </div>
            </div>

            <div id="paymentForm" class="payment-form" style="display: none;">
                <div class="info-box">
                    <h6 class="mb-2"><i class="fa-solid fa-user-circle"></i> اطلاعات شاگرد</h6>
                    <div class="info-row"><span><i class="fa-solid fa-user"></i> نام شاگرد:</span><span id="studentName"
                            class="fw-bold">-</span></div>
                    <div class="info-row"><span><i class="fa-solid fa-user"></i> نام پدر:</span><span
                            id="studentFather">-</span></div>
                    <div class="info-row"><span><i class="fa-solid fa-table-cells-large"></i> صنف:</span><span
                            id="studentClass">-</span></div>
                    <div class="info-row"><span><i class="fa-solid fa-phone"></i> شماره تماس:</span><span
                            id="studentPhoneDisplay">-</span></div>
                </div>

                <div class="new-fee-box">
                    <h6 class="mb-3"><i class="fa-solid fa-plus-circle text-success"></i> ثبت فیس جدید</h6>
                    <div class="mb-3"><label class="form-label"><i class="fa-solid fa-money-bill-wave"></i> فیس کل
                            (AFN)</label><input type="number" id="newTotalFee" class="form-control"
                            placeholder="مثال: 5000" required></div>
                    <div class="mb-3"><label class="form-label"><i class="fa-solid fa-hand-holding-dollar"></i> مبلغ
                            پرداختی (AFN)</label><input type="number" id="newPayment" class="form-control"
                            placeholder="مبلغ پرداختی" required></div>

                    <div id="remainingBox" class="remaining-box" style="display: none;">
                        <span class="text-dark">💰 باقی مانده:</span>
                        <h3 class="text-danger mb-0" id="remainingAmount">0 AFN</h3>
                    </div>

                    <div class="mb-3"><label class="form-label"><i class="fa-regular fa-calendar"></i> تاریخ
                            پرداخت</label><input type="date" id="newDate" class="form-control"></div>
                    <div class="mb-3"><label class="form-label"><i class="fa-regular fa-calendar-plus"></i> تاریخ انقضا
                            (اختیاری)</label><input type="date" id="newExpiry" class="form-control"><small
                            class="text-muted">خالی = یک ماه بعد</small></div>
                    <div class="mb-3"><label class="form-label"><i class="fa-solid fa-phone"></i> شماره تماس (قابل
                            ویرایش)</label><input type="text" id="studentPhoneInput" class="form-control"
                            placeholder="شماره تماس شاگرد"></div>
                    <div class="mb-3"><label class="form-label"><i class="fa-solid fa-pen"></i> یادداشت</label><textarea
                            id="debtNote" class="form-control" rows="2" placeholder="توضیحات..."></textarea></div>

                    <button type="button" id="submitPayment" class="btn-payment mt-2"><i class="fa-solid fa-print"></i>
                        ثبت پرداخت و چاپ رسید</button>
                </div>
            </div>

            <button class="btn-back" onclick="window.location.href='fee-management.html'"><i
                    class="fa-solid fa-arrow-right"></i> بازگشت</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let currentStudent = null;
        let allStudents = [];

        function formatDate(dateString) {
            if (!dateString) return '-';
            try { let d = new Date(dateString); if (isNaN(d.getTime())) return dateString; return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
            catch (e) { return dateString; }
        }

        function calculateRemaining() {
            const totalFee = parseFloat(document.getElementById('newTotalFee').value) || 0;
            const payment = parseFloat(document.getElementById('newPayment').value) || 0;
            const remaining = totalFee - payment;

            const remainingBox = document.getElementById('remainingBox');
            const remainingAmount = document.getElementById('remainingAmount');

            if (totalFee > 0) {
                remainingBox.style.display = 'block';
                if (remaining > 0) {
                    remainingAmount.innerHTML = remaining.toLocaleString() + ' AFN';
                    remainingAmount.style.color = '#dc2626';
                } else if (remaining === 0) {
                    remainingAmount.innerHTML = '0 AFN (پرداخت کامل)';
                    remainingAmount.style.color = '#10b981';
                } else {
                    remainingAmount.innerHTML = '0 AFN (اضافه پرداختی)';
                    remainingAmount.style.color = '#f59e0b';
                }
            } else {
                remainingBox.style.display = 'none';
            }
        }

        async function loadClasses() {
            try {
                const res = await fetch('/api/classes');
                const classes = await res.json();
                const options = '<option value="">همه صنف‌ها</option>' + classes.map(c => `<option value="${c.id}">${c.class_name}</option>`).join('');
                document.getElementById('classFilter').innerHTML = options;
            } catch (err) { console.error(err); }
        }

        async function loadStudents() {
            try {
                const res = await fetch('/api/students');
                allStudents = await res.json();
                filterAndDisplay();
            } catch (err) { document.getElementById('studentList').innerHTML = '<div class="alert alert-danger">خطا در بارگیری</div>'; }
        }

        function filterAndDisplay() {
            const classId = document.getElementById('classFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = [...allStudents];
            if (classId) filtered = filtered.filter(s => s.class_id == classId);
            if (search) filtered = filtered.filter(s => s.name.toLowerCase().includes(search) || (s.student_card_id && s.student_card_id.toLowerCase().includes(search)));
            if (filtered.length === 0) { document.getElementById('studentList').innerHTML = '<div class="alert alert-info text-center">هیچ شاگردی یافت نشد</div>'; return; }
            let html = '';
            for (const s of filtered) {
                const isSelected = (currentStudent && currentStudent.id === s.id);
                html += `<div class="student-item ${isSelected ? 'selected' : ''}" onclick="selectStudent(${s.id})">
                    <div class="d-flex justify-content-between align-items-center">
                        <div><strong>${s.name}</strong><br><small class="text-muted">${s.student_card_id || '-'} | ${s.class_name || '-'}</small></div>
                        <div class="text-end"><small>${s.phone || 'بدون شماره'}</small></div>
                    </div>
                </div>`;
            }
            document.getElementById('studentList').innerHTML = html;
        }

        async function selectStudent(studentId) {
            try {
                const res = await fetch(`/api/students/${studentId}`);
                currentStudent = await res.json();
                document.getElementById('studentName').innerHTML = currentStudent.name || '-';
                document.getElementById('studentFather').innerHTML = currentStudent.father_name || '-';
                document.getElementById('studentClass').innerHTML = currentStudent.class_name || '-';
                document.getElementById('studentPhoneDisplay').innerHTML = currentStudent.phone || '-';
                document.getElementById('studentPhoneInput').value = currentStudent.phone || '';
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('newDate').value = today;
                document.getElementById('newExpiry').value = '';
                document.getElementById('newTotalFee').value = '';
                document.getElementById('newPayment').value = '';
                document.getElementById('remainingBox').style.display = 'none';
                document.getElementById('debtNote').value = '';
                document.getElementById('newTotalFee').oninput = calculateRemaining;
                document.getElementById('newPayment').oninput = calculateRemaining;
                document.getElementById('paymentForm').style.display = 'block';
                filterAndDisplay();
            } catch (err) { alert('❌ خطا در بارگیری اطلاعات'); }
        }

        document.getElementById('submitPayment').addEventListener('click', async () => {
            if (!currentStudent) { alert('لطفاً ابتدا یک شاگرد را انتخاب کنید'); return; }
            const totalFee = parseFloat(document.getElementById('newTotalFee').value) || 0;
            const payment = parseFloat(document.getElementById('newPayment').value) || 0;
            const paymentDate = document.getElementById('newDate').value;
            const expiryDate = document.getElementById('newExpiry').value;
            const phone = document.getElementById('studentPhoneInput').value;
            const debtNote = document.getElementById('debtNote').value;
            if (totalFee <= 0) { alert('❌ لطفاً فیس کل را وارد کنید'); return; }
            if (payment <= 0) { alert('❌ لطفاً مبلغ پرداختی را وارد کنید'); return; }
            if (!paymentDate) { alert('❌ تاریخ پرداخت را انتخاب کنید'); return; }

            if (phone !== currentStudent.phone) {
                await fetch(`/api/students/${currentStudent.id}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phone })
                });
            }

            const submitBtn = document.getElementById('submitPayment');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> در حال ثبت...';

            try {
                const res = await fetch('/api/collect-fee', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        student_id: currentStudent.id, amount: payment, total_fee: totalFee,
                        payment_date: paymentDate, due_date: expiryDate, notes: debtNote || null
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('✅ پرداخت با موفقیت ثبت شد');
                    if (typeof printReceipt === 'function') {
                        printReceipt(data.student_name, data.student_father, data.student_card_id,
                            data.total_fee, data.paid_fee, data.remaining_fee,
                            data.payment_amount, data.payment_date, data.expiry_date,
                            data.receipt_number, debtNote || '', data.class_name || '',
                            data.remaining_fee > 0 ? 'debtor' : 'paid');
                    }
                    document.getElementById('paymentForm').style.display = 'none';
                    currentStudent = null;
                    await loadStudents();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else { alert(data.error || '❌ خطا در ثبت پرداخت'); }
            } catch (err) { alert('❌ خطا در ارتباط با سرور: ' + err.message); }
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-print"></i> ثبت پرداخت و چاپ رسید';
        });

        document.getElementById('searchInput').addEventListener('input', () => { filterAndDisplay(); document.getElementById('paymentForm').style.display = 'none'; currentStudent = null; });
        document.getElementById('classFilter').addEventListener('change', () => { filterAndDisplay(); document.getElementById('paymentForm').style.display = 'none'; currentStudent = null; });

        loadClasses();
        loadStudents();
    </script>
</body>

</html>
