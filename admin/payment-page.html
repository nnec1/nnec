<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>پرداخت فیس | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .payment-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .payment-card {
            background: white;
            border-radius: 28px;
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-circle {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        .logo-circle i {
            font-size: 2rem;
            color: white;
        }

        .info-box {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .amount-input {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
        }

        .remaining-box {
            background: #fef3c7;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            margin: 20px 0;
        }

        .btn-payment {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-weight: bold;
            font-size: 1.1rem;
            width: 100%;
            color: white;
            transition: 0.3s;
        }

        .btn-payment:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.5);
        }

        .btn-back {
            background: #64748b;
            border: none;
            padding: 12px;
            border-radius: 16px;
            width: 100%;
            color: white;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #475569;
        }

        .form-control,
        .form-select {
            border-radius: 14px;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
            outline: none;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-edit-fee {
            background: #f59e0b;
            border: none;
            padding: 10px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            transition: 0.3s;
            flex: 1;
        }

        .btn-delete-fee {
            background: #dc2626;
            border: none;
            padding: 10px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            transition: 0.3s;
            flex: 1;
        }

        .btn-edit-fee:hover {
            background: #d97706;
        }

        .btn-delete-fee:hover {
            background: #b91c1c;
        }
    </style>
</head>

<body>
    <div class="payment-container">
        <div class="payment-card">
            <div class="logo-area">
                <div class="logo-circle"><i class="fa-solid fa-graduation-cap"></i></div>
                <h4>پرداخت فیس</h4>
                <p class="text-muted small">آموزشگاه نوی نور</p>
            </div>

            <div id="studentInfo" class="info-box">
                <div class="info-row"><span><i class="fa-solid fa-user"></i> نام شاگرد:</span><span
                        id="studentName">-</span></div>
                <div class="info-row"><span><i class="fa-solid fa-user"></i> نام پدر:</span><span
                        id="studentFather">-</span></div>
                <div class="info-row"><span><i class="fa-solid fa-id-card"></i> آیدی کارت:</span><span
                        id="studentCardId">-</span></div>
                <div class="info-row"><span><i class="fa-solid fa-table-cells-large"></i> صنف:</span><span
                        id="studentClass">-</span></div>
                <div class="info-row"><span><i class="fa-solid fa-phone"></i> شماره تماس:</span><span
                        id="studentPhone">-</span></div>
            </div>

            <div id="feeInfo" class="info-box">
                <div class="info-row"><span><i class="fa-solid fa-money-bill-wave"></i> فیس کل:</span><span
                        id="totalFee">0 AFN</span></div>
                <div class="info-row"><span><i class="fa-solid fa-circle-check text-success"></i> پرداخت
                        شده:</span><span id="paidFee">0 AFN</span></div>
                <div class="info-row"><span><i class="fa-solid fa-triangle-exclamation text-danger"></i> باقی
                        مانده:</span><span id="remainingFee">0 AFN</span></div>
                <div class="info-row"><span><i class="fa-regular fa-calendar"></i> تاریخ انقضا فعلی:</span><span
                        id="currentDueDate">-</span></div>
            </div>

            <div class="header-buttons">
                <button class="btn-edit-fee" onclick="openEditFeeModal()"><i class="fa-solid fa-pen"></i> ویرایش
                    فیس</button>
                <button class="btn-delete-fee" onclick="deleteStudentFee()"><i class="fa-solid fa-trash-can"></i> حذف
                    فیس</button>
            </div>

            <form id="paymentForm">
                <div class="mb-3">
                    <label class="form-label"><i class="fa-solid fa-money-bill-wave"></i> مبلغ پرداختی <span
                            class="text-danger">*</span></label>
                    <div class="input-group">
                        <input type="number" id="payAmount" class="form-control amount-input" step="100" required>
                        <button type="button" class="btn btn-outline-success" onclick="setFullPayment()">پرداخت
                            کامل</button>
                    </div>
                    <small class="text-muted">هر مقدار دلخواه وارد کنید</small>
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="fa-regular fa-calendar"></i> تاریخ پرداخت <span
                            class="text-danger">*</span></label>
                    <input type="date" id="paymentDate" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="fa-regular fa-calendar-plus"></i> تاریخ انقضای جدید</label>
                    <input type="date" id="newDueDate" class="form-control">
                    <small class="text-muted">خالی = یک ماه بعد</small>
                </div>

                <div class="remaining-box" id="remainingBox">
                    <span class="text-dark">💰 باقی مانده پس از پرداخت:</span>
                    <h3 class="text-danger mb-0" id="newRemaining">0 AFN</h3>
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="fa-solid fa-pen"></i> یادداشت</label>
                    <textarea id="notes" class="form-control" rows="2" placeholder="توضیحات..."></textarea>
                </div>

                <button type="submit" class="btn-payment"><i class="fa-solid fa-print"></i> ثبت پرداخت و چاپ
                    رسید</button>
            </form>

            <button class="btn-back" onclick="window.location.href='fee-management.html'">
                <i class="fa-solid fa-arrow-right"></i> بازگشت به مدیریت فیس
            </button>
        </div>
    </div>

    <!-- مودال ویرایش فیس -->
    <div class="modal fade" id="editFeeModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background:linear-gradient(135deg,#10b981,#059669);color:white">
                    <h5 class="modal-title"><i class="fa-solid fa-pen"></i> ویرایش فیس شاگرد</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editFeeForm">
                        <div class="mb-3"><label class="form-label">فیس کل (AFN)</label><input type="number"
                                id="editTotalFee" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">فیس پرداخت شده (AFN)</label><input type="number"
                                id="editPaidFee" class="form-control" required oninput="updateEditRemaining()"></div>
                        <div class="mb-3"><label class="form-label">باقی مانده (AFN)</label><input type="number"
                                id="editRemainingFee" class="form-control" readonly style="background:#f1f5f9"></div>
                        <div class="mb-3"><label class="form-label">تاریخ انقضا</label><input type="date"
                                id="editDueDate" class="form-control"></div>
                        <button type="submit" class="btn btn-primary w-100"><i class="fa-solid fa-save"></i> ذخیره
                            تغییرات</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let currentStudentId = null;
        let editFeeModal = null;

        // دریافت ID از URL
        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('id');

        if (!studentId) {
            alert('❌ شناسه شاگرد مشخص نشده است');
            window.location.href = 'fee-management.html';
        } else {
            currentStudentId = studentId;
            loadStudentData();
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            try {
                let d = new Date(dateString);
                if (isNaN(d.getTime())) return dateString;
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            } catch (e) { return dateString; }
        }

        async function loadStudentData() {
            try {
                const res = await fetch(`/api/students/${currentStudentId}`);
                const student = await res.json();

                document.getElementById('studentName').innerText = student.name || '-';
                document.getElementById('studentFather').innerText = student.father_name || '-';
                document.getElementById('studentCardId').innerText = student.student_card_id || '-';
                document.getElementById('studentClass').innerText = student.class_name || '-';
                document.getElementById('studentPhone').innerText = student.phone || '-';

                const totalFee = parseFloat(student.total_fee) || 0;
                const paidFee = parseFloat(student.paid_fee) || 0;
                const remainingFee = totalFee - paidFee;

                document.getElementById('totalFee').innerHTML = totalFee.toLocaleString() + ' AFN';
                document.getElementById('paidFee').innerHTML = paidFee.toLocaleString() + ' AFN';
                document.getElementById('remainingFee').innerHTML = remainingFee.toLocaleString() + ' AFN';
                document.getElementById('currentDueDate').innerText = formatDate(student.due_date);

                document.getElementById('payAmount').value = remainingFee;
                document.getElementById('paymentDate').value = new Date().toISOString().split('T')[0];

                const nextMonth = new Date();
                nextMonth.setMonth(nextMonth.getMonth() + 1);
                document.getElementById('newDueDate').value = nextMonth.toISOString().split('T')[0];

                updateRemainingDisplay();

                document.getElementById('payAmount').addEventListener('input', () => updateRemainingDisplay());
            } catch (err) {
                alert('❌ خطا در بارگیری اطلاعات شاگرد');
            }
        }

        function updateRemainingDisplay() {
            const totalFee = parseFloat(document.getElementById('totalFee').innerHTML.replace(' AFN', '').replace(/,/g, '')) || 0;
            const paidFee = parseFloat(document.getElementById('paidFee').innerHTML.replace(' AFN', '').replace(/,/g, '')) || 0;
            const currentRemaining = totalFee - paidFee;
            const payAmount = parseFloat(document.getElementById('payAmount').value) || 0;
            let newRemaining = currentRemaining - payAmount;
            if (newRemaining < 0) newRemaining = 0;
            document.getElementById('newRemaining').innerHTML = newRemaining.toLocaleString() + ' AFN';
        }

        function setFullPayment() {
            const totalFee = parseFloat(document.getElementById('totalFee').innerHTML.replace(' AFN', '').replace(/,/g, '')) || 0;
            const paidFee = parseFloat(document.getElementById('paidFee').innerHTML.replace(' AFN', '').replace(/,/g, '')) || 0;
            const remaining = totalFee - paidFee;
            document.getElementById('payAmount').value = remaining;
            updateRemainingDisplay();
        }

        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('payAmount').value);
            if (isNaN(amount) || amount <= 0) {
                alert('❌ مبلغ معتبر وارد کنید');
                return;
            }

            const res = await fetch('/api/collect-fee', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    student_id: currentStudentId,
                    amount,
                    payment_date: document.getElementById('paymentDate').value,
                    new_due_date: document.getElementById('newDueDate').value,
                    notes: document.getElementById('notes').value || ''
                })
            });
            const data = await res.json();
            if (res.ok) {
                alert('✅ پرداخت با موفقیت ثبت شد');
                const totalFee = parseFloat(document.getElementById('totalFee').innerHTML.replace(' AFN', '').replace(/,/g, '')) || 0;
                const paidFee = parseFloat(document.getElementById('paidFee').innerHTML.replace(' AFN', '').replace(/,/g, '')) || 0;
                const currentPaidFee = paidFee;
                const newRemaining = totalFee - (currentPaidFee + amount);
                let studentStatus = '';
                if (newRemaining <= 0) studentStatus = 'paid';

                if (typeof printReceipt === 'function') {
                    printReceipt(
                        data.student_name, data.student_father, data.student_card_id,
                        data.total_fee, data.paid_fee, data.remaining_fee,
                        data.payment_amount, data.payment_date, data.expiry_date,
                        data.receipt_number, data.notes || '',
                        document.getElementById('studentClass').innerText,
                        studentStatus,
                        currentPaidFee,
                        amount > (totalFee - paidFee)
                    );
                }
                window.location.href = 'fee-management.html';
            } else {
                alert(data.error || '❌ خطا در ثبت پرداخت');
            }
        });

        // ========== ویرایش فیس ==========
        async function openEditFeeModal() {
            try {
                const res = await fetch(`/api/students/${currentStudentId}`);
                const student = await res.json();
                document.getElementById('editTotalFee').value = student.total_fee || 0;
                document.getElementById('editPaidFee').value = student.paid_fee || 0;
                document.getElementById('editRemainingFee').value = (student.total_fee - student.paid_fee) || 0;
                document.getElementById('editDueDate').value = student.due_date ? formatDate(student.due_date) : '';
                if (!editFeeModal) editFeeModal = new bootstrap.Modal(document.getElementById('editFeeModal'));
                editFeeModal.show();
            } catch (err) { alert('❌ خطا در بارگیری اطلاعات'); }
        }

        function updateEditRemaining() {
            const total = parseFloat(document.getElementById('editTotalFee').value) || 0;
            const paid = parseFloat(document.getElementById('editPaidFee').value) || 0;
            document.getElementById('editRemainingFee').value = total - paid;
        }

        document.getElementById('editFeeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const totalFee = document.getElementById('editTotalFee').value;
            const paidFee = document.getElementById('editPaidFee').value;
            const dueDate = document.getElementById('editDueDate').value;
            const res = await fetch(`/api/students/${currentStudentId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ total_fee: totalFee, paid_fee: paidFee, due_date: dueDate })
            });
            if (res.ok) {
                alert('✅ اطلاعات فیس به‌روز شد');
                if (editFeeModal) editFeeModal.hide();
                loadStudentData();
            } else { alert('❌ خطا در به‌روزرسانی'); }
        });

        // ========== حذف فیس شاگرد ==========
        async function deleteStudentFee() {
            if (!confirm('⚠️ آیا از حذف تمام اطلاعات فیس این شاگرد اطمینان دارید؟\n\nاین عمل بازگشت‌ناپذیر است.')) return;
            if (!confirm('برای تأیید نهایی، دوباره کلیک کنید')) return;

            const res = await fetch(`/api/students/${currentStudentId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ total_fee: 0, paid_fee: 0, due_date: null })
            });
            if (res.ok) {
                alert('✅ اطلاعات فیس با موفقیت حذف شد');
                window.location.href = 'fee-management.html';
            } else { alert('❌ خطا در حذف فیس'); }
        }
    </script>
</body>

</html>
