<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>گزارش حاضری | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1050;
            background: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar { position: fixed; right: -280px; width: 280px; z-index: 1040; transition: right 0.3s; height: 100%; top: 0; }
            .sidebar.show { right: 0; }
            .main-content { width: 100%; margin-right: 0; padding: 80px 15px 25px 15px; }
            .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1030; display: none; }
            .overlay.show { display: block; }
        }
        .badge-present { background: #dcfce7; color: #15803d; padding: 4px 12px; border-radius: 30px; }
        .badge-absent { background: #fee2e2; color: #dc2626; padding: 4px 12px; border-radius: 30px; }
        .badge-late { background: #fef3c7; color: #b45309; padding: 4px 12px; border-radius: 30px; }
    </style>
</head>

<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">
                <div class="text-center py-4">
                    <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-2" style="width:70px;height:70px;background:linear-gradient(135deg,#10b981,#059669)">
                        <i class="fa-solid fa-building fs-1 text-white"></i>
                    </div>
                    <h5 class="text-white mb-0">پنل مدیریت</h5>
                    <small class="text-muted" id="adminName">مدیر سیستم</small>
                </div>
                <nav class="nav flex-column mt-2">
                    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> داشبورد</a>
                    <a href="students.html" class="nav-link"><i class="fa-solid fa-graduation-cap"></i> شاگردان</a>
                    <a href="employees.html" class="nav-link"><i class="fa-solid fa-users"></i> کارمندان</a>
                    <a href="classes.html" class="nav-link"><i class="fa-solid fa-table-cells-large"></i> صنف‌ها</a>
                    <a href="fee-management.html" class="nav-link"><i class="fa-solid fa-money-bill-wave"></i> مدیریت فیس</a>
                    <a href="attendance.html" class="nav-link active"><i class="fa-solid fa-calendar-check"></i> حاضری</a>
                    <a href="grades.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> نمرات</a>
                    <a href="reports.html" class="nav-link"><i class="fa-solid fa-file-alt"></i> گزارشات</a>
                    <a href="messages.html" class="nav-link"><i class="fa-solid fa-envelope"></i> پیام‌ها</a>
                    <a href="settings.html" class="nav-link"><i class="fa-solid fa-gear"></i> تنظیمات</a>
                    <hr class="text-secondary mx-3 my-2">
                    <a href="#" class="nav-link" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> خروج</a>
                </nav>
            </div>

            <div class="col-md-9 col-lg-10 main-content">
                <h3 class="section-title"><i class="fa-solid fa-calendar-check text-success me-2"></i> گزارش حاضری شاگردان</h3>

                <div class="row g-3 mb-4">
                    <div class="col-md-3"><select class="form-select" id="reportClass"><option value="">همه صنف‌ها</option></select></div>
                    <div class="col-md-3"><input type="date" class="form-control" id="startDate"></div>
                    <div class="col-md-3"><input type="date" class="form-control" id="endDate"></div>
                    <div class="col-md-3"><button class="btn btn-primary w-100" onclick="loadAttendanceReport()"><i class="fa-solid fa-magnifying-glass"></i> نمایش گزارش</button></div>
                </div>

                <div id="reportResult" class="table-container">
                    <div class="text-center py-5 text-muted">لطفاً بازه زمانی را انتخاب کنید</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        function setupSidebar() {
            const toggleBtn = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (!toggleBtn) return;
            function closeSidebar() { if (sidebar) sidebar.classList.remove('show'); if (overlay) overlay.classList.remove('show'); }
            function openSidebar() { if (sidebar) sidebar.classList.add('show'); if (overlay) overlay.classList.add('show'); }
            toggleBtn.addEventListener('click', openSidebar);
            if (overlay) overlay.addEventListener('click', closeSidebar);
            window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });
        }

        async function loadClasses() {
            try {
                const res = await fetch('/api/classes');
                const classes = await res.json();
                const select = document.getElementById('reportClass');
                select.innerHTML = '<option value="">همه صنف‌ها</option>' + classes.map(c => `<option value="${c.id}">${c.class_name}</option>`).join('');
            } catch (err) { console.error(err); }
        }

        async function loadAttendanceReport() {
            const classId = document.getElementById('reportClass').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            if (!startDate || !endDate) { alert('لطفاً بازه زمانی را انتخاب کنید'); return; }
            const resultDiv = document.getElementById('reportResult');
            resultDiv.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div> در حال بارگیری...</div>';
            try {
                const studentsRes = await fetch('/api/students');
                let students = await studentsRes.json();
                if (classId) students = students.filter(s => s.class_id == classId);
                if (students.length === 0) { resultDiv.innerHTML = '<div class="alert alert-info text-center py-4">هیچ شاگردی یافت نشد</div>'; return; }
                let html = `<div class="table-responsive"><table class="table table-bordered"><thead class="table-light"><tr><th>آیدی کارت</th><th>نام شاگرد</th><th>نام پدر</th><th>صنف</th><th>حاضر</th><th>غایب</th><th>تأخیر</th><th>درصد حضور</th></tr></thead><tbody>`;
                for (const s of students) {
                    const attRes = await fetch(`/api/student/attendance/${s.id}?month=all&year=2025`);
                    const attData = await attRes.json();
                    const total = (attData.present || 0) + (attData.absent || 0) + (attData.late || 0);
                    const percent = total > 0 ? (((attData.present || 0) / total) * 100).toFixed(1) : 0;
                    html += `<tr><td class="text-dark">${s.student_card_id || '-'}</div></div></div><td class="text-dark"><strong>${s.name}</strong></div></div></div><td class="text-dark">${s.father_name || '-'}</div></div></div><td class="text-dark">${s.class_name || '-'}</div></div></div>
                        <td class="text-success">${attData.present || 0}</div></div></div><td class="text-danger">${attData.absent || 0}</div></div></div><td class="text-warning">${attData.late || 0}</div></div></div>
                        <td><div class="progress"><div class="progress-bar bg-success" style="width: ${percent}%">${percent}%</div></div></div></div></div></div>`;
                }
                html += `</tbody></table></div>`;
                resultDiv.innerHTML = html;
            } catch (err) { console.error(err); resultDiv.innerHTML = '<div class="alert alert-danger">خطا در بارگیری اطلاعات</div>'; }
        }

        document.getElementById('startDate').value = new Date(new Date().setDate(1)).toISOString().split('T')[0];
        document.getElementById('endDate').value = new Date().toISOString().split('T')[0];
        setupSidebar();
        loadClasses();
    </script>
</body>
</html>
