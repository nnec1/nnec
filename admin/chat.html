<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>چت با شاگردان | آموزشگاه نوی نور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        * {
            box-sizing: border-box;
        }
        .chat-container {
            display: flex;
            height: calc(100vh - 150px);
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        /* لیست شاگردان (سایدبار چت) */
        .chat-sidebar {
            width: 300px;
            background: #f8fafc;
            border-left: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }
        .chat-sidebar-header {
            padding: 15px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }
        .chat-sidebar-header input {
            border-radius: 30px;
            padding: 8px 15px;
        }
        .student-list {
            flex: 1;
            overflow-y: auto;
        }
        .student-item {
            padding: 12px 15px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .student-item:hover {
            background: #e0f2fe;
        }
        .student-item.active {
            background: #dcfce7;
            border-right: 3px solid #10b981;
        }
        .student-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .student-info {
            flex: 1;
        }
        .student-name {
            font-weight: 600;
            font-size: 14px;
        }
        .last-message {
            font-size: 11px;
            color: #64748b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }
        .unread-badge {
            background: #dc2626;
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 10px;
        }
        /* منطقه چت */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f1f5f9;
        }
        .chat-header {
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-header .student-name {
            font-size: 16px;
            font-weight: 600;
        }
        .chat-header .student-class {
            font-size: 12px;
            color: #64748b;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            max-width: 70%;
        }
        .message-sent {
            align-self: flex-end;
        }
        .message-received {
            align-self: flex-start;
        }
        .message-bubble {
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
        }
        .message-sent .message-bubble {
            background: #10b981;
            color: white;
            border-bottom-left-radius: 4px;
        }
        .message-received .message-bubble {
            background: white;
            border: 1px solid #e2e8f0;
            border-bottom-right-radius: 4px;
        }
        .message-time {
            font-size: 10px;
            margin-top: 4px;
            text-align: center;
            color: #94a3b8;
        }
        .chat-input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        .chat-input-area input {
            flex: 1;
            border-radius: 30px;
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
        }
        .chat-input-area input:focus {
            outline: none;
            border-color: #10b981;
        }
        .chat-input-area button {
            background: #10b981;
            border: none;
            border-radius: 30px;
            padding: 0 20px;
            color: white;
            font-weight: 600;
        }
        .empty-chat {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
            text-align: center;
        }
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1050;
            background: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar { position: fixed; right: -280px; width: 280px; z-index: 1040; transition: right 0.3s; height: 100%; top: 0; }
            .sidebar.show { right: 0; }
            .main-content { width: 100%; margin-right: 0; padding: 80px 10px 10px 10px; }
            .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1030; display: none; }
            .overlay.show { display: block; }
            .chat-container { flex-direction: column; height: calc(100vh - 100px); }
            .chat-sidebar { width: 100%; max-height: 200px; }
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">
                <div class="text-center py-4">
                    <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-2" style="width:70px;height:70px;background:linear-gradient(135deg,#10b981,#059669)">
                        <i class="fa-solid fa-building fs-1 text-white"></i>
                    </div>
                    <h5 class="text-white mb-0">پنل مدیریت</h5>
                    <small class="text-muted" id="adminName">مدیر سیستم</small>
                </div>
                <nav class="nav flex-column mt-2">
                    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> داشبورد</a>
                    <a href="students.html" class="nav-link"><i class="fa-solid fa-graduation-cap"></i> شاگردان</a>
                    <a href="employees.html" class="nav-link"><i class="fa-solid fa-users"></i> کارمندان</a>
                    <a href="classes.html" class="nav-link"><i class="fa-solid fa-table-cells-large"></i> صنف‌ها</a>
                    <a href="fee-management.html" class="nav-link"><i class="fa-solid fa-money-bill-wave"></i> مدیریت فیس</a>
                    <a href="attendance.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> حاضری</a>
                    <a href="grades.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> نمرات</a>
                    <a href="reports.html" class="nav-link"><i class="fa-solid fa-file-alt"></i> گزارشات</a>
                    <a href="chat.html" class="nav-link active"><i class="fa-solid fa-comments"></i> چت</a>
                    <a href="settings.html" class="nav-link"><i class="fa-solid fa-gear"></i> تنظیمات</a>
                    <hr class="text-secondary mx-3 my-2">
                    <a href="#" class="nav-link" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> خروج</a>
                </nav>
            </div>

            <div class="col-md-9 col-lg-10 main-content">
                <h3 class="section-title"><i class="fa-solid fa-comments text-success me-2"></i> چت با شاگردان</h3>

                <div class="chat-container">
                    <!-- لیست شاگردان -->
                    <div class="chat-sidebar">
                        <div class="chat-sidebar-header">
                            <input type="text" id="searchStudent" class="form-control" placeholder="جستجوی شاگرد..." oninput="filterStudents()">
                        </div>
                        <div class="student-list" id="studentList">
                            <div class="text-center py-4">در حال بارگیری...</div>
                        </div>
                    </div>

                    <!-- منطقه چت -->
                    <div class="chat-main" id="chatMain">
                        <div class="empty-chat">
                            <div>
                                <i class="fa-solid fa-comments fs-1 text-muted"></i>
                                <p class="mt-2">سمت راست یک شاگرد را انتخاب کنید</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let adminId = localStorage.getItem('userId') || 2;
        let currentStudent = null;
        let allStudents = [];
        let messagesInterval = null;

        function setupSidebar() {
            const toggleBtn = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (!toggleBtn) return;
            function closeSidebar() { if (sidebar) sidebar.classList.remove('show'); if (overlay) overlay.classList.remove('show'); }
            function openSidebar() { if (sidebar) sidebar.classList.add('show'); if (overlay) overlay.classList.add('show'); }
            toggleBtn.addEventListener('click', openSidebar);
            if (overlay) overlay.addEventListener('click', closeSidebar);
            window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            try {
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return dateString;
                return d.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
            } catch(e) { return dateString; }
        }

        function formatFullDate(dateString) {
            if (!dateString) return '';
            try {
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return dateString;
                return d.toLocaleDateString('fa-IR') + ' ' + d.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
            } catch(e) { return dateString; }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadStudents() {
            try {
                const res = await fetch('/api/students');
                let students = await res.json();
                allStudents = students.filter(s => s.status === 'active');
                displayStudents();
            } catch (err) { console.error(err); }
        }

        function displayStudents() {
            const search = document.getElementById('searchStudent').value.toLowerCase();
            let filtered = allStudents;
            if (search) {
                filtered = allStudents.filter(s => s.name.toLowerCase().includes(search) || (s.student_card_id && s.student_card_id.toLowerCase().includes(search)));
            }
            
            if (filtered.length === 0) {
                document.getElementById('studentList').innerHTML = '<div class="text-center py-4 text-muted">هیچ شاگردی یافت نشد</div>';
                return;
            }
            
            let html = '';
            for (const s of filtered) {
                const isActive = currentStudent && currentStudent.id === s.id;
                const initial = s.name ? s.name.charAt(0) : '?';
                html += `
                    <div class="student-item ${isActive ? 'active' : ''}" onclick="selectStudent(${s.id})">
                        <div class="student-avatar" style="background: #${hashCode(s.name) % 0xFFFFFF}">
                            ${escapeHtml(initial)}
                        </div>
                        <div class="student-info">
                            <div class="student-name">${escapeHtml(s.name)}</div>
                            <div class="last-message">${escapeHtml(s.class_name) || 'بدون صنف'}</div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('studentList').innerHTML = html;
        }

        function filterStudents() {
            displayStudents();
        }

        function hashCode(str) {
            if (!str) return 0;
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }

        async function selectStudent(studentId) {
            // توقف پولینگ قبلی
            if (messagesInterval) {
                clearInterval(messagesInterval);
                messagesInterval = null;
            }
            
            const student = allStudents.find(s => s.id == studentId);
            if (!student) return;
            
            currentStudent = student;
            displayStudents();
            
            // ساخت رابط چت
            document.getElementById('chatMain').innerHTML = `
                <div class="chat-header">
                    <div class="student-avatar" style="background: #${hashCode(student.name) % 0xFFFFFF}">
                        ${escapeHtml(student.name ? student.name.charAt(0) : '?')}
                    </div>
                    <div>
                        <div class="student-name">${escapeHtml(student.name)}</div>
                        <div class="student-class">${escapeHtml(student.class_name) || 'بدون صنف'} | ${escapeHtml(student.student_card_id) || ''}</div>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="text-center py-4">در حال بارگیری پیام‌ها...</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="پیام خود را بنویسید..." onkeypress="if(event.keyCode===13) sendMessage()">
                    <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i> ارسال</button>
                </div>
            `;
            
            // بارگذاری پیام‌ها
            await loadMessages();
            
            // شروع پولینگ برای دریافت پیام‌های جدید (هر 3 ثانیه)
            messagesInterval = setInterval(loadMessages, 3000);
        }

        async function loadMessages() {
            if (!currentStudent) return;
            
            try {
                const res = await fetch(`/api/messages/conversation/${currentStudent.id}`);
                const messages = await res.json();
                
                const container = document.getElementById('chatMessages');
                if (!container) return;
                
                if (messages.length === 0) {
                    container.innerHTML = '<div class="text-center py-4 text-muted">هیچ پیامی وجود ندارد. اولین پیام را ارسال کنید.</div>';
                    return;
                }
                
                let html = '';
                let lastDate = '';
                for (const m of messages) {
                    const isOwn = m.sender_type === 'admin' && m.sender_id == adminId;
                    const messageDate = new Date(m.created_at).toLocaleDateString('fa-IR');
                    
                    if (lastDate !== messageDate) {
                        html += `<div class="text-center my-2"><span class="badge bg-light text-muted">${messageDate}</span></div>`;
                        lastDate = messageDate;
                    }
                    
                    html += `
                        <div class="message ${isOwn ? 'message-sent' : 'message-received'}">
                            <div class="message-bubble">
                                ${escapeHtml(m.message)}
                                <div class="message-time">${formatDate(m.created_at)}</div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
                
                // اسکرول به پایین
                container.scrollTop = container.scrollHeight;
                
            } catch (err) {
                console.error(err);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || !currentStudent) return;
            
            input.disabled = true;
            
            try {
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        receiver_type: 'student',
                        receiver_id: currentStudent.id,
                        subject: 'گفتگو',
                        message: message
                    })
                });
                
                if (res.ok) {
                    input.value = '';
                    await loadMessages();
                } else {
                    alert('❌ خطا در ارسال پیام');
                }
            } catch (err) {
                alert('❌ خطا در ارتباط با سرور');
            } finally {
                input.disabled = false;
                input.focus();
            }
        }

        setupSidebar();
        loadStudents();
        
        // تنظیم نام مدیر در سایدبار
        const adminName = localStorage.getItem('userName') || 'مدیر';
        document.getElementById('adminName').innerText = adminName;
        
        window.selectStudent = selectStudent;
        window.sendMessage = sendMessage;
    </script>
</body>
</html>
