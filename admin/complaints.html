<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مدیریت شکایات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <button class="menu-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="overlay" id="overlay"></div>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar" id="sidebar">
                <div class="text-center py-4">
                    <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-2"
                        style="width:70px;height:70px;background:linear-gradient(135deg,#667eea,#764ba2)">
                        <i class="bi bi-building fs-1 text-white"></i>
                    </div>
                    <h5 class="text-white mb-0">پنل مدیریت</h5>
                    <small class="text-muted" id="adminName">مدیر سیستم</small>
                </div>
                <nav class="nav flex-column mt-2">
                    <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> داشبورد</a>
                    <a href="students.html" class="nav-link"><i class="bi bi-mortarboard-fill"></i> شاگردان</a>
                    <a href="graduates.html" class="nav-link"><i class="bi bi-mortarboard-fill"></i> فارغ التحصیلان</a>
                    <a href="employees.html" class="nav-link"><i class="bi bi-people-fill"></i> کارمندان</a>
                    <a href="classes.html" class="nav-link"><i class="bi bi-grid-3x3-gap-fill"></i> صنف‌ها</a>
                    <a href="assign-teacher.html" class="nav-link"><i class="bi bi-person-plus-fill"></i> تخصیص
                        استاد</a>
                    <a href="fees.html" class="nav-link"><i class="bi bi-cash-stack"></i> مدیریت فیس</a>
                    <a href="accounts.html" class="nav-link"><i class="bi bi-cash-stack"></i> مدیریت حساب ها</a>
                    <a href="attendance.html" class="nav-link"><i class="bi bi-calendar-check-fill"></i> حاضری</a>
                    <a href="grades.html" class="nav-link"><i class="bi bi-bar-chart-steps"></i> نمرات</a>
                    <a href="reports.html" class="nav-link "><i class="bi bi-file-text-fill"></i> گزارشات</a>
                    <a href="financial-reports.html" class="nav-link "><i class="bi bi-coin"></i>گزارشات
                        مالی</a>
                    <a href="announcements.html" class="nav-link "><i class="bi bi-megaphone"></i>مدیریت
                        اعلانات</a>
                    <a href="complaints.html" class="nav-link "><i class="bi bi-building-fill-x"></i>
                        مدیریت شکایات</a>
                    <a href="subjects.html" class="nav-link "><i class="bi bi-book"></i>
                        مدیریت دروس</a>
                    <a href="settings.html" class="nav-link "><i class="bi bi-gear"></i>
                        تنظیمات</a>
                    <hr class="text-secondary mx-3 my-2">
                    <a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-right"></i>
                        خروج</a>
                </nav>
            </div>
            <div class="col-md-9 col-lg-10 main-content">
                <h3 class="section-title"><i class="bi bi-chat-dots-fill text-primary me-2"></i> مدیریت شکایات</h3>

                <div class="row g-3 mb-4">
                    <div class="col-md-3"><select id="filterComplaintStatus" class="form-select"
                            onchange="loadComplaints()">
                            <option value="">همه</option>
                            <option value="pending">در انتظار</option>
                            <option value="resolved">پاسخ داده شده</option>
                        </select></div>
                </div>

                <div id="complaintsList"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="replyModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white">
                    <h5 class="modal-title"><i class="bi bi-reply-fill"></i> پاسخ به شکایت</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="complaintMsg" class="alert alert-secondary"></div>
                    <textarea id="replyText" class="form-control mt-3" rows="4" placeholder="پاسخ شما..."></textarea>
                    <button class="btn btn-success mt-3 w-100" onclick="sendReply()"><i class="bi bi-send"></i> ارسال
                        پاسخ</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let currentId = null, replyModal = null;

        async function loadComplaints() {
            const status = document.getElementById('filterComplaintStatus').value;
            const res = await fetch('/api/complaints');
            let data = await res.json();
            if (status) data = data.filter(c => c.status === status);
            if (data.length === 0) { document.getElementById('complaintsList').innerHTML = '<div class="alert alert-info">هیچ شکایتی ثبت نشده است</div>'; return; }
            document.getElementById('complaintsList').innerHTML = data.map(c => `
                <div class="card mb-3 p-3 ${c.status === 'resolved' ? 'border-success' : 'border-warning'}">
                    <div class="d-flex justify-content-between"><div><h6><i class="bi bi-person-circle"></i> <strong>${c.student_name || 'شاگرد'}</strong> - ${c.subject}</h6><small>${new Date(c.created_at).toLocaleDateString('fa-IR')}</small></div><div><span class="badge ${c.status === 'pending' ? 'bg-warning' : 'bg-success'}">${c.status === 'pending' ? 'در انتظار پاسخ' : 'پاسخ داده شد'}</span></div></div>
                    <hr><p>${c.message}</p>${c.response ? `<div class="alert alert-success mt-2"><strong>پاسخ مدیر:</strong><br>${c.response}</div>` : `<button class="btn btn-sm btn-primary mt-2" onclick="openReply(${c.id}, '${c.message.replace(/'/g, "\\'")}')"><i class="bi bi-reply"></i> پاسخ</button>`}
                </div>
            `).join('');
        }

        function openReply(id, msg) {
            currentId = id;
            document.getElementById('complaintMsg').innerHTML = `<strong>متن شکایت:</strong><br>${msg}`;
            document.getElementById('replyText').value = '';
            if (replyModal) replyModal.show();
        }

        async function sendReply() {
            const response = document.getElementById('replyText').value;
            if (!response.trim()) { alert('لطفاً پاسخ را وارد کنید'); return; }
            const res = await fetch(`/api/complaints/${currentId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ response })
            });
            if (res.ok) {
                alert('پاسخ با موفقیت ارسال شد');
                if (replyModal) replyModal.hide();
                loadComplaints();
            } else alert('خطا');
        }

        document.addEventListener('DOMContentLoaded', () => {
            replyModal = new bootstrap.Modal(document.getElementById('replyModal'));
            loadComplaints();
        });
    </script>
</body>

</html>
