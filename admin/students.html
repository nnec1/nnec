    <!-- مودال شاگرد -->
    <div class="modal fade" id="studentModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white">
                    <h5 class="modal-title" id="studentModalLabel"><i class="bi bi-person-plus-fill"></i> شاگرد جدید
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="studentForm" enctype="multipart/form-data">
                        <input type="hidden" id="stuId">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label">نام کامل <span
                                        class="text-danger">*</span></label><input type="text" class="form-control"
                                    id="stuName" required></div>
                            <div class="col-md-6"><label class="form-label">نام پدر <span
                                        class="text-danger">*</span></label><input type="text" class="form-control"
                                    id="stuFather" required></div>
                            <div class="col-md-6"><label class="form-label">شماره تماس</label><input type="text"
                                    class="form-control" id="stuPhone"></div>
                            <div class="col-md-6">
                                <label class="form-label">صنف <span class="text-danger">*</span></label>
                                <select class="form-select" id="stuClassId" required>
                                    <option value="">انتخاب صنف...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">فیس اصلی (AFN) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="stuTotalFee" value="0" required
                                    oninput="calculateRemaining()">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">فیس پرداخت شده (AFN)</label>
                                <input type="number" class="form-control" id="stuPaidFee" value="0"
                                    oninput="calculateRemaining()">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">باقی مانده (AFN)</label>
                                <input type="number" class="form-control" id="stuRemainingFee" readonly
                                    style="background:#f1f5f9">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">تاریخ انقضای فیس</label>
                                <input type="date" class="form-control" id="stuDueDate">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">وضعیت</label>
                                <select class="form-select" id="stuStatus">
                                    <option value="active">فعال</option>
                                    <option value="graduated">فارغ‌التحصیل</option>
                                    <option value="disabled">غیرفعال</option>
                                </select>
                            </div>
                            <div class="col-12"><label class="form-label">آدرس</label><textarea class="form-control"
                                    id="stuAddress" rows="2"></textarea></div>
                            <div class="col-12"><label class="form-label">عکس شاگرد</label><input type="file"
                                    class="form-control" id="stuPhoto" accept="image/*"></div>
                            <div class="col-12"><label class="form-label">رمز عبور جدید</label><input type="password"
                                    class="form-control" id="stuPassword" placeholder="در صورت ویرایش خالی بگذارید">
                            </div>
                        </div>
                        <div class="mt-4"><button type="submit" class="btn btn-primary w-100"><i class="bi bi-save"></i>
                                ذخیره شاگرد</button></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/main.js"></script>
    <script>
        let currentEditId = null, studentModal = null;

        // تنظیم خودکار تاریخ انقضا (یک ماه بعد)
        function setDefaultDueDate() {
            const today = new Date();
            const nextMonth = new Date(today);
            nextMonth.setMonth(today.getMonth() + 1);
            const year = nextMonth.getFullYear();
            const month = String(nextMonth.getMonth() + 1).padStart(2, '0');
            const day = String(nextMonth.getDate()).padStart(2, '0');
            document.getElementById('stuDueDate').value = `${year}-${month}-${day}`;
        }

        function calculateRemaining() {
            const totalFee = parseFloat(document.getElementById('stuTotalFee').value) || 0;
            const paidFee = parseFloat(document.getElementById('stuPaidFee').value) || 0;
            const remaining = totalFee - paidFee;
            document.getElementById('stuRemainingFee').value = remaining < 0 ? 0 : remaining;
        }

        async function loadClasses() {
            try {
                const res = await fetch('/api/classes');
                const classes = await res.json();
                const select = document.getElementById('stuClassId');
                const filterSelect = document.getElementById('filterClass');

                if (classes && classes.length > 0) {
                    const options = classes.map(c => `<option value="${c.id}">${c.class_name}</option>`).join('');
                    select.innerHTML = '<option value="">انتخاب صنف...</option>' + options;
                    filterSelect.innerHTML = '<option value="">همه صنف‌ها</option>' + options;
                }
            } catch (err) {
                console.error(err);
            }
        }

        // در بخش loadStudents، تاریخ انقضا را به فرمت میلادی نمایش دهید
        async function loadStudents() {
            try {
                const res = await fetch('/api/students');
                let students = await res.json();
                const classId = document.getElementById('filterClass').value;
                const status = document.getElementById('filterStatus').value;
                const search = document.getElementById('searchStudent').value.toLowerCase();

                if (classId) students = students.filter(s => s.class_id == classId);
                if (status) students = students.filter(s => s.status === status);
                if (search) students = students.filter(s => s.name.toLowerCase().includes(search));

                if (!students || students.length === 0) {
                    document.getElementById('studentsList').innerHTML = '<tr><td colspan="11" class="text-center text-muted py-4">هیچ شاگردی یافت نشد</div></div></div></tr>';
                    return;
                }

                document.getElementById('studentsList').innerHTML = students.map(s => {
                    const isExpired = s.due_date && new Date(s.due_date) < new Date() && s.remaining_fee > 0;
                    const dueDateFormatted = s.due_date ? formatGregorianDate(s.due_date) : '-';
                    return `<tr class="${isExpired ? 'fee-overdue-row' : ''}">
                <td class="text-dark"><strong>${s.student_card_id || '-'}</strong></div></div></div>
                <td class="text-dark">${s.name}</div></div></div>
                <td class="text-dark">${s.father_name || '-'}</div></div></div>
                <td class="text-dark">${s.phone || '-'}</div></div></div>
                <td class="text-dark">${s.class_name || '-'}</div></div></div>
                <td class="text-dark">${(s.total_fee || 0).toLocaleString()}</div></div></div>
                <td class="text-success">${(s.paid_fee || 0).toLocaleString()}</div></div></div>
                <td class="text-danger">${(s.remaining_fee || 0).toLocaleString()}</div></div></div>
                <td class="${isExpired ? 'text-danger fw-bold' : 'text-dark'}">${dueDateFormatted}</div></div></div>
                <td class="text-dark"><span class="status-${s.status}">${s.status === 'active' ? 'فعال' : s.status === 'graduated' ? 'فارغ‌التحصیل' : 'غیرفعال'}</span></div></div></div>
                <td class="text-dark">
                    <button class="btn btn-sm btn-warning me-1" onclick="editStudent(${s.id})"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-danger me-1" onclick="deleteStudent(${s.id})"><i class="bi bi-trash"></i></button>
                    <button class="btn btn-sm btn-info" onclick="window.open('/student-card.html?id=${s.id}','_blank')"><i class="bi bi-qr-code"></i></button>
                </div></div></div>
            </div></div></div>`;
                }).join('');
            } catch (err) {
                console.error('Error loading students:', err);
                document.getElementById('studentsList').innerHTML = '<tr><td colspan="11" class="text-center text-danger py-4">خطا در بارگیری اطلاعات</div></div></div></tr>';
            }
        }

        // فرمت تاریخ میلادی
        function formatGregorianDate(dateString) {
            if (!dateString) return '-';
            try {
                const d = new Date(dateString);
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            } catch (e) {
                return dateString;
            }
        }
        async function deleteStudent(id) {
            if (confirm('حذف شود؟')) {
                await fetch(`/api/students/${id}`, { method: 'DELETE' });
                loadStudents();
            }
        }

        async function editStudent(id) {
            try {
                const res = await fetch(`/api/students/${id}`);
                const s = await res.json();
                currentEditId = id;
                document.getElementById('stuName').value = s.name || '';
                document.getElementById('stuFather').value = s.father_name || '';
                document.getElementById('stuPhone').value = s.phone || '';
                document.getElementById('stuClassId').value = s.class_id || '';
                document.getElementById('stuTotalFee').value = s.total_fee || 0;
                document.getElementById('stuPaidFee').value = s.paid_fee || 0;
                calculateRemaining();
                document.getElementById('stuDueDate').value = s.due_date || '';
                document.getElementById('stuStatus').value = s.status || 'active';
                document.getElementById('stuAddress').value = s.address || '';
                document.getElementById('studentModalLabel').innerHTML = '<i class="bi bi-pencil-square"></i> ویرایش شاگرد';
                if (studentModal) studentModal.show();
            } catch (err) { alert('خطا در بارگیری اطلاعات'); }
        }

        function resetStudentForm() {
            currentEditId = null;
            document.getElementById('studentForm').reset();
            document.getElementById('studentModalLabel').innerHTML = '<i class="bi bi-person-plus-fill"></i> شاگرد جدید';
            setDefaultDueDate();
            calculateRemaining();
        }

        document.getElementById('studentForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('name', document.getElementById('stuName').value);
            formData.append('father_name', document.getElementById('stuFather').value);
            formData.append('phone', document.getElementById('stuPhone').value);
            formData.append('class_id', document.getElementById('stuClassId').value);
            formData.append('total_fee', document.getElementById('stuTotalFee').value);
            formData.append('paid_fee', document.getElementById('stuPaidFee').value);
            formData.append('due_date', document.getElementById('stuDueDate').value);
            formData.append('status', document.getElementById('stuStatus').value);
            formData.append('address', document.getElementById('stuAddress').value);

            if (document.getElementById('stuPhoto').files[0]) formData.append('photo', document.getElementById('stuPhoto').files[0]);
            if (document.getElementById('stuPassword').value) formData.append('password', document.getElementById('stuPassword').value);

            const url = currentEditId ? `/api/students/${currentEditId}` : '/api/students';
            const method = currentEditId ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, { method, body: formData });
                const data = await res.json();
                if (res.ok) {
                    alert(currentEditId ? 'شاگرد ویرایش شد' : 'شاگرد اضافه شد');
                    if (studentModal) studentModal.hide();
                    loadStudents();
                    resetStudentForm();
                    if (!currentEditId) {
                        window.open(`/student-card.html?id=${data.id}`, '_blank');
                    }
                } else {
                    alert(data.error || 'خطا در ثبت شاگرد');
                }
            } catch (err) { alert('خطا در ارتباط با سرور'); }
        });

        // مقداردهی اولیه
        setDefaultDueDate();

        document.addEventListener('DOMContentLoaded', () => {
            studentModal = new bootstrap.Modal(document.getElementById('studentModal'));
            loadClasses();
            loadStudents();
        });
    </script>
