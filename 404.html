<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه یافت نشد - 404</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .error-card {
            background: white;
            border-radius: 32px;
            padding: 50px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .error-card h1 {
            font-size: 6rem;
            color: #667eea;
        }

        .btn-home {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 12px 30px;
            border-radius: 16px;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-home:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="error-card">
        <i class="bi bi-exclamation-triangle-fill fs-1 text-warning"></i>
        <h1>۴۰۴</h1>
        <h3>صفحه مورد نظر یافت نشد!</h3>
        <p class="text-muted">متأسفیم، صفحه‌ای که به دنبال آن هستید وجود ندارد یا منتقل شده است.</p>
        <a href="/login.html" class="btn-home mt-3"><i class="bi bi-house-door-fill"></i> بازگشت به صفحه ورود</a>
    </div>
</body>

</html>
